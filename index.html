<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conductive v6.0 — Sympathetic Engine</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --cyan:#00e5ff;--green:#39ff14;--magenta:#ff2daa;--amber:#ffb300;
            --bg:#020409;--panel:rgba(4,8,20,0.92);--border:rgba(0,229,255,0.12);
            --glow-cyan:0 0 20px rgba(0,229,255,0.25);
        }
        body{background:var(--bg);color:#c0dce6;font-family:'Outfit',sans-serif;overflow:hidden;height:100vh;width:100vw;touch-action:none}
        
        /* CANVAS LAYERS */
        canvas#main{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
        canvas#waveform{position:fixed;bottom:0;left:0;width:100%;height:50px;z-index:5;opacity:0.35}
        video#video{position:fixed;opacity:0;width:1px;height:1px;pointer-events:none}

        /* TOUCH SURFACE — invisible overlay for conducting */
        #touch-surface{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;cursor:crosshair}

        /* UI LAYER */
        .ui{position:fixed;inset:0;z-index:10;display:grid;grid-template-rows:auto 1fr auto;grid-template-columns:1fr;padding:16px;pointer-events:none;gap:12px}
        .ui>*{pointer-events:auto}

        /* TOP BAR */
        .top-bar{display:flex;justify-content:space-between;align-items:center;pointer-events:none}
        .top-bar>*{pointer-events:auto}
        .brand{display:flex;align-items:center;gap:10px}
        .brand-text{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(0,229,255,0.4);font-family:'JetBrains Mono',monospace}
        .brand-text span{color:var(--cyan);font-weight:700}
        .stats{display:flex;gap:24px;text-align:right}
        .stat-block .label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,229,255,0.35);font-family:'JetBrains Mono',monospace}
        .stat-block .value{font-family:'Outfit',sans-serif;font-weight:900;font-size:28px;color:var(--cyan);line-height:1.1;transition:color 0.3s}

        /* MIDDLE — instrument rack floats right */
        .mid-row{display:flex;justify-content:flex-end;align-items:flex-start;pointer-events:none;overflow:visible}
        .mid-row>*{pointer-events:auto}

        /* INSTRUMENT RACK */
        .inst-rack{
            background:var(--panel);border:1px solid var(--border);border-radius:14px;
            backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
            padding:14px;width:220px;max-height:60vh;overflow-y:auto;
        }
        .inst-rack::-webkit-scrollbar{width:3px}
        .inst-rack::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.15);border-radius:3px}
        .inst-rack h3{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(0,229,255,0.35);font-family:'JetBrains Mono',monospace;margin-bottom:10px}
        .inst-card{
            display:flex;align-items:center;gap:10px;
            padding:8px 10px;border:1px solid rgba(0,229,255,0.06);border-radius:8px;
            margin-bottom:4px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;
        }
        .inst-card:hover{border-color:rgba(0,229,255,0.2)}
        .inst-card.active{border-color:rgba(57,255,20,0.3)}
        .inst-card .dot{width:6px;height:6px;border-radius:50%;background:#333;flex-shrink:0;transition:all 0.15s}
        .inst-card.active .dot{background:var(--green);box-shadow:0 0 8px rgba(57,255,20,0.5)}
        .inst-card .inst-name{font-size:11px;font-family:'JetBrains Mono',monospace;color:rgba(0,229,255,0.5);flex:1;transition:color 0.2s}
        .inst-card.active .inst-name{color:var(--cyan)}
        .inst-card .activity{position:absolute;bottom:0;left:0;height:2px;background:var(--cyan);opacity:0.4;transition:width 0.1s;width:0}
        .inst-card.active .activity{width:var(--act,0%)}
        .inst-cat{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,229,255,0.2);font-family:'JetBrains Mono',monospace;margin:10px 0 6px;padding-top:6px;border-top:1px solid rgba(0,229,255,0.06)}

        /* BOTTOM CONTROLS */
        .bottom-bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
        .ctrl-panel{
            background:var(--panel);border:1px solid var(--border);border-radius:14px;
            backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
            padding:16px;
        }
        .ctrl-main{min-width:300px;flex:1;max-width:420px}
        .ctrl-panel h3{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(0,229,255,0.35);font-family:'JetBrains Mono',monospace;margin-bottom:10px}

        .btn{
            display:inline-flex;align-items:center;justify-content:center;gap:8px;
            background:transparent;border:1px solid var(--border);color:var(--cyan);
            padding:10px 16px;border-radius:8px;font-family:'JetBrains Mono',monospace;
            font-size:11px;cursor:pointer;transition:all 0.2s;letter-spacing:1px;
            text-transform:uppercase;white-space:nowrap;user-select:none;
        }
        .btn:hover{background:rgba(0,229,255,0.06);border-color:var(--cyan)}
        .btn.active{border-color:var(--green);color:var(--green);box-shadow:0 0 15px rgba(57,255,20,0.12)}
        .btn.recording{border-color:var(--magenta);color:var(--magenta);animation:pulse-mag 1s infinite}
        .btn.paused{border-color:var(--amber);color:var(--amber)}
        @keyframes pulse-mag{0%,100%{box-shadow:0 0 8px rgba(255,45,170,0.15)}50%{box-shadow:0 0 22px rgba(255,45,170,0.4)}}

        .btn-row{display:flex;gap:6px;margin-bottom:8px}
        .btn-row .btn{flex:1}

        .text-input-row{display:flex;gap:6px;margin-bottom:8px}
        .text-input-row input{
            flex:1;background:rgba(0,0,0,0.5);border:1px solid var(--border);
            color:var(--cyan);padding:10px 12px;border-radius:8px;
            font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;
        }
        .text-input-row input:focus{border-color:var(--cyan)}
        .text-input-row input::placeholder{color:rgba(0,229,255,0.18)}
        .text-input-row .btn{flex-shrink:0;width:42px;padding:0}

        #log{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(0,229,255,0.3);height:28px;overflow:hidden;margin-top:6px;line-height:1.8}

        /* STYLES PANEL */
        .ctrl-styles{width:170px}
        .style-slot{
            display:flex;align-items:center;justify-content:space-between;
            padding:5px 8px;border:1px solid rgba(0,229,255,0.06);border-radius:6px;
            margin-bottom:3px;font-size:10px;font-family:'JetBrains Mono',monospace;
            cursor:pointer;transition:0.2s;color:rgba(0,229,255,0.35);
        }
        .style-slot:hover{border-color:var(--cyan);color:var(--cyan)}
        .style-slot.filled{color:rgba(0,229,255,0.6)}
        .style-slot .si{opacity:0.3;cursor:pointer;font-size:12px}
        .style-slot .si:hover{opacity:1}

        /* CONDUCTING HINT */
        .conduct-hint{
            position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
            font-size:12px;font-family:'JetBrains Mono',monospace;
            color:rgba(0,229,255,0.15);letter-spacing:2px;text-transform:uppercase;
            pointer-events:none;z-index:3;transition:opacity 0.5s;
        }

        /* HAND TRAIL */
        .trail-dot{
            position:fixed;width:8px;height:8px;border-radius:50%;
            pointer-events:none;z-index:4;
        }

        @media(max-width:700px){
            .inst-rack{width:180px;padding:10px}
            .ctrl-main{min-width:unset}
            .stats{gap:16px}
            .stat-block .value{font-size:22px}
        }
    </style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="main"></canvas>
<canvas id="waveform"></canvas>
<div id="touch-surface"></div>
<div class="conduct-hint" id="conduct-hint">Touch & drag to conduct</div>

<div class="ui">
    <!-- TOP -->
    <div class="top-bar">
        <div class="brand">
            <svg width="24" height="24" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="12" stroke="var(--cyan)" stroke-width="1" opacity="0.3"/><circle cx="14" cy="14" r="6" stroke="var(--cyan)" stroke-width="1.5"/><circle cx="14" cy="14" r="2" fill="var(--cyan)"/></svg>
            <div class="brand-text"><span>Conductive</span> v6.0</div>
        </div>
        <div class="stats">
            <div class="stat-block"><div class="label">BPM</div><div class="value" id="bpm-val">110</div></div>
            <div class="stat-block"><div class="label">Energy</div><div class="value" id="energy-val">50</div></div>
            <div class="stat-block"><div class="label">Key</div><div class="value" id="key-val" style="font-size:20px">Cm</div></div>
        </div>
    </div>

    <!-- MIDDLE — instrument rack -->
    <div class="mid-row">
        <div class="inst-rack" id="inst-rack">
            <h3>Orchestra</h3>
            <div id="inst-list"></div>
        </div>
    </div>

    <!-- BOTTOM -->
    <div class="bottom-bar">
        <div class="ctrl-panel ctrl-main">
            <h3>Conductor</h3>
            <div class="btn-row">
                <button class="btn" id="init-btn">▶ Start</button>
                <button class="btn" id="pause-btn" style="display:none">⏸ Pause</button>
            </div>
            <div class="text-input-row">
                <input type="text" id="cmd-input" placeholder="e.g. &quot;dark cinematic strings&quot;">
                <button class="btn" id="cmd-send">→</button>
            </div>
            <div class="btn-row">
                <button class="btn" id="voice-btn">🎤 Voice</button>
            </div>
            <div id="log">Tap Start to begin.</div>
        </div>
        <div class="ctrl-panel ctrl-styles">
            <h3>Presets</h3>
            <div id="style-slots"></div>
        </div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const GEMINI_KEY = 'AIzaSyA_HmuE45nOcdtX5YCDFOh-do';

// ═══════════════════════════════════════════
// INSTRUMENT DEFINITIONS
// ═══════════════════════════════════════════
const INSTRUMENTS = {
    // RHYTHM
    kick:       { cat:'rhythm', name:'Kick', active:true },
    snare:      { cat:'rhythm', name:'Snare', active:true },
    hihat:      { cat:'rhythm', name:'Hi-Hat', active:true },
    clap:       { cat:'rhythm', name:'Clap', active:false },
    perc:       { cat:'rhythm', name:'Percussion', active:false },
    // BASS
    subbass:    { cat:'bass', name:'Sub Bass', active:false },
    synbass:    { cat:'bass', name:'Synth Bass', active:true },
    // MELODIC
    lead:       { cat:'melodic', name:'Lead Synth', active:true },
    pluck:      { cat:'melodic', name:'Pluck', active:false },
    bell:       { cat:'melodic', name:'Bell', active:false },
    arp:        { cat:'melodic', name:'Arpeggio', active:false },
    // ATMOSPHERE
    pad:        { cat:'atmo', name:'Pad', active:false },
    strings:    { cat:'atmo', name:'Strings', active:false },
    choir:      { cat:'atmo', name:'Choir', active:false },
    texture:    { cat:'atmo', name:'Texture', active:false },
};

// ═══════════════════════════════════════════
// ENGINE STATE
// ═══════════════════════════════════════════
const engine = {
    tempo: 110, energy: 0.5, chordIndex: 0, key: 'C', mode: 'minor',
    chords: [["C3","Eb3","G3"],["Ab2","C3","Eb3"],["Bb2","D3","F3"],["G2","B2","D3"]],
    filterCutoff: 2500, playing: false, paused: false,
    instruments: {},
};
// Copy active states
Object.keys(INSTRUMENTS).forEach(k => engine.instruments[k] = INSTRUMENTS[k].active);

const KEYS = {
    'C':{minor:[["C3","Eb3","G3"],["Ab2","C3","Eb3"],["Bb2","D3","F3"],["G2","B2","D3"]],major:[["C3","E3","G3"],["F2","A2","C3"],["G2","B2","D3"],["A2","C3","E3"]]},
    'D':{minor:[["D3","F3","A3"],["Bb2","D3","F3"],["C3","E3","G3"],["A2","C#3","E3"]],major:[["D3","F#3","A3"],["G2","B2","D3"],["A2","C#3","E3"],["B2","D3","F#3"]]},
    'E':{minor:[["E3","G3","B3"],["C3","E3","G3"],["D3","F#3","A3"],["B2","D#3","F#3"]],major:[["E3","G#3","B3"],["A2","C#3","E3"],["B2","D#3","F#3"],["C#3","E3","G#3"]]},
    'F':{minor:[["F3","Ab3","C4"],["Db3","F3","Ab3"],["Eb3","G3","Bb3"],["C3","E3","G3"]],major:[["F3","A3","C4"],["Bb2","D3","F3"],["C3","E3","G3"],["D3","F3","A3"]]},
    'G':{minor:[["G3","Bb3","D4"],["Eb3","G3","Bb3"],["F3","A3","C4"],["D3","F#3","A3"]],major:[["G3","B3","D4"],["C3","E3","G3"],["D3","F#3","A3"],["E3","G3","B3"]]},
    'A':{minor:[["A3","C4","E4"],["F3","A3","C4"],["G3","B3","D4"],["E3","G#3","B3"]],major:[["A3","C#4","E4"],["D3","F#3","A3"],["E3","G#3","B3"],["F#3","A3","C#4"]]},
    'B':{minor:[["B3","D4","F#4"],["G3","B3","D4"],["A3","C#4","E4"],["F#3","A#3","C#4"]],major:[["B3","D#4","F#4"],["E3","G#3","B3"],["F#3","A#3","C#4"],["G#3","B3","D#4"]]},
};

let synths = {}, effects = {}, analyser = null;
let booted = false;
const savedStyles = Array(6).fill(null);

// Activity tracking for visual feedback
const activity = {};
Object.keys(INSTRUMENTS).forEach(k => activity[k] = 0);

// ═══════════════════════════════════════════
// INSTRUMENT RACK UI
// ═══════════════════════════════════════════
function renderInstruments() {
    const el = document.getElementById('inst-list');
    el.innerHTML = '';
    const cats = { rhythm:'Rhythm', bass:'Bass', melodic:'Melodic', atmo:'Atmosphere' };
    let lastCat = '';
    Object.entries(INSTRUMENTS).forEach(([id, inst]) => {
        if (inst.cat !== lastCat) {
            lastCat = inst.cat;
            const h = document.createElement('div');
            h.className = 'inst-cat';
            h.textContent = cats[inst.cat] || inst.cat;
            el.appendChild(h);
        }
        const card = document.createElement('div');
        card.className = 'inst-card' + (engine.instruments[id] ? ' active' : '');
        card.id = 'inst-' + id;
        card.innerHTML = `<div class="dot"></div><div class="inst-name">${inst.name}</div><div class="activity"></div>`;
        card.addEventListener('click', () => {
            engine.instruments[id] = !engine.instruments[id];
            card.classList.toggle('active');
        });
        el.appendChild(card);
    });
}

function updateActivity() {
    Object.keys(activity).forEach(k => {
        activity[k] *= 0.9; // decay
        const card = document.getElementById('inst-' + k);
        if (card) card.style.setProperty('--act', Math.round(activity[k] * 100) + '%');
    });
}

function flash(id) { activity[id] = Math.min(1, (activity[id] || 0) + 0.5); }

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
document.getElementById('init-btn').addEventListener('click', boot);

async function boot() {
    if (booted) { togglePause(); return; }
    try { await Tone.start(); } catch(e) { log("Audio blocked: " + e.message); return; }
    booted = true;
    engine.playing = true;

    const initBtn = document.getElementById('init-btn');
    const pauseBtn = document.getElementById('pause-btn');
    initBtn.textContent = '● Live'; initBtn.classList.add('active');
    pauseBtn.style.display = '';

    // FX chain
    effects.master = new Tone.Gain(0.85).toDestination();
    effects.reverb = new Tone.Reverb({ decay: 5, wet: 0.3 }).connect(effects.master);
    effects.filter = new Tone.Filter(engine.filterCutoff, "lowpass").connect(effects.reverb);
    effects.delay = new Tone.FeedbackDelay("8n.", 0.3).connect(effects.filter);
    effects.chorus = new Tone.Chorus(3, 2.5, 0.5).connect(effects.reverb).start();
    effects.comp = new Tone.Compressor(-16, 4).connect(effects.master);
    effects.widener = new Tone.StereoWidener(0.7).connect(effects.reverb);

    analyser = new Tone.Analyser('waveform', 256);
    effects.master.connect(analyser);

    // ─── RHYTHM ───
    synths.kick = new Tone.MembraneSynth({
        pitchDecay:0.05, octaves:5, volume:-6,
        envelope:{attack:0.001,decay:0.25,sustain:0,release:0.25}
    }).connect(effects.comp);

    synths.snare = new Tone.NoiseSynth({
        volume:-14, noise:{type:'white'},
        envelope:{attack:0.001,decay:0.12,sustain:0}
    }).connect(effects.filter);

    synths.hihat = new Tone.MetalSynth({
        volume:-22, frequency:300, envelope:{attack:0.001,decay:0.05,release:0.01},
        harmonicity:5.1, modulationIndex:32, resonance:2500, octaves:1.5
    }).connect(effects.filter);

    synths.clap = new Tone.NoiseSynth({
        volume:-16, noise:{type:'pink'},
        envelope:{attack:0.005,decay:0.15,sustain:0}
    }).connect(effects.filter);

    synths.perc = new Tone.MetalSynth({
        volume:-20, frequency:800, envelope:{attack:0.001,decay:0.08,release:0.01},
        harmonicity:3, modulationIndex:16, resonance:3000, octaves:1
    }).connect(effects.delay);

    // ─── BASS ───
    synths.subbass = new Tone.MonoSynth({
        oscillator:{type:"sine"}, volume:-8,
        envelope:{attack:0.01,decay:0.4,sustain:0.6,release:0.3},
        filterEnvelope:{attack:0.01,decay:0.1,sustain:0,release:0.3,baseFrequency:40,octaves:2}
    }).connect(effects.comp);

    synths.synbass = new Tone.MonoSynth({
        oscillator:{type:"sawtooth"}, volume:-12,
        envelope:{attack:0.01,decay:0.2,sustain:0.4,release:0.3},
        filterEnvelope:{attack:0.01,decay:0.15,sustain:0,release:0.4,baseFrequency:100,octaves:3}
    }).connect(effects.comp);

    // ─── MELODIC ───
    synths.lead = new Tone.MonoSynth({
        oscillator:{type:"sine"}, volume:-14,
        envelope:{attack:0.06,decay:0.25,sustain:0.3,release:0.6},
        filterEnvelope:{attack:0.05,decay:0.3,sustain:0,release:0.6,baseFrequency:400,octaves:4}
    }).connect(effects.delay);

    synths.pluck = new Tone.PluckSynth({ volume:-14, resonance:0.9, release:1.2 }).connect(effects.delay);

    synths.bell = new Tone.MetalSynth({
        volume:-18, frequency:600, envelope:{attack:0.001,decay:0.8,release:0.3},
        harmonicity:12, modulationIndex:20, resonance:800, octaves:2
    }).connect(effects.chorus);

    synths.arp = new Tone.MonoSynth({
        oscillator:{type:"square"}, volume:-16,
        envelope:{attack:0.01,decay:0.1,sustain:0.1,release:0.2},
        filterEnvelope:{attack:0.01,decay:0.1,sustain:0,release:0.2,baseFrequency:500,octaves:3}
    }).connect(effects.delay);

    // ─── ATMOSPHERE ───
    synths.pad = new Tone.PolySynth(Tone.Synth, {
        oscillator:{type:"fatsawtooth",count:3,spread:40}, volume:-20,
        envelope:{attack:2.5,decay:1,sustain:0.8,release:3}
    }).connect(effects.widener);

    synths.strings = new Tone.PolySynth(Tone.Synth, {
        oscillator:{type:"fatsawtooth",count:5,spread:20}, volume:-20,
        envelope:{attack:1.5,decay:0.5,sustain:0.9,release:2.5}
    }).connect(effects.chorus);

    synths.choir = new Tone.PolySynth(Tone.Synth, {
        oscillator:{type:"sine"}, volume:-22,
        envelope:{attack:2,decay:1,sustain:0.7,release:3}
    }).connect(effects.widener);

    synths.texture = new Tone.NoiseSynth({
        volume:-28, noise:{type:'brown'},
        envelope:{attack:3,decay:2,sustain:0.3,release:4}
    }).connect(effects.reverb);

    // ─── SEQUENCER ───
    let step = 0;
    let arpStep = 0;
    new Tone.Loop(time => {
        const e = engine.energy;
        const ins = engine.instruments;

        // Chord change every 2 bars
        if (step % 32 === 0) {
            engine.chordIndex = (engine.chordIndex + 1) % engine.chords.length;
            const ch = engine.chords[engine.chordIndex];
            if (ins.pad) { synths.pad.triggerAttackRelease(ch, "2m", time, e * 0.2); flash('pad'); }
            if (ins.strings) { synths.strings.triggerAttackRelease(ch, "2m", time, e * 0.2); flash('strings'); }
            if (ins.choir) {
                const high = ch.map(n => n.replace(/\d/, '4'));
                synths.choir.triggerAttackRelease(high, "2m", time, e * 0.15); flash('choir');
            }
            if (ins.texture) { synths.texture.triggerAttackRelease("2m", time, e * 0.1); flash('texture'); }
        }

        const chord = engine.chords[engine.chordIndex];

        // ── RHYTHM ──
        if (ins.kick) {
            if (step%8===0 || (step%8===3&&e>0.65) || (step%8===6&&e>0.8)) {
                synths.kick.triggerAttackRelease("C1","8n",time,Math.min(e*1.1,1)); flash('kick');
            }
        }
        if (ins.snare) {
            if (step%8===4 || (step%16===10&&e>0.5) || (step%16===14&&e>0.8)) {
                synths.snare.triggerAttackRelease("16n",time,e*0.4); flash('snare');
            }
        }
        if (ins.hihat && e > 0.2) {
            if (step%4===0 || (step%2===0&&e>0.5) || e>0.75) {
                synths.hihat.triggerAttackRelease("32n",time,e*0.08); flash('hihat');
            }
        }
        if (ins.clap && step%16===4) {
            synths.clap.triggerAttackRelease("16n",time,e*0.3); flash('clap');
        }
        if (ins.perc && Math.random()<e*0.2 && step%4===2) {
            synths.perc.triggerAttackRelease("32n",time,e*0.1); flash('perc');
        }

        // ── BASS ──
        if (ins.subbass && step%8===0) {
            const root = chord[0].replace(/\d/,'1');
            synths.subbass.triggerAttackRelease(root,"4n",time,e*0.6); flash('subbass');
        }
        if (ins.synbass && step%8===0) {
            const root = chord[0].replace(/\d/,'2');
            synths.synbass.triggerAttackRelease(root, e>0.6?"8n":"4n", time, e*0.5); flash('synbass');
        }

        // ── LEAD ──
        if (ins.lead && Math.random()<e*0.65) {
            if (step%4===0 || (step%4===2&&Math.random()<0.35)) {
                const n = chord[Math.floor(Math.random()*3)].replace(/[23]/,Math.random()>0.5?'5':'4');
                synths.lead.triggerAttackRelease(n,Math.random()>0.5?"8n":"16n",time,e*0.25); flash('lead');
            }
        }

        // ── PLUCK ──
        if (ins.pluck && step%8===0) {
            const n = chord[Math.floor(Math.random()*3)].replace(/[23]/,'4');
            synths.pluck.triggerAttackRelease(n,time); flash('pluck');
        }

        // ── BELL ──
        if (ins.bell && Math.random()<e*0.15 && step%8===0) {
            synths.bell.triggerAttackRelease("16n",time,e*0.08); flash('bell');
        }

        // ── ARP ──
        if (ins.arp && step%2===0) {
            const notes = [...chord.map(n=>n.replace(/[23]/,'4')), ...chord.map(n=>n.replace(/[23]/,'5'))];
            const n = notes[arpStep % notes.length];
            synths.arp.triggerAttackRelease(n,"16n",time,e*0.2); flash('arp');
            arpStep++;
        }

        step = (step+1)%64;
    }, "16n").start(0);

    Tone.Transport.bpm.value = engine.tempo;
    Tone.Transport.start();

    renderInstruments();
    requestAnimationFrame(renderLoop);
    setInterval(updateActivity, 80);
    log("Engine live. Touch the screen or speak to conduct.");
    document.getElementById('conduct-hint').style.opacity = '1';
    setTimeout(() => document.getElementById('conduct-hint').style.opacity = '0', 4000);
}

// ═══════════════════════════════════════════
// PAUSE / RESUME
// ═══════════════════════════════════════════
document.getElementById('pause-btn').addEventListener('click', togglePause);

function togglePause() {
    if (!booted) return;
    engine.paused = !engine.paused;
    const btn = document.getElementById('pause-btn');
    if (engine.paused) {
        Tone.Transport.pause();
        btn.textContent = '▶ Resume'; btn.classList.add('paused');
        log("Paused.");
    } else {
        Tone.Transport.start();
        btn.textContent = '⏸ Pause'; btn.classList.remove('paused');
        log("Resumed.");
    }
}

// ═══════════════════════════════════════════
// TOUCH CONDUCTING
// ═══════════════════════════════════════════
const trail = []; // {x, y, t}
let touching = false;

const touchSurface = document.getElementById('touch-surface');

function handleConductStart(x, y) {
    touching = true;
    document.getElementById('conduct-hint').style.opacity = '0';
    handleConductMove(x, y);
}
function handleConductMove(x, y) {
    if (!touching || !booted) return;
    const nx = x / window.innerWidth;
    const ny = y / window.innerHeight;
    engine.energy = Math.max(0, Math.min(1, 1 - ny));
    engine.filterCutoff = 200 + nx * 7000;
    if (effects.filter) effects.filter.frequency.rampTo(engine.filterCutoff, 0.08);
    updateUI();
    trail.push({ x, y, t: performance.now() });
    if (trail.length > 80) trail.shift();
}
function handleConductEnd() { touching = false; }

// Touch events
touchSurface.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; handleConductStart(t.clientX, t.clientY); }, {passive:false});
touchSurface.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; handleConductMove(t.clientX, t.clientY); }, {passive:false});
touchSurface.addEventListener('touchend', handleConductEnd);
touchSurface.addEventListener('touchcancel', handleConductEnd);

// Mouse fallback
touchSurface.addEventListener('mousedown', e => handleConductStart(e.clientX, e.clientY));
touchSurface.addEventListener('mousemove', e => { if (touching) handleConductMove(e.clientX, e.clientY); });
touchSurface.addEventListener('mouseup', handleConductEnd);
touchSurface.addEventListener('mouseleave', handleConductEnd);

// ═══════════════════════════════════════════
// GEMINI AI
// ═══════════════════════════════════════════
async function interpret(input) {
    if (!input?.trim()) return;
    log('Thinking: "' + input + '"');

    const instList = Object.entries(INSTRUMENTS).map(([k,v]) => k + '(' + v.name + ')').join(', ');

    const prompt = `You control "Conductive", a live music engine with these instruments: ${instList}.

Current: tempo=${engine.tempo}, energy=${engine.energy}, key=${engine.key} ${engine.mode}, filterCutoff=${engine.filterCutoff}, active=[${Object.entries(engine.instruments).filter(([k,v])=>v).map(([k])=>k).join(',')}]

Available keys: C,D,E,F,G,A,B. Modes: minor, major.

The user says: "${input}"

Return ONLY valid JSON. No markdown, no explanation. Include only fields to change:
{"tempo":number(40-200),"energy":number(0-1),"key":"letter","mode":"minor|major","filterCutoff":number(100-8000),"instruments":{"kick":bool,"snare":bool,"hihat":bool,"clap":bool,"perc":bool,"subbass":bool,"synbass":bool,"lead":bool,"pluck":bool,"bell":bool,"arp":bool,"pad":bool,"strings":bool,"choir":bool,"texture":bool}}

Interpret poetic/emotional language musically. Be bold and creative.`;

    try {
        const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + GEMINI_KEY, {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ contents:[{parts:[{text:prompt}]}] })
        });
        const data = await res.json();
        if (!data.candidates?.[0]?.content?.parts?.[0]?.text) {
            log("AI empty — fallback."); localFallback(input); return;
        }
        const raw = data.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim();
        applyAI(JSON.parse(raw));
    } catch(e) {
        console.error(e);
        log("AI error — fallback.");
        localFallback(input);
    }
}

function applyAI(j) {
    if (j.tempo) engine.tempo = Math.max(40, Math.min(200, j.tempo));
    if (j.energy !== undefined) engine.energy = Math.max(0, Math.min(1, j.energy));
    if (j.filterCutoff) engine.filterCutoff = Math.max(100, Math.min(8000, j.filterCutoff));
    if (j.key && KEYS[j.key]) engine.key = j.key;
    if (j.mode === 'major' || j.mode === 'minor') engine.mode = j.mode;
    if (j.instruments) {
        Object.entries(j.instruments).forEach(([k,v]) => {
            if (engine.instruments[k] !== undefined) engine.instruments[k] = !!v;
        });
    }
    if (KEYS[engine.key]?.[engine.mode]) engine.chords = KEYS[engine.key][engine.mode];
    if (booted) {
        Tone.Transport.bpm.rampTo(engine.tempo, 2);
        effects.filter.frequency.rampTo(engine.filterCutoff, 1);
    }
    renderInstruments(); updateUI();
    const activeNames = Object.entries(engine.instruments).filter(([k,v])=>v).map(([k])=>INSTRUMENTS[k].name);
    log('→ ' + engine.tempo + 'bpm ' + engine.key + (engine.mode==='minor'?'m':'') + ' | ' + activeNames.join(', '));
}

function localFallback(cmd) {
    const t = (typeof cmd === 'string' ? cmd : '').toLowerCase();
    if (t.match(/chill|calm|slow|soft|gentle|quiet/)) { engine.tempo=78; engine.energy=0.25; }
    else if (t.match(/hype|dance|party|fast|hard|drop|rave/)) { engine.tempo=130; engine.energy=0.9; engine.instruments.clap=true; engine.instruments.arp=true; }
    else if (t.match(/dark|heavy|intense|aggress/)) { engine.tempo=95; engine.energy=0.75; engine.mode='minor'; engine.instruments.subbass=true; }
    else if (t.match(/bright|happy|major|uplift/)) { engine.mode='major'; engine.energy=0.6; engine.instruments.pluck=true; }
    else if (t.match(/cinematic|epic|film|orchestr/)) { engine.tempo=85; engine.energy=0.6; engine.instruments.strings=true; engine.instruments.pad=true; engine.instruments.subbass=true; }
    else if (t.match(/ambient|space|dream/)) { engine.tempo=70; engine.energy=0.3; engine.instruments.pad=true; engine.instruments.texture=true; engine.instruments.bell=true; }
    if (KEYS[engine.key]?.[engine.mode]) engine.chords = KEYS[engine.key][engine.mode];
    if (booted) Tone.Transport.bpm.rampTo(engine.tempo, 2);
    renderInstruments(); updateUI();
    log('Local → ' + engine.tempo + 'bpm, ' + Math.round(engine.energy*100) + '%');
}

// ═══════════════════════════════════════════
// VOICE — fixed with retry and better handling
// ═══════════════════════════════════════════
document.getElementById('voice-btn').addEventListener('click', startVoice);

function startVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { log("Speech not supported in this browser."); return; }

    const rec = new SR();
    rec.continuous = false;
    rec.interimResults = false;
    rec.lang = 'en-US';
    rec.maxAlternatives = 1;

    const btn = document.getElementById('voice-btn');
    let gotResult = false;

    rec.onstart = () => {
        btn.classList.add('recording');
        btn.textContent = '● Listening…';
        log("Listening…");
    };

    rec.onresult = (e) => {
        gotResult = true;
        const text = e.results[0][0].transcript;
        log('Heard: "' + text + '"');
        interpret(text);
    };

    rec.onerror = (e) => {
        console.log("Speech error:", e.error);
        if (e.error === 'aborted' || e.error === 'no-speech') {
            log("No speech detected. Try again.");
        } else if (e.error === 'not-allowed') {
            log("Mic permission denied. Check browser settings.");
        } else {
            log("Voice error: " + e.error);
        }
    };

    rec.onend = () => {
        btn.classList.remove('recording');
        btn.textContent = '🎤 Voice';
    };

    try { rec.start(); } catch(e) { log("Mic failed: " + e.message); }
}

// STYLE PRESETS
// ═══════════════════════════════════════════
function renderStyleSlots() {
    const el = document.getElementById('style-slots'); el.innerHTML = '';
    for (let i = 0; i < 6; i++) {
        const s = savedStyles[i], d = document.createElement('div');
        d.className = 'style-slot' + (s ? ' filled' : '');
        if (s) {
            d.innerHTML = '<span>' + s.name + '</span><span class="si" title="Overwrite">⟳</span>';
            d.querySelector('span').onclick = () => loadStyle(i);
            d.querySelector('.si').onclick = e => { e.stopPropagation(); saveStyle(i); };
        } else {
            d.innerHTML = '<span>Slot ' + (i+1) + '</span><span class="si" title="Save">+</span>';
            d.querySelector('.si').onclick = e => { e.stopPropagation(); saveStyle(i); };
        }
        el.appendChild(d);
    }
}
function saveStyle(i) {
    const name = prompt('Style name:', 'Style ' + (i+1)); if (!name) return;
    savedStyles[i] = { name, tempo:engine.tempo, energy:engine.energy, key:engine.key, mode:engine.mode,
        instruments:{...engine.instruments}, filterCutoff:engine.filterCutoff };
    renderStyleSlots(); log('Saved "' + name + '"');
}
function loadStyle(i) {
    const s = savedStyles[i]; if (!s) return;
    engine.tempo=s.tempo; engine.energy=s.energy; engine.key=s.key; engine.mode=s.mode;
    engine.filterCutoff=s.filterCutoff; engine.instruments={...s.instruments};
    if (KEYS[engine.key]?.[engine.mode]) engine.chords = KEYS[engine.key][engine.mode];
    if (booted) { Tone.Transport.bpm.rampTo(engine.tempo,2); effects.filter.frequency.rampTo(engine.filterCutoff,0.5); }
    renderInstruments(); updateUI(); log('Loaded "' + s.name + '"');
}
renderStyleSlots();

// HAND TRACKING — async, never blocks
// ═══════════════════════════════════════════
setTimeout(() => {
    const s1 = document.createElement('script');
    s1.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js';
    s1.onload = () => {
        const s2 = document.createElement('script');
        s2.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js';
        s2.onload = () => {
            try {
                const h = new Hands({locateFile:f=>'https://cdn.jsdelivr.net/npm/@mediapipe/hands/'+f});
                h.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:0.6,minTrackingConfidence:0.5});
                h.onResults(r => {
                    if (r.multiHandLandmarks) {
                        r.multiHandLandmarks.forEach(hand => {
                            const p = hand[9];
                            const sx = (1 - p.x) * window.innerWidth;
                            const sy = p.y * window.innerHeight;
                            trail.push({ x:sx, y:sy, t:performance.now() });
                            if (trail.length > 80) trail.shift();
                        });
                        if (r.multiHandLandmarks[0] && !touching) {
                            const p = r.multiHandLandmarks[0][9];
                            engine.energy = Math.max(0, Math.min(1, 1 - p.y));
                            engine.filterCutoff = 200 + p.x * 6000;
                            if (booted) effects.filter?.frequency.rampTo(engine.filterCutoff, 0.08);
                            updateUI();
                        }
                    }
                });
                const v = document.getElementById('video');
                new Camera(v, {onFrame:async()=>{try{await h.send({image:v})}catch(e){}},width:320,height:240}).start();
                log("Hand tracking active.");
            } catch(e) { console.log("MediaPipe skipped:", e); }
        };
        s2.onerror = () => console.log("Camera utils failed.");
        document.head.appendChild(s2);
    };
    s1.onerror = () => console.log("MediaPipe failed.");
    document.head.appendChild(s1);
}, 2000);

// ═══════════════════════════════════════════
// VISUALS
// ═══════════════════════════════════════════
const mainCanvas = document.getElementById('main'), mCtx = mainCanvas.getContext('2d');
const wfCanvas = document.getElementById('waveform'), wCtx = wfCanvas.getContext('2d');

const particles = [];
class Particle {
    constructor(x,y,color) {
        this.x=x; this.y=y; this.color=color||'0,229,255';
        this.vx=(Math.random()-0.5)*3; this.vy=(Math.random()-0.5)*3;
        this.life=1; this.decay=0.008+Math.random()*0.015;
        this.size=1+Math.random()*2.5;
    }
    update(){this.x+=this.vx;this.y+=this.vy;this.vy-=0.01;this.life-=this.decay}
}

function renderLoop() {
    const W = mainCanvas.width = window.innerWidth;
    const H = mainCanvas.height = window.innerHeight;
    const t = performance.now() * 0.001;
    const e = engine.energy;
    const now = performance.now();

    mCtx.clearRect(0, 0, W, H);

    // Background glow
    const grad = mCtx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.55);
    grad.addColorStop(0, 'rgba(0,'+(30+e*50|0)+','+(50+e*70|0)+','+(0.05+e*0.05)+')');
    grad.addColorStop(1, 'transparent');
    mCtx.fillStyle = grad; mCtx.fillRect(0,0,W,H);

    // Central pulse
    const cx=W/2, cy=H/2, baseR=60+e*110;
    mCtx.beginPath();
    for (let a=0;a<Math.PI*2;a+=0.04) {
        const n=Math.sin(a*6+t*3)*12*e + Math.sin(a*3-t*2)*6*e + Math.sin(a*10+t*5)*3*e;
        const r=baseR+n;
        const px=cx+Math.cos(a)*r, py=cy+Math.sin(a)*r;
        a===0?mCtx.moveTo(px,py):mCtx.lineTo(px,py);
    }
    mCtx.closePath();
    mCtx.strokeStyle='rgba(0,229,255,'+(0.1+e*0.25)+')';
    mCtx.lineWidth=1.5;
    mCtx.shadowBlur=25*e; mCtx.shadowColor='#00e5ff';
    mCtx.stroke(); mCtx.shadowBlur=0;

    // Inner rings
    [0.35, 0.55].forEach(s => {
        mCtx.beginPath(); mCtx.arc(cx,cy,baseR*s,0,Math.PI*2);
        mCtx.strokeStyle='rgba(0,229,255,'+(0.03+e*0.05)+')'; mCtx.lineWidth=0.5; mCtx.stroke();
    });

    // ── CONDUCTING TRAIL ──
    if (trail.length > 1) {
        mCtx.beginPath();
        trail.forEach((p, i) => {
            const age = (now - p.t) / 2000; // fade over 2s
            if (age > 1) return;
            const alpha = (1 - age) * 0.7;
            if (i === 0) { mCtx.moveTo(p.x, p.y); return; }
            mCtx.lineTo(p.x, p.y);
        });
        mCtx.strokeStyle = 'rgba(0,229,255,0.5)';
        mCtx.lineWidth = 3;
        mCtx.shadowBlur = 12;
        mCtx.shadowColor = '#00e5ff';
        mCtx.stroke();
        mCtx.shadowBlur = 0;

        // Trail dots
        trail.forEach((p, i) => {
            const age = (now - p.t) / 2000;
            if (age > 1) return;
            const alpha = (1 - age) * 0.6;
            const size = (1 - age) * 5;
            mCtx.beginPath();
            mCtx.arc(p.x, p.y, size, 0, Math.PI * 2);
            mCtx.fillStyle = 'rgba(0,229,255,' + alpha + ')';
            mCtx.fill();
        });

        // Current position glow
        const last = trail[trail.length - 1];
        if (now - last.t < 500) {
            mCtx.beginPath();
            mCtx.arc(last.x, last.y, 12, 0, Math.PI * 2);
            mCtx.fillStyle = 'rgba(0,229,255,0.15)';
            mCtx.fill();
            mCtx.beginPath();
            mCtx.arc(last.x, last.y, 5, 0, Math.PI * 2);
            mCtx.fillStyle = 'rgba(255,255,255,0.8)';
            mCtx.fill();
        }
    }

    // Expire old trail points
    while (trail.length > 0 && now - trail[0].t > 2000) trail.shift();

    // Particles
    if (Math.random() < e * 0.3) {
        const a = Math.random() * Math.PI * 2;
        particles.push(new Particle(cx+Math.cos(a)*baseR, cy+Math.sin(a)*baseR));
    }
    // Trail particles
    if (touching && trail.length > 0) {
        const lp = trail[trail.length-1];
        for (let i=0;i<2;i++) particles.push(new Particle(lp.x, lp.y, '57,255,20'));
    }

    for (let i=particles.length-1;i>=0;i--) {
        const p=particles[i]; p.update();
        if (p.life<=0){particles.splice(i,1);continue}
        mCtx.beginPath(); mCtx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
        mCtx.fillStyle='rgba('+p.color+','+p.life*0.4+')'; mCtx.fill();
    }
    if (particles.length > 200) particles.splice(0, particles.length - 200);

    // Waveform
    if (analyser) {
        wfCanvas.width=W; wfCanvas.height=50;
        const wave=analyser.getValue();
        wCtx.clearRect(0,0,W,50);
        wCtx.beginPath(); wCtx.moveTo(0,25);
        for (let i=0;i<wave.length;i++) wCtx.lineTo((i/wave.length)*W,25+wave[i]*40);
        wCtx.strokeStyle='rgba(0,229,255,0.25)'; wCtx.lineWidth=1; wCtx.stroke();
    }

    requestAnimationFrame(renderLoop);
}

// ═══════════════════════════════════════════
// UI UPDATES
// ═══════════════════════════════════════════
function updateUI() {
    document.getElementById('bpm-val').textContent = Math.round(engine.tempo);
    document.getElementById('energy-val').textContent = Math.round(engine.energy * 100);
    document.getElementById('key-val').textContent = engine.key + (engine.mode==='minor'?'m':'');
    const eVal = document.getElementById('energy-val');
    eVal.style.color = engine.energy > 0.75 ? 'var(--green)' : engine.energy < 0.25 ? 'var(--amber)' : 'var(--cyan)';
}
function log(msg) { document.getElementById('log').textContent = '> ' + msg; }

// Initial render
renderInstruments();
