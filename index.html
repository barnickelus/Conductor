<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--c:#00e5ff;--g:#39ff14;--m:#ff2daa;--a:#ffb300;--bg:#020409;--p:rgba(4,8,20,0.92);--b:rgba(0,229,255,0.1)}
body{background:var(--bg);color:#c0dce6;font-family:'Outfit',sans-serif;overflow:hidden;height:100dvh;width:100vw;touch-action:none}
canvas#viz{position:fixed;inset:0;width:100%;height:100%;z-index:1}

.ui>*{pointer-events:auto}
.m{font-family:'JetBrains Mono',monospace}

/* === TOP BAR === */
.top{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;flex-shrink:0;background:rgba(2,4,9,0.8);backdrop-filter:blur(10px)}
.brand{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:rgba(0,229,255,0.25)}.brand b{color:var(--c)}

.tb:hover{border-color:var(--c)}.tb.on{border-color:var(--g);color:var(--g);background:rgba(57,255,20,0.05)}.tb.pau{border-color:var(--a);color:var(--a)}.tb.rec{border-color:var(--m);color:var(--m)}

/* API */
.apia{position:relative}
.apip{display:flex;align-items:center;gap:4px;font-size:7px;letter-spacing:1px;text-transform:uppercase;padding:4px 7px;border:1px solid var(--b);border-radius:5px;cursor:pointer}
.apid{width:6px;height:6px;border-radius:50%;background:#333;transition:0.3s}
.apip.ok .apid{background:var(--g);box-shadow:0 0 5px rgba(57,255,20,0.5)}.apip.ok{color:var(--g)}
.apip.off .apid{background:var(--a)}.apip.off{color:var(--a)}

@keyframes bl{50%{opacity:0.3}}
.apidd{position:absolute;top:100%;right:0;margin-top:4px;background:var(--p);border:1px solid var(--b);border-radius:6px;padding:8px;width:260px;display:none;backdrop-filter:blur(12px);z-index:20}
.apidd.open{display:block}
.apidd label{font-size:6px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,229,255,0.15);display:block;margin-bottom:3px}
.apidd .n{font-size:6px;color:rgba(0,229,255,0.08);margin-top:3px}

.apir{display:flex;gap:3px}.apir input{flex:1;background:rgba(0,0,0,0.5);border:1px solid var(--b);color:var(--c);padding:5px 7px;border-radius:4px;font-size:9px;outline:none}

.fxb .sl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--c);cursor:pointer}

/* === CONDUCT ZONE === */
.cz{flex:1;min-height:40px;cursor:crosshair}

/* === COMMAND BAR === */

.ic{position:absolute;width:44px;height:44px;transform:translate(-50%,-50%);cursor:grab;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;border:1.5px solid rgba(0,229,255,0.08);background:rgba(4,8,20,0.92);transition:0.08s;user-select:none;z-index:2}
.ic.off{opacity:0.18;border-style:dashed}.ic.on{border-color:rgba(0,229,255,0.3)}
.ic.sel{border-color:var(--c);box-shadow:0 0 10px rgba(0,229,255,0.12);z-index:3}
.ic .s{font-size:13px;line-height:1}.ic .l{font-size:4.5px;letter-spacing:.8px;text-transform:uppercase;color:rgba(0,229,255,0.3);margin-top:1px}
.ic .rn{position:absolute;inset:-3px;border-radius:50%;border:2px solid transparent;transition:0.04s}
.ic.fire .rn{border-color:var(--g);box-shadow:0 0 5px rgba(57,255,20,0.15)}
.ic.drag{cursor:grabbing;z-index:5;border-color:var(--c)}

/* === CHORD PROGRESSION === */
.pb{padding:2px 4px;flex-shrink:0}
.pbox{background:var(--p);border:1px solid var(--b);border-radius:6px;padding:5px 8px;display:flex;align-items:center;gap:6px}
.psw{width:24px;height:12px;border-radius:6px;background:rgba(0,229,255,0.04);border:1px solid var(--b);position:relative;cursor:pointer;flex-shrink:0}
.psw::after{content:'';position:absolute;top:1px;left:1px;width:8px;height:8px;border-radius:50%;background:rgba(0,229,255,0.2);transition:0.2s}
.psw.on{background:rgba(57,255,20,0.06)}.psw.on::after{left:13px;background:var(--g)}
.psl{font-size:6px;letter-spacing:1px;color:rgba(0,229,255,0.2);flex-shrink:0}
.pcs{display:flex;gap:4px;flex:1}
.pc{flex:1;text-align:center;padding:7px 3px;border-radius:5px;border:1px solid rgba(0,229,255,0.05);font-size:12px;font-weight:700;color:rgba(0,229,255,0.2);cursor:pointer;transition:0.1s;position:relative}
.pc.act{border-color:rgba(0,229,255,0.3);color:var(--c);background:rgba(0,229,255,0.03)}
.pc.dim{opacity:0.2}
.pci{position:absolute;top:1px;left:2px;font-size:4px;color:rgba(0,229,255,0.1)}
.ced{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);margin-bottom:2px;background:var(--p);border:1px solid var(--b);border-radius:4px;padding:3px;display:none;z-index:20;min-width:60px}.ced.open{display:flex;flex-wrap:wrap;gap:2px}
.co{padding:3px 5px;border-radius:2px;font-size:7px;color:rgba(0,229,255,0.3);cursor:pointer}.co:hover{background:rgba(0,229,255,0.04);color:var(--c)}.co.cur{color:var(--c)}
.prnd{font-size:15px;color:rgba(0,229,255,0.2);cursor:pointer;padding:3px 5px;flex-shrink:0}.prnd:hover{color:var(--c)}

/* === PATTERN EDITOR === */
.pw{padding:0 4px;max-height:0;transition:max-height 0.3s,opacity 0.3s;opacity:0;overflow:hidden;flex-shrink:0}
.pw.open{max-height:250px;opacity:1}
.ppx{background:var(--p);border:1px solid var(--b);border-radius:6px;padding:6px 8px;margin-top:2px}
.phdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:4px;flex-wrap:wrap}
.ptit{font-size:7px;letter-spacing:1.5px;text-transform:uppercase;color:var(--c)}
.pact{display:flex;gap:6px}
.pact button{background:0;border:1px solid var(--b);color:rgba(0,229,255,0.25);padding:5px 10px;border-radius:4px;font-size:8px;cursor:pointer;min-width:42px;text-align:center;transition:0.12s}
.pact button:hover{color:var(--c);border-color:var(--c)}
.pfx{display:flex;gap:8px;margin-bottom:4px;flex-wrap:wrap;align-items:center}
.pfx .sl{display:flex;align-items:center;gap:3px}
.pfx .sl label{font-size:6px;color:rgba(0,229,255,0.2);letter-spacing:1px;text-transform:uppercase}
.pfx .sl input[type=range]{-webkit-appearance:none;width:50px;height:3px;background:rgba(0,229,255,0.06);border-radius:2px;outline:none}
.pfx .sl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--c);cursor:pointer}
.kmsel{display:none;gap:4px;align-items:center}.kmsel.show{display:flex}
.kmsel .tb{font-size:6px;padding:3px 7px}
.sg{display:flex;gap:1px;user-select:none}
.sc{flex:1;min-width:0;border-radius:2px;border:1px solid rgba(0,229,255,0.02);background:rgba(0,229,255,0.005);position:relative}
.sc:nth-child(4n+1){border-left-color:rgba(0,229,255,0.06)}
.sc.ph::after{content:'';position:absolute;inset:0;border:1px solid var(--g);border-radius:2px;pointer-events:none}
.sg.rh .sc{height:30px;cursor:pointer}.sg.rh .sc.on{background:rgba(0,229,255,0.12);border-color:rgba(0,229,255,0.1)}
.sg.mel .sc{display:flex;flex-direction:column;gap:1px;padding:1px}
.nr{height:13px;border-radius:1px;background:rgba(0,229,255,0.008);cursor:pointer;position:relative}
.nr:active{background:rgba(0,229,255,0.05)}.nr.on{background:rgba(0,229,255,0.15)}
.nrl{position:absolute;left:1px;top:50%;transform:translateY(-50%);font-size:4.5px;color:rgba(0,229,255,0.1);pointer-events:none}.nr.on .nrl{color:rgba(0,229,255,0.4)}

/* SPACER */
.bspc{flex-shrink:0;height:10px}

@media(max-width:700px){.ic{width:36px;height:36px}.ic .s{font-size:11px}.stage{height:min(240px,32vh)}.stat .v{font-size:13px}.fxb .sl input[type=range]{width:50px}}
</style>
</head>
<body>
<canvas id="viz"></canvas>
<div class="ui">
  <div class="top">
    <div class="brand m"><b>Conductive</b> v13.1</div>
    <div class="tmid">
      <button class="tb m" id="startB" style="border-width:2px; font-weight:900;">▶ START ENGINE</button>
      <button class="tb m" id="pauseB" style="display:none">⏸</button>

      <input type="file" id="loadFile" accept=".json" style="display:none" onchange="loadSong(this)">
    </div>
    <div class="tr">
      <div class="apia"><div class="apip m" id="apiP" onclick="document.getElementById('apiDD').classList.toggle('open')"><div class="apid"></div><span id="apiL">No Key</span></div>
        <div class="apidd m" id="apiDD"><label>Gemini API Key</label><div class="apir"><input type="password" id="apiK" placeholder="Paste key"><button onclick="connectAPI()">Go</button></div><div class="n">Memory only. ai.google.dev</div><div class="e" id="apiE"></div></div></div>
      <div class="stats"><div class="stat"><div class="l m">BPM</div><div class="v" id="vB">110</div></div><div class="stat"><div class="l m">Nrg</div><div class="v" id="vE">50</div></div><div class="stat"><div class="l m">Key</div><div class="v" id="vK" style="font-size:11px">Cm</div></div></div>
    </div>

  <div class="stw"><div class="stage" id="stage"><canvas id="sbg"></canvas><div class="cpos m">▲ you</div></div></div>
  <div class="pb"><div class="pbox"><div class="psw on" id="psw" onclick="toggleProg()"></div><div class="psl m">Prog</div><div class="pcs m" id="pcs"></div><div class="prnd m" onclick="randProg()">🎲</div></div></div>
  <div class="pw" id="pw"><div class="ppx">

      </div>
      <div class="kmsel m" id="kmsel">
        <button class="tb" onclick="setKM('piano')">Piano</button>
        <button class="tb" onclick="setKM('organ')">Organ</button>
        <button class="tb" onclick="setKM('elec')">Elec</button>
        <button class="tb" onclick="setKM('class')">Classic</button>
      </div>

<script>
// --- CONSTANTS & DEFS ---
const ST = 16, TIERS = 4, TV = [1, 0.8, 0.65, 0.5];
const DEFS = {
  kick:    {cat:'rhythm',  name:'Kick',    sym:'◉', tier:0, type:'note',  bus:'comp', defOn:true},
  snare:   {cat:'rhythm',  name:'Snare',   sym:'◎', tier:0, type:'noise', bus:'comp', defOn:true},
  hihat:   {cat:'rhythm',  name:'HiHat',   sym:'✧', tier:0, type:'note',  bus:'comp', defOn:true},
  clap:    {cat:'rhythm',  name:'Clap',    sym:'✦', tier:0, type:'noise', bus:'comp', defOn:false},
  perc:    {cat:'rhythm',  name:'Perc',    sym:'◇', tier:1, type:'note',  bus:'comp', defOn:false},
  subbass: {cat:'bass',    name:'Sub',     sym:'≋', tier:1, type:'note',  bus:'comp', defOn:false},
  synbass: {cat:'bass',    name:'Bass',    sym:'≈', tier:1, type:'note',  bus:'comp', defOn:true},
  lead:    {cat:'melodic', name:'Lead',    sym:'♪', tier:2, type:'note',  bus:'del',  defOn:true},
  pluck:   {cat:'melodic', name:'Pluck',   sym:'⊕', tier:2, type:'note',  bus:'del',  defOn:false},
  bell:    {cat:'melodic', name:'Bell',    sym:'♦', tier:2, type:'note',  bus:'cho',  defOn:false},
  arp:     {cat:'melodic', name:'Arp',     sym:'↯', tier:2, type:'note',  bus:'del',  defOn:false},
  violin:  {cat:'melodic', name:'Violin',  sym:'🎻', tier:2, type:'note', bus:'cho',  defOn:false},
  cello:   {cat:'melodic', name:'Cello',   sym:'🎻', tier:2, type:'note', bus:'cho',  defOn:false},
  keys:    {cat:'melodic', name:'Keys',    sym:'🎹', tier:2, type:'poly',  bus:'cho',  defOn:false},
  pad:     {cat:'atmo',    name:'Pad',     sym:'◐', tier:3, type:'poly',  bus:'wide', defOn:false},
  strings: {cat:'atmo',    name:'Strings', sym:'∿', tier:3, type:'poly',  bus:'cho',  defOn:false},
  choir:   {cat:'atmo',    name:'Choir',   sym:'❂', tier:3, type:'poly',  bus:'wide', defOn:false},
  texture: {cat:'atmo',    name:'Texture', sym:'░', tier:3, type:'note',  bus:'rev',  defOn:false},
};

(function autoSpace(){
  const tiers = {};
  Object.entries(DEFS).forEach(([id,d]) => { if(!tiers[d.tier]) tiers[d.tier]=[]; tiers[d.tier].push(id); });
  Object.values(tiers).forEach(ids => {
    const n = ids.length;
    ids.forEach((id,i) => { DEFS[id].angle = n===1 ? 0 : -70 + (140/(n-1))*i; });
  });
})();

const FACTORY = {
  kick:    () => new Tone.MembraneSynth({pitchDecay:0.05,octaves:5,volume:0,envelope:{attack:0.001,decay:0.3,sustain:0,release:0.15}}),
  snare:   () => new Tone.NoiseSynth({volume:-4,noise:{type:'white'},envelope:{attack:0.001,decay:0.15,sustain:0}}),
  hihat:   () => new Tone.Synth({oscillator:{type:"square"},volume:-4,envelope:{attack:0.001,decay:0.035,sustain:0,release:0.01}}),
  clap:    () => new Tone.NoiseSynth({volume:-4,noise:{type:'pink'},envelope:{attack:0.003,decay:0.2,sustain:0}}),
  perc:    () => new Tone.Synth({oscillator:{type:"triangle"},volume:-2,envelope:{attack:0.001,decay:0.06,sustain:0,release:0.01}}),
  subbass: () => new Tone.MonoSynth({oscillator:{type:"sine"},volume:0,envelope:{attack:0.01,decay:0.4,sustain:0.7,release:0.3},filterEnvelope:{attack:0.01,decay:0.1,sustain:0,release:0.3,baseFrequency:40,octaves:2}}),
  synbass: () => new Tone.MonoSynth({oscillator:{type:"sawtooth"},volume:-4,envelope:{attack:0.01,decay:0.2,sustain:0.4,release:0.3},filterEnvelope:{attack:0.01,decay:0.15,sustain:0,release:0.4,baseFrequency:100,octaves:3}}),
  lead:    () => new Tone.MonoSynth({oscillator:{type:"triangle"},volume:-4,envelope:{attack:0.05,decay:0.3,sustain:0.4,release:0.6},filterEnvelope:{attack:0.04,decay:0.3,sustain:0.1,release:0.6,baseFrequency:500,octaves:5}}),
  pluck:   () => new Tone.Synth({oscillator:{type:"triangle"},volume:-4,envelope:{attack:0.001,decay:0.4,sustain:0,release:0.3}}),
  bell:    () => new Tone.Synth({oscillator:{type:"sine"},volume:-4,envelope:{attack:0.001,decay:1.5,sustain:0,release:1}}),
  arp:     () => new Tone.MonoSynth({oscillator:{type:"square"},volume:-6,envelope:{attack:0.01,decay:0.15,sustain:0.2,release:0.3},filterEnvelope:{attack:0.01,decay:0.15,sustain:0.1,release:0.3,baseFrequency:800,octaves:4}}),
  violin:  () => new Tone.MonoSynth({oscillator:{type:"sawtooth"},volume:-6,envelope:{attack:0.3,decay:0.3,sustain:0.8,release:0.5},filterEnvelope:{attack:0.2,decay:0.3,sustain:0.3,release:0.5,baseFrequency:600,octaves:3}}),
  cello:   () => new Tone.MonoSynth({oscillator:{type:"sawtooth"},volume:-4,envelope:{attack:0.4,decay:0.3,sustain:0.8,release:0.6},filterEnvelope:{attack:0.3,decay:0.3,sustain:0.2,release:0.6,baseFrequency:200,octaves:3}}),
  keys:    () => new Tone.PolySynth(Tone.Synth,{oscillator:{type:"triangle"},volume:-4,envelope:{attack:0.01,decay:0.3,sustain:0.5,release:0.4}}),
  pad:     () => new Tone.PolySynth(Tone.Synth,{oscillator:{type:"fatsawtooth",count:3,spread:40},volume:-6,envelope:{attack:2,decay:1,sustain:0.8,release:3}}),
  strings: () => new Tone.PolySynth(Tone.Synth,{oscillator:{type:"fatsawtooth",count:5,spread:20},volume:-6,envelope:{attack:1.2,decay:0.5,sustain:0.9,release:2}}),
  choir:   () => new Tone.PolySynth(Tone.Synth,{oscillator:{type:"fatsine",count:3,spread:15},volume:-4,envelope:{attack:1,decay:0.5,sustain:0.9,release:2}}),
  texture: () => new Tone.Synth({oscillator:{type:"fatsawtooth",count:2,spread:50},volume:-14,envelope:{attack:3,decay:2,sustain:0.4,release:4}}),
};

// --- AUDIO TRIGGER ---
function trig(id, note, dur, time, vel) {
  const s = synths[id], def = DEFS[id]; if(!s || !def) return;
  try {
    if(def.type === 'noise') s.triggerAttackRelease(dur, time, vel);
    else if(def.type === 'poly') s.triggerAttackRelease(note, dur, time, vel);
    else s.triggerAttackRelease(note, dur, time, vel);
  } catch(e) {}
}

const N2S={'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'F':5,'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11};
const S2N=['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
function noteToMidi(ns){const m=ns.match(/^([A-G][b#]?)(\d)$/);if(!m)return 60;return N2S[m[1]]+(+m[2]+1)*12}
function midiToNote(m){return S2N[m%12]+(Math.floor(m/12)-1)}
function chordRoot(ch){return ch?.[0] ? (N2S[ch[0].replace(/\d/,'')] || 0) : 0}
function getScale(k,m){ const s=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'], f=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B']; const iv = m==='minor' ? [0,2,3,5,7,8,10] : [0,2,4,5,7,9,11]; const ri = s.indexOf(k); if(ri<0) return s.slice(0,7); return iv.map(i => (m==='minor'?f:s)[(ri+i)%12]); }
function patNotes(id){ const sc=getScale(E.key,E.mode), d=DEFS[id]; let lo=4,hi=5; if(d.cat==='bass'){lo=2;hi=3} else if(d.cat==='atmo'){lo=3;hi=4} return[sc[4]+hi,sc[2]+hi,sc[0]+hi,sc[4]+lo,sc[2]+lo,sc[0]+lo]; }

function setAP(s,err){apiSt=s;const el=document.getElementById('apiP'),lb=document.getElementById('apiL');el.className='apip m '+(s||'');lb.textContent={ok:'AI On',chk:'…',off:'Fallback','':'No Key'}[s]||'No Key';document.getElementById('apiE').textContent=err||''}
function gURL(){return'https://generativelanguage.googleapis.com/v1beta/models/'+GM[gMi]+':generateContent?key='+gKey}
async function gCall(p,retries){
  const rd=[1500,3000],mx=retries||rd.length;
  for(let a=0;a<=mx;a++){
    try{
      const r=await fetch(gURL(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:p}]}]})});
      const d=await r.json();
      if(r.ok&&d.candidates?.[0]?.content?.parts?.[0]?.text) return{ok:1,text:d.candidates[0].content.parts[0].text};
      if(d.error&&a===mx) return{ok:0,error:d.error.message};
    }catch(e){if(a===mx)return{ok:0,error:e.message}}
    if(a<mx) await new Promise(r=>setTimeout(r,rd[Math.min(a,rd.length-1)]));
  }
  return{ok:0,error:'Retries'};
}

function setGFx(w,v){ if(!booted)return; const n=v/100; if(w==='rev'&&fx.rev) fx.rev.wet.rampTo(n*0.6,0.3); if(w==='del'&&fx.del) fx.del.wet.rampTo(n*0.5,0.3); if(w==='filt'&&fx.filt) fx.filt.frequency.rampTo(200+n*8000,0.3); if(w==='cho'&&fx.cho) fx.cho.wet.rampTo(n*0.7,0.3); }
function setIVol(v){if(!selInst)return;const st=E.inst[selInst];st.uVol=v/100;if(gains[selInst])gains[selInst].gain.rampTo(st.vol*st.uVol,0.1)}
function setISus(v){ if(!selInst||!synths[selInst])return; E.inst[selInst].sus=v/100; try{synths[selInst].set({envelope:{sustain:v/100,release:0.1+(v/100)*2}})}catch(e){} }

// --- STAGE ---
const stageEl=document.getElementById('stage'), sbg=document.getElementById('sbg'), sbgCtx=sbg.getContext('2d');
function sGeo(){const r=stageEl.getBoundingClientRect();return{W:r.width,H:r.height,cx:r.width/2,cy:r.height+10,mr:36,ts:(r.height-5-36)/(TIERS-1)}}
function tierR(t){const g=sGeo();return g.mr+t*g.ts}
function ang2xy(a,t){const g=sGeo(),r=tierR(t),rd=a*Math.PI/180;return{x:g.cx+Math.sin(rd)*r,y:g.cy-Math.cos(rd)*r}}
function xy2ang(x,y){const g=sGeo(),dx=x-g.cx,dy=g.cy-y;return{a:Math.max(-80,Math.min(80,Math.atan2(dx,dy)*180/Math.PI)),t:Math.round(Math.max(0,Math.min(TIERS-1,(Math.sqrt(dx*dx+dy*dy)-g.mr)/g.ts)))}}
function drawArcs(){const g=sGeo();sbg.width=g.W;sbg.height=g.H;const c=sbgCtx;c.clearRect(0,0,g.W,g.H);for(let t=0;t<TIERS;t++){const r=tierR(t);c.beginPath();c.arc(g.cx,g.cy,r,Math.PI+0.12,-0.12);c.strokeStyle='rgba(0,229,255,'+(0.015+(TIERS-1-t)*0.006)+')';c.lineWidth=1;c.stroke()}}

function buildStage(){
  stageEl.querySelectorAll('.ic').forEach(e=>e.remove());
  drawArcs();
  Object.entries(E.inst).forEach(([id,st]) => {
    const d=DEFS[id]; if(!d) return;
    const p=ang2xy(st.angle,st.tier);
    const el=document.createElement('div');
    el.className='ic'+(st.on?' on':' off')+(selInst===id?' sel':'');
    el.id='i-'+id;
    el.style.left=p.x+'px'; el.style.top=p.y+'px';
    el.innerHTML=`<div class="rn"></div><div class="s">${d.sym}</div><div class="l">${d.name}</div>`;
    let drag=false,sx=0,sy=0;
    const oS=(cx,cy)=>{sx=cx;sy=cy;drag=false;el.classList.add('drag')};
    const oM=(cx,cy)=>{ if(Math.abs(cx-sx)+Math.abs(cy-sy)>8) drag=true; if(!drag) return; const rect=stageEl.getBoundingClientRect(), at=xy2ang(cx-rect.left,cy-rect.top); st.angle=at.a; st.tier=at.t; st.pan=Math.sin(at.a*Math.PI/180); st.vol=TV[at.t]; if(panners[id]) panners[id].pan.value=st.pan; if(gains[id]) gains[id].gain.rampTo(st.vol*st.uVol,0.1); const np=ang2xy(st.angle,st.tier); el.style.left=np.x+'px'; el.style.top=np.y+'px'; };
    const oE=()=>{el.classList.remove('drag');if(!drag)tapInst(id)};
    el.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();oS(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
    el.addEventListener('touchmove',e=>{e.stopPropagation();e.preventDefault();oM(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
    el.addEventListener('touchend',oE);
    el.addEventListener('mousedown',e=>{e.stopPropagation();oS(e.clientX,e.clientY); const mm=ev=>oM(ev.clientX,ev.clientY),mu=()=>{oE();window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu)}; window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu); });
    stageEl.appendChild(el);
  });
}

function tapInst(id){if(selInst===id){E.inst[id].on=!E.inst[id].on;upStage();return}selInst=id;upStage();openPat(id)}

function upStage(){Object.keys(E.inst).forEach(id=>{const el=document.getElementById('i-'+id);if(!el||!E.inst[id])return;el.className='ic'+(E.inst[id].on?' on':' off')+(selInst===id?' sel':'')})}
function flashInst(id){const el=document.getElementById('i-'+id);if(!el)return;el.classList.add('fire');setTimeout(()=>el.classList.remove('fire'),60)}
window.addEventListener('resize',()=>{drawArcs();Object.entries(E.inst).forEach(([id,st])=>{const el=document.getElementById('i-'+id);if(!el)return;const p=ang2xy(st.angle,st.tier);el.style.left=p.x+'px';el.style.top=p.y+'px'})});

// --- CLONE ---
function cloneInst(){ if(!selInst||!booted) return; const src=DEFS[selInst], st=E.inst[selInst]; cloneCount++; const nid=selInst+'_c'+cloneCount; DEFS[nid]={cat:src.cat,name:src.name+' '+cloneCount,sym:src.sym,tier:st.tier,angle:(st.angle||0)+8,type:src.type,bus:src.bus,defOn:true}; E.inst[nid]={on:true,angle:(st.angle||0)+8,tier:st.tier,pan:Math.sin(((st.angle||0)+8)*Math.PI/180),vol:TV[st.tier],uVol:st.uVol,sus:st.sus,pat:st.pat.map(p=>[...p]),usePat:st.usePat,patRoot:st.patRoot}; const s=FACTORY[src.name.toLowerCase()]?FACTORY[src.name.toLowerCase()]():FACTORY[selInst.split('_')[0]](); const g=new Tone.Gain(E.inst[nid].vol*E.inst[nid].uVol), p=new Tone.Panner(E.inst[nid].pan); s.connect(g);g.connect(p);p.connect(fx[src.bus]||fx.comp); synths[nid]=s;gains[nid]=g;panners[nid]=p; buildStage();selInst=nid;upStage();openPat(nid); }

// --- PATTERN EDITOR ---
function openPat(id){
  const d=DEFS[id], st=E.inst[id]; if(!d||!st) return;
  document.getElementById('ptit').textContent=d.name; document.getElementById('pw').classList.add('open');
  document.getElementById('iVol').value=Math.round(st.uVol*100); document.getElementById('iSus').value=Math.round(st.sus*100);
  document.getElementById('kmsel').classList.toggle('show', id==='keys' || d.name?.startsWith('Keys'));
  const g=document.getElementById('sg'), isR=d.cat==='rhythm'; g.innerHTML=''; g.className='sg '+(isR?'rh':'mel'); const notes=isR ? [] : patNotes(id);
  for(let s=0; s<ST; s++){
    const cell=document.createElement('div'); cell.className='sc';
    if(isR){ if(st.pat[s].length) cell.classList.add('on'); cell.addEventListener('pointerdown', e=>{ e.preventDefault();e.stopPropagation(); st.pat[s]=st.pat[s].length?[]:['hit']; st.usePat=st.pat.some(p=>p.length); cell.classList.toggle('on',st.pat[s].length>0); }); }
    else { notes.forEach(ns=>{ const row=document.createElement('div'); row.className='nr'+(st.pat[s].includes(ns)?' on':''); row.innerHTML='<span class="nrl">'+ns+'</span>'; row.addEventListener('pointerdown', e=>{ e.preventDefault();e.stopPropagation(); const arr=st.pat[s], idx=arr.indexOf(ns); if(idx>=0) arr.splice(idx,1); else arr.push(ns); row.classList.toggle('on',arr.includes(ns)); st.usePat=st.pat.some(p=>p.length); if(st.usePat && st.patRoot===undefined) st.patRoot=chordRoot(E.chords[E.ci]); }); cell.appendChild(row); }); }
    g.appendChild(cell);
  }
}
function upPlayhead(){ if(!selInst) return; const cells=document.getElementById('sg').children, s16=cStep%ST; for(let i=0;i<ST;i++){ if(cells[i]) cells[i].classList.toggle('ph',i===s16); } }
function clearPat(){if(!selInst)return;E.inst[selInst].pat=Array.from({length:ST},()=>[]);E.inst[selInst].usePat=false;E.inst[selInst].patRoot=undefined;openPat(selInst)}
function randPat(){ if(!selInst) return; const d=DEFS[selInst], st=E.inst[selInst], e=E.energy; const notes=d.cat==='rhythm'?[]:patNotes(selInst); for(let s=0;s<ST;s++){ st.pat[s]=[]; if(Math.random()<e*0.45){ if(d.cat==='rhythm') st.pat[s]=['hit']; else { st.pat[s]=[notes[Math.floor(Math.random()*notes.length)]]; if(Math.random()<0.2){const n2=notes[Math.floor(Math.random()*notes.length)];if(!st.pat[s].includes(n2))st.pat[s].push(n2)} } } } st.usePat=true; st.patRoot=chordRoot(E.chords[E.ci]); openPat(selInst); }

// --- CHORDS ---
function toggleProg(){autoProg=!autoProg;document.getElementById('psw').classList.toggle('on',autoProg);renderChords()}
function chordName(n){if(!n?.length)return'?';const r=n[0].replace(/\d/,'');let ri=N2S[r];const sec=n[1]?.replace(/\d/,'');let si=N2S[sec];if(ri===undefined||si===undefined)return r;return((si-ri+12)%12===3)?r+'m':r}
function availChords(){const sc=getScale(E.key,E.mode);return[0,1,2,3,4,5,6].map(d=>({notes:[sc[d]+'3',sc[(d+2)%7]+'3',sc[(d+4)%7]+'3']}))}
function renderChords(){ const el=document.getElementById('pcs');el.innerHTML=''; E.chords.forEach((ch,i)=>{ const d=document.createElement('div'); d.className='pc m'+(i===E.ci?' act':'')+(autoProg?'':i===E.ci?'':' dim'); d.innerHTML='<span class="pci">'+(i+1)+'</span>'+chordName(ch); d.addEventListener('pointerdown',e=>{e.stopPropagation();editChord(i,d)}); el.appendChild(d); }); }
function editChord(idx,anch){ document.querySelectorAll('.ced.open').forEach(d=>d.remove()); const av=availChords(),dr=document.createElement('div');dr.className='ced open'; av.forEach(ch=>{const o=document.createElement('div');o.className='co m'+(chordName(ch.notes)===chordName(E.chords[idx])?' cur':'');o.textContent=chordName(ch.notes);o.addEventListener('pointerdown',e=>{e.stopPropagation();E.chords[idx]=ch.notes;dr.remove();renderChords()});dr.appendChild(o)}); anch.style.position='relative';anch.appendChild(dr); setTimeout(()=>{const cl=e=>{if(!dr.contains(e.target)){dr.remove();document.removeEventListener('pointerdown',cl)}};document.addEventListener('pointerdown',cl)},50); }
function upChordHL(){const cells=document.getElementById('pcs')?.children;if(!cells)return;for(let i=0;i<cells.length;i++)cells[i].classList.toggle('act',i===E.ci)}
function randProg(){const av=availChords();E.chords=Array.from({length:4},()=>av[Math.floor(Math.random()*av.length)].notes);renderChords()}

// --- BOOT ENGINE ---
async function boot(){
  if(booted) return;
  try{ await Tone.start(); console.log("Audio Context Started"); } catch(e){ lg("Start failed."); return; }
  booted=true;
  document.getElementById('startB').textContent='● LIVE';
  document.getElementById('startB').className='tb m on';
  document.getElementById('pauseB').style.display='';
  
  // Wire Audio
  fx.master = new Tone.Gain(0.9).toDestination();
  fx.rev = new Tone.Reverb({decay:4,wet:0.12}).connect(fx.master); await fx.rev.ready;
  fx.filt = new Tone.Filter(E.fc,"lowpass").connect(fx.rev);
  fx.del = new Tone.FeedbackDelay("8n.",0.2).connect(fx.filt);
  fx.cho = new Tone.Chorus(3,2.5,0.5).connect(fx.rev).start();
  fx.comp = new Tone.Compressor(-10,3).connect(fx.master);
  fx.wide = new Tone.StereoWidener(0.5).connect(fx.rev);
  analyser = new Tone.Analyser('waveform',256); fx.master.connect(analyser);

  Object.entries(E.inst).forEach(([id,st]) => {
    const base = id.split('_')[0], d = DEFS[base] || DEFS[id]; if(!d) return;
    const s = FACTORY[base] ? FACTORY[base]() : FACTORY.lead();
    const g = new Tone.Gain(st.vol*st.uVol), p = new Tone.Panner(st.pan);
    s.connect(g); g.connect(p); p.connect(fx[d.bus]||fx.comp);
    synths[id]=s; gains[id]=g; panners[id]=p;
  });

  // Sequencer
  let arpS=0;
  new Tone.Loop(time => {
    const s16 = cStep%ST, e = E.energy;
    if(s16===0 && autoProg) E.ci=(E.ci+1)%E.chords.length;
    const ch = E.chords[E.ci];
    if(s16===0){
      ['pad','strings'].forEach(id=>{ if(E.inst[id]?.on&&!E.inst[id].usePat) trig(id,ch,"1m",time,e*0.5+0.3) });
      if(E.inst.choir?.on&&!E.inst.choir.usePat) trig('choir',ch.map(n=>n.replace(/\d/,'4')),"1m",time,e*0.5+0.3);
      if(E.inst.texture?.on&&!E.inst.texture.usePat) trig('texture',ch[0].replace(/\d/,'2'),"1m",time,e*0.3+0.2);
    }
    Object.entries(E.inst).forEach(([id,st]) => {
      if(!st.on) return; const base=id.split('_')[0], d=DEFS[base]||DEFS[id]; if(!d) return;
      if(st.usePat){ const v=st.pat[s16]; if(v.length) playPatStep(id,d,ch,v,time,e); }
      else { genPlay(id,d,ch,s16,time,e,arpS); }
    });
    if(E.inst.arp?.on) arpS++;
    cStep++;
    Tone.Draw.schedule(()=>{upPlayhead();upChordHL()},time);
  },"16n").start(0);

  Tone.Transport.bpm.value=E.tempo;
  Tone.Transport.start();
  buildStage();
  requestAnimationFrame(renderViz);
  lg("Ready. Drag icons or use commands.");
}

function playPatStep(id, d, ch, vals, time, e) {
  const st=E.inst[id], shift = st.patRoot!==undefined ? (chordRoot(ch)-st.patRoot+12)%12 : 0;
  const dur = d.cat==='bass'?'4n' : d.cat==='atmo'?'2n' : '8n';
  if(d.cat==='rhythm'){
    if(id.startsWith('kick')) trig(id,"C1","8n",time,e*0.7+0.3);
    else if(id.startsWith('hihat')) trig(id,"C8","32n",time,e*0.6+0.3);
    else if(id.startsWith('perc')) trig(id,"G6","16n",time,e*0.6+0.3);
    else trig(id, null, "16n", time, e*0.6+0.3);
  } else {
    const notes = vals.map(ns => shift===0 ? ns : midiToNote(noteToMidi(ns)+shift));
    trig(id, d.type==='poly'?notes:notes[0], dur, time, e*0.5+0.3);
  }
  flashInst(id);
}

function genPlay(id, d, ch, s, t, e, arpS) {
  const V = e*0.5+0.3, base = id.split('_')[0];
  switch(base){
    case'kick':    if(s%8===0||(s%8===3&&e>0.6)){trig(id,"C1","8n",t,V);flashInst(id)}break;
    case'snare':   if(s%8===4){trig(id,null,"16n",t,V);flashInst(id)}break;
    case'hihat':   if(e>0.1&&(s%4===0||(s%2===0&&e>0.4))){trig(id,"C8","32n",t,V);flashInst(id)}break;
    case'subbass': if(s%8===0){trig(id,ch[0].replace(/\d/,'1'),"4n",t,V);flashInst(id)}break;
    case'synbass': if(s%8===0){trig(id,ch[0].replace(/\d/,'2'),"4n",t,V);flashInst(id)}break;
    case'lead':    if(Math.random()<e*0.5&&s%4===0){trig(id,ch[Math.floor(Math.random()*3)].replace(/[23]/,'5'),"8n",t,V);flashInst(id)}break;
    case'arp':     if(s%2===0){const ns=[...ch.map(n=>n.replace(/[23]/,'4')),...ch.map(n=>n.replace(/[23]/,'5'))];trig(id,ns[arpS%ns.length],"16n",t,V);flashInst(id)}break;
    case'keys':    if(s%4===0){trig(id,ch.map(n=>n.replace(/\d/,'4')),"4n",t,V*0.8);flashInst(id)}break;
  }
}
