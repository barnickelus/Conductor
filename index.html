<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Conductive v2 — Musical Engine</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body { margin:0; background:#000; color:#0ff; font-family:sans-serif; }
video, canvas {
  position:absolute; top:0; left:0;
  width:100%; height:100%; object-fit:cover;
}
#ui { position:fixed; bottom:10px; left:10px; }
button { padding:10px; margin:4px; }
#status { font-size:12px; white-space:pre-line; }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="ui">
  <button onclick="startAudio()">Start Audio</button>
  <button onclick="startVoice()">Voice</button>
  <button onclick="startPitch()">Humming</button>
  <div id="status">Ready</div>
</div>

<script>
// ---------------- STATE ----------------
let tempo = 90;
let volume = 0.6;

// SCALE (C Major Pentatonic)
const scale = ["C","D","E","G","A"];

// DRUM PATTERNS
let step = 0;
const kickPattern = [1,0,0,1,0,0,1,0];
const snarePattern = [0,0,1,0,0,0,1,0];

let drumDensity = 1;
let drumActive = true;
let fluteActive = true;

// ---------------- AUDIO ----------------
let flute, kick, snare, loop;

async function startAudio(){
  await Tone.start();

  flute = new Tone.Synth({
    oscillator: { type: "sine" }
  }).toDestination();

  kick = new Tone.MembraneSynth().toDestination();
  snare = new Tone.NoiseSynth({
    noise: { type: "white" },
    envelope: { attack:0.001, decay:0.2, sustain:0 }
  }).toDestination();

  loop = new Tone.Loop(time => {

    // DRUMS
    if(drumActive){
      if(kickPattern[step] && Math.random()<drumDensity){
        kick.triggerAttackRelease("C2","8n",time);
      }
      if(snarePattern[step] && Math.random()<drumDensity){
        snare.triggerAttackRelease("8n",time);
      }
    }

    // MELODY (steady base)
    if(fluteActive){
      const note = getScaleNote(4);
      flute.volume.value = (volume*20)-20;
      flute.triggerAttackRelease(note,"16n",time);
    }

    step = (step + 1) % kickPattern.length;

  }, "16n").start(0);

  Tone.Transport.bpm.value = tempo;
  Tone.Transport.start();

  status("Audio started");
}

// ---------------- SCALE ----------------
function getScaleNote(octave){
  const n = scale[Math.floor(Math.random()*scale.length)];
  return n + octave;
}

// ---------------- GESTURE ----------------
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastY=null,lastTime=null;

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({ maxNumHands:1 });

hands.onResults(results=>{
  if(results.multiHandLandmarks.length>0){
    const y = results.multiHandLandmarks[0][0].y;
    const now = Date.now();

    if(lastY!==null){
      const speed = Math.abs(y-lastY)/(now-lastTime);

      tempo = Math.max(60, Math.min(160, speed*1800));
      volume = Math.min(1, speed*4);

      Tone.Transport.bpm.value = tempo;

      status(`Tempo:${tempo.toFixed(0)}\nVolume:${volume.toFixed(2)}`);
    }

    lastY=y;
    lastTime=now;
  }
});

new Camera(video,{
  onFrame: async()=>{ await hands.send({image:video}); }
}).start();

// ---------------- VOICE ----------------
function interpret(text){
  text = text.toLowerCase();

  if(text.includes("faster")) tempo += 10;
  if(text.includes("slower")) tempo -= 10;

  if(text.includes("drums off")) drumActive=false;
  if(text.includes("drums on")) drumActive=true;

  if(text.includes("soft")) volume=0.3;
  if(text.includes("intense")) volume=0.9;

  if(text.includes("thin")) drumDensity -= 0.3;
  if(text.includes("more drums")) drumDensity += 0.3;

  drumDensity = Math.max(0, Math.min(1, drumDensity));
}

function startVoice(){
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  const rec = new SR();
  rec.continuous=true;

  rec.onresult=e=>{
    const t = e.results[e.results.length-1][0].transcript;
    interpret(t);
    status("Heard: "+t);
  };

  rec.start();
}

// ---------------- HUMMING ----------------
let audioCtx, analyser, data;

async function startPitch(){
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});

  const mic = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize=2048;

  mic.connect(analyser);
  data = new Float32Array(analyser.fftSize);

  detectPitch();
}

function autoCorrelate(buf,sr){
  let best=0, bestVal=0;
  for(let i=20;i<1000;i++){
    let sum=0;
    for(let j=0;j<buf.length-i;j++){
      sum+=buf[j]*buf[j+i];
    }
    if(sum>bestVal){bestVal=sum;best=i;}
  }
  return sr/best;
}

// SNAP TO SCALE
function snapToScale(freq){
  const A4=440;
  let n = Math.round(12*Math.log2(freq/A4))+57;
  const noteNames=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  let name = noteNames[n%12];

  // force into scale
  if(!scale.includes(name)){
    name = scale[Math.floor(Math.random()*scale.length)];
  }

  return name + Math.floor(n/12);
}

function detectPitch(){
  analyser.getFloatTimeDomainData(data);
  let freq = autoCorrelate(data, audioCtx.sampleRate);

  if(freq>50 && fluteActive){
    const note = snapToScale(freq);

    // QUANTIZED PLAY
    Tone.Transport.scheduleOnce(time=>{
      flute.triggerAttackRelease(note,"8n",time);
    }, "+0");

    status("🎤 "+note);
  }

  requestAnimationFrame(detectPitch);
}

// ---------------- UTIL ----------------
function status(t){
  document.getElementById("status").innerText = t;
}
</script>

</body>
</html>
