<style>

canvas#sbg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

/* CHORDS */

.pc.act{border-color:var(--c);color:var(--c);background:rgba(0,229,255,0.1)}

/* PATTERN EDITOR */
.pw{padding:0 8px;max-height:0;transition:all 0.3s ease;opacity:0;overflow:hidden;flex-shrink:0}
.pw.open{max-height:420px;opacity:1;padding-bottom:10px}
.ppx{background:var(--p);border:1px solid var(--b);border-radius:8px;padding:12px}

.pact button{background:rgba(0,229,255,0.05);border:1px solid var(--b);color:var(--c);padding:6px 8px;border-radius:4px;font-size:9px;text-transform:uppercase;cursor:pointer}

.sg{display:flex;gap:2px}

.sc.ph::after{content:'';position:absolute;inset:-1px;border:2px solid var(--g);border-radius:3px;pointer-events:none}
.sg.rh .sc{height:44px;cursor:pointer}.sg.rh .sc.on{background:rgba(0,229,255,0.3);border-color:var(--c)}
.sg.mel .sc{display:flex;flex-direction:column;gap:1px;padding:1px}
.nr{height:16px;border-radius:2px;background:rgba(0,229,255,0.02);cursor:pointer;position:relative}
.nr.on{background:rgba(0,229,255,0.4);border:1px solid rgba(0,229,255,0.2)}

.nr.on .nrl{color:rgba(0,229,255,0.8)}
</style>

<body>
<canvas id="viz"></canvas>
<div class="ui">
  <div class="top">
    <div class="brand m"><b>Conductive</b> v20</div>
    <div class="tmid">
      <button class="tb m" id="startB">▶ Start</button>
      <button class="tb m" id="pauseB" style="display:none">⏸</button>
    </div>
    <div class="stats m"><div class="stat"><div class="l">BPM</div><div class="v" id="vB">110</div></div><div class="stat"><div class="l">Key</div><div class="v" id="vK">Cm</div></div></div>
  </div>

  <div class="cmdb">
    <input type="text" id="cmdIn" class="m" placeholder="Ask AI to change things... (e.g., 'Violin only', 'Fast tempo')">
    <button class="tb m" id="cmdGo">→</button>
  </div>

  <div class="cz" id="cz"><div class="conduct-hint m">Conducting Space</div></div>

  <div class="stw"><div class="stage" id="stage"><canvas id="sbg"></canvas></div></div>

  <div class="pb"><div class="pbox"><div class="pcs m" id="pcs"></div><button class="tb m" onclick="randProg()">🎲</button></div></div>

  <div class="pw" id="pw"><div class="ppx">
    <div class="phdr">
      <div class="ptit m" id="ptit">—</div>
      <div class="c-togs m">
        <div class="ctog" onclick="togC(0)" id="ctog-0">1</div>
        <div class="ctog" onclick="togC(1)" id="ctog-1">2</div>
        <div class="ctog" onclick="togC(2)" id="ctog-2">3</div>
        <div class="ctog" onclick="togC(3)" id="ctog-3">4</div>
      </div>
      <div class="pact m">
        <button onclick="clearPat()">Clear</button>
        <button onclick="doRand(true)">Regen</button>
        <button onclick="doRand(false)">Random</button>
        <button onclick="doClone()">Clone</button>
        <button onclick="deselect()">✕</button>
      </div>
    </div>
    <div class="sg" id="sg"></div>
  </div></div>
</div>

<script>
const ST=16, TIERS=4, TV=[1, 0.8, 0.6, 0.45];

// ENSEMBLE DEFINITION
const DEFS = {
  kick:    {cat:'rhythm',  name:'Kick',    sym:'◉', tier:0, type:'note',  bus:'comp', on:true,  angle:-80},
  snare:   {cat:'rhythm',  name:'Snare',   sym:'◎', tier:0, type:'noise', bus:'comp', on:true,  angle:-55},
  hihat:   {cat:'rhythm',  name:'HiHat',   sym:'✧', tier:0, type:'note',  bus:'comp', on:true,  angle:-30},
  bass:    {cat:'bass',    name:'Bass',    sym:'≈', tier:1, type:'note',  bus:'comp', on:true,  angle:-15},
  violin:  {cat:'melodic', name:'Violin',  sym:'🎻', tier:2, type:'note', bus:'rev',  on:true,  angle:10},
  cello:   {cat:'melodic', name:'Cello',   sym:'🎻', tier:1, type:'note', bus:'rev',  on:true,  angle:35},
  gurdy:   {cat:'drone',   name:'Gurdy',   sym:'⚙️', tier:2, type:'note', bus:'cho',  on:false, angle:60},
  keys:    {cat:'melodic', name:'Keys',    sym:'🎹', tier:2, type:'poly', bus:'del',  on:false, angle:0},
};

const FACTORY = {
  kick:    () => new Tone.MembraneSynth({envelope:{attack:0.001,decay:0.3,sustain:0}}),
  snare:   () => new Tone.NoiseSynth({volume:-6,envelope:{attack:0.001,decay:0.1,sustain:0}}),
  hihat:   () => new Tone.MetalSynth({volume:-20,envelope:{attack:0.001,decay:0.05}}),
  bass:    () => new Tone.MonoSynth({oscillator:{type:"sawtooth"},envelope:{attack:0.02,decay:0.2,sustain:0.2}}),
  violin:  () => new Tone.MonoSynth({oscillator:{type:"fatsawtooth",count:3,spread:20},envelope:{attack:0.1,decay:0.3,sustain:0.4}}),
  cello:   () => new Tone.MonoSynth({oscillator:{type:"fatsawtooth",count:3,spread:15},envelope:{attack:0.15,decay:0.4,sustain:0.5}}),
  gurdy:   () => new Tone.MonoSynth({oscillator:{type:"fatsawtooth",count:5,spread:30},envelope:{attack:0.5,decay:0.5,sustain:0.8}}),
  keys:    () => new Tone.PolySynth(Tone.Synth,{volume:-10,envelope:{attack:0.02,decay:0.3,sustain:0.4,release:1}})
};

const E = {
  tempo:110, energy:0.5, ci:0, key:'C', mode:'minor',
  chords:[["C3","Eb3","G3"],["Ab2","C3","Eb3"],["Bb2","D3","F3"],["G2","B2","D3"]],
  inst:{}
};

// Initial State Setup
Object.entries(DEFS).forEach(([k,d]) => {
  E.inst[k] = { 
    id:k, on:d.on, angle:d.angle, tier:d.tier, pan:Math.sin(d.angle*Math.PI/180), vol:TV[d.tier], uVol:1,
    pat:Array.from({length:ST},()=>[]), chordAllowed:[true,true,true,true]
  };
});

let synths={}, panners={}, gains={}, fx={}, booted=false, cStep=0, selInst=null, cloneCount=0;

// UI Components
const stageEl=document.getElementById('stage'), sbg=document.getElementById('sbg'), sbgCtx=sbg.getContext('2d');
function sGeo(){const r=stageEl.getBoundingClientRect();return{W:r.width,H:r.height,cx:r.width/2,cy:r.height+20,mr:50,ts:(r.height-50-10)/(TIERS-1)}}
function tierR(t){const g=sGeo(); return g.mr+t*g.ts}
function a2xy(a,t){const g=sGeo(),r=tierR(t),rd=a*Math.PI/180; return{x:g.cx+Math.sin(rd)*r,y:g.cy-Math.cos(rd)*r}}
function xy2at(x,y){const g=sGeo(),dx=x-g.cx,dy=g.cy-y; return{a:Math.max(-85,Math.min(85,Math.atan2(dx,dy)*180/Math.PI)),t:Math.round(Math.max(0,Math.min(TIERS-1,(Math.sqrt(dx*dx+dy*dy)-g.mr)/g.ts)))}}

function buildStage(){
  stageEl.querySelectorAll('.ic').forEach(e=>e.remove());
  const g=sGeo(); sbg.width=g.W; sbg.height=g.H;
  sbgCtx.clearRect(0,0,g.W,g.H);
  for(let t=0;t<TIERS;t++){
    sbgCtx.beginPath(); sbgCtx.arc(g.cx,g.cy,tierR(t),Math.PI+0.1, -0.1);
    sbgCtx.strokeStyle='rgba(0,229,255,0.06)'; sbgCtx.stroke();
  }
  Object.entries(E.inst).forEach(([id,st])=>{
    const base=id.split('_')[0], d=DEFS[base];
    const p=a2xy(st.angle,st.tier), el=document.createElement('div');
    el.className='ic'+(st.on?' on':' off')+(selInst===id?' sel':''); el.id='i-'+id;
    el.style.left=p.x+'px'; el.style.top=p.y+'px';
    el.innerHTML=`<div class="rn"></div><div class="s">${d.sym}</div><div class="l">${d.name}${id.includes('_')?id.split('_')[1]:''}</div>`;
    el.addEventListener('pointerdown',e=>{
      let drag=false, sx=e.clientX, sy=e.clientY;
      const mm=ev=>{
        if(Math.abs(ev.clientX-sx)>5||Math.abs(ev.clientY-sy)>5) drag=true;
        if(drag){
          const rect=stageEl.getBoundingClientRect(), r=xy2at(ev.clientX-rect.left,ev.clientY-rect.top);
          st.angle=r.a; st.tier=r.t; st.pan=Math.sin(r.a*Math.PI/180); st.vol=TV[r.t];
          if(panners[id]) panners[id].pan.value=st.pan;
          if(gains[id]) gains[id].gain.rampTo(st.vol*st.uVol,0.1);
          const np=a2xy(st.angle,st.tier); el.style.left=np.x+'px'; el.style.top=np.y+'px';
        }
      }, mu=()=>{if(!drag)tapI(id);window.removeEventListener('pointermove',mm);window.removeEventListener('pointerup',mu)};
      window.addEventListener('pointermove',mm);window.addEventListener('pointerup',mu);
    });
    stageEl.appendChild(el);
  });
}

function tapI(id){ if(selInst===id){E.inst[id].on=!E.inst[id].on; upS(); return} selInst=id; upS(); openP(id); }
function deselect(){selInst=null; document.getElementById('pw').classList.remove('open'); upS()}
function upS(){ Object.keys(E.inst).forEach(id=>{const el=document.getElementById('i-'+id); if(el)el.className='ic'+(E.inst[id].on?' on':' off')+(selInst===id?' sel':'')})}

function getScale(k,m){
  const s=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const iv=m==='minor'?[0,2,3,5,7,8,10]:[0,2,4,5,7,9,11], ri=s.indexOf(k);
  return iv.map(i=>s[(ri+i)%12]);
}

function openP(id){
  const st=E.inst[id], base=id.split('_')[0], d=DEFS[base];
  document.getElementById('ptit').textContent=(d.name+(id.includes('_')?' '+id.split('_')[1]:''));
  document.getElementById('pw').classList.add('open');
  upCT();
  const g=document.getElementById('sg'), isR=d.cat==='rhythm';
  const sc=getScale(E.key,E.mode), lo=(d.cat==='bass'||d.cat==='drone')?2:4;
  const notes=[sc[0]+(lo+1),sc[6]+lo,sc[5]+lo,sc[4]+lo,sc[3]+lo,sc[2]+lo,sc[1]+lo,sc[0]+lo];
  g.innerHTML=''; g.className='sg '+(isR?'rh':'mel');
  for(let s=0;s<ST;s++){
    const cell=document.createElement('div'); cell.className='sc';
    if(isR){
      if(st.pat[s].length) cell.classList.add('on');
      cell.onclick=()=>{st.pat[s]=st.pat[s].length?[]:['hit']; cell.classList.toggle('on',st.pat[s].length>0)};
    } else {
      notes.forEach(n=>{
        const r=document.createElement('div'); r.className='nr'+(st.pat[s].includes(n)?' on':'');
        r.innerHTML=`<span class="nrl">${n}</span>`;
        r.onclick=()=>{const i=st.pat[s].indexOf(n); if(i>-1)st.pat[s].splice(i,1); else st.pat[s].push(n); r.classList.toggle('on',st.pat[s].includes(n))};
        cell.appendChild(r);
      });
    }
    g.appendChild(cell);
  }
}

function doRand(isLogical){
  if(!selInst)return; const st=E.inst[selInst], base=selInst.split('_')[0], d=DEFS[base];
  const sc=getScale(E.key,E.mode), lo=(d.cat==='bass'||d.cat==='drone')?2:4;
  const notes=[sc[0]+(lo+1),sc[6]+lo,sc[5]+lo,sc[4]+lo,sc[3]+lo,sc[2]+lo,sc[1]+lo,sc[0]+lo];
  st.pat=Array.from({length:ST},()=>[]);
  for(let s=0;s<ST;s++){
    if(isLogical){
      if(base==='kick'&&s%4===0) st.pat[s]=['hit'];
      if(base==='snare'&&s%8===4) st.pat[s]=['hit'];
      if(base==='hihat'&&(s%2===0||Math.random()<0.2)) st.pat[s]=['hit'];
      if(d.cat==='melodic' && s%4===0 && Math.random()<0.4) st.pat[s]=[notes[Math.floor(Math.random()*4)]];
      if(d.cat==='bass' && s%8===0) st.pat[s]=[notes[7]];
    } else {
      if(Math.random()>0.8) st.pat[s]=d.cat==='rhythm'?['hit']:[notes[Math.floor(Math.random()*notes.length)]];
    }
  }
  openP(selInst);
}

function doClone(){
  if(!selInst)return; cloneCount++;
  const base=selInst.split('_')[0], newId=base+'_'+cloneCount;
  E.inst[newId]=JSON.parse(JSON.stringify(E.inst[selInst]));
  E.inst[newId].id=newId; E.inst[newId].angle+=15;
  if(E.inst[newId].angle>85) E.inst[newId].angle=-85;
  if(booted) createS(newId, base);
  buildStage(); tapI(newId);
}

function clearPat(){ if(selInst){E.inst[selInst].pat=Array.from({length:ST},()=>[]); openP(selInst);}}
function togC(i){ if(selInst){E.inst[selInst].chordAllowed[i]=!E.inst[selInst].chordAllowed[i]; upCT();}}
function upCT(){ if(!selInst)return; for(let i=0;i<4;i++){const el=document.getElementById('ctog-'+i); el.className='ctog'+(E.inst[selInst].chordAllowed[i]?' on':'')+(i===E.ci?' cur':'')}}

function createS(id, base){
  const st=E.inst[id], s=FACTORY[base](), g=new Tone.Gain(st.vol*st.uVol), p=new Tone.Panner(st.pan);
  s.connect(g); g.connect(p); p.connect(fx[DEFS[base].bus]||fx.comp);
  synths[id]=s; gains[id]=g; panners[id]=p;
}

async function start(){
  if(booted) return; await Tone.start(); booted=true;
  document.getElementById('startB').textContent='● Live'; document.getElementById('startB').classList.add('on');
  document.getElementById('pauseB').style.display='';
  fx.rev=new Tone.Reverb(2.5).toDestination(); await fx.rev.ready;
  fx.comp=new Tone.Compressor(-12,3).connect(fx.rev);
  fx.del=new Tone.FeedbackDelay("8n",0.4).connect(fx.rev);
  fx.cho=new Tone.Chorus(4,2.5,0.5).connect(fx.rev).start();
  Object.keys(E.inst).forEach(id=>createS(id, id.split('_')[0]));
  new Tone.Loop(time=>{
    if(cStep%ST===0) E.ci=(E.ci+1)%4;
    Object.entries(E.inst).forEach(([id,st])=>{
      if(!st.on||!st.chordAllowed[E.ci]||!st.pat[cStep%ST].length)return;
      const base=id.split('_')[0], d=DEFS[base], ch=E.chords[E.ci], v=st.pat[cStep%ST][0];
      try {
        if(d.cat==='rhythm') synths[id].triggerAttackRelease(d.type==='noise'?'8n':v,'8n',time);
        else if(d.cat==='bass') synths[id].triggerAttackRelease(ch[0],'8n',time);
        else synths[id].triggerAttackRelease(d.type==='poly'?ch:v,'8n',time);
        Tone.Draw.schedule(()=>{document.getElementById('i-'+id)?.classList.add('fire');setTimeout(()=>document.getElementById('i-'+id)?.classList.remove('fire'),60)},time);
      } catch(e){}
    });
    cStep++;
    Tone.Draw.schedule(()=>{
      const cells=document.getElementById('sg')?.children;
      if(cells){if(cells[(cStep-1)%ST])cells[(cStep-1)%ST].classList.remove('ph'); if(cells[cStep%ST])cells[cStep%ST].classList.add('ph')}
      renderC();
    },time);
  },"16n").start(0);
  Tone.Transport.bpm.value=E.tempo; Tone.Transport.start();
}

function renderC(){
  const el=document.getElementById('pcs'); if(!el)return; el.innerHTML='';
  E.chords.forEach((ch,i)=>{
    const d=document.createElement('div'); d.className='pc m'+(i===E.ci?' act':'');
    d.textContent=ch[0].replace(/\d/,''); el.appendChild(d);
  });
  upCT();
}

document.getElementById('startB').onclick=start;
document.getElementById('pauseB').onclick=()=>{if(Tone.Transport.state==='started'){Tone.Transport.pause();document.getElementById('pauseB').textContent='▶'}else{Tone.Transport.start();document.getElementById('pauseB').textContent='⏸'}};

window.onload=()=>{ buildStage(); renderC(); };
</script>
</body>
</html>
