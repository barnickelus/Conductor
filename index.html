<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conductive v9</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* Your original styles unchanged */
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{--cyan:#00e5ff;--green:#39ff14;--magenta:#ff2daa;--amber:#ffb300;--bg:#020409;--panel:rgba(4,8,20,0.92);--border:rgba(0,229,255,0.1)}
        body{background:var(--bg);color:#c0dce6;font-family:'Outfit',sans-serif;overflow:hidden;height:100vh;width:100vw;touch-action:none}
        canvas#main{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
        canvas#waveform{position:fixed;bottom:0;left:0;width:100%;height:36px;z-index:2;opacity:0.2}
        .ui{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;pointer-events:none}
        .ui>*{pointer-events:auto}
        /* ... rest of your CSS exactly as before ... */
        @media(max-width:700px){.inst-icon{width:38px;height:38px}.inst-icon .sym{font-size:12px}.stage{height:200px}.stat-block .value{font-size:16px}}
    </style>
</head>
<body>
<canvas id="main"></canvas>
<canvas id="waveform"></canvas>
<div class="conduct-hint" id="conduct-hint">Touch above stage to conduct</div>
<div class="ui">
    <!-- Your entire UI HTML unchanged -->
    <div class="top-bar"> ... </div>
    <div class="conduct-zone" id="conduct-zone"></div>
    <div class="stage-wrap"><div class="stage" id="stage"><canvas id="stage-bg"></canvas><div class="conductor-pos">▲ you</div></div></div>
    <div class="pattern-wrap" id="pattern-wrap"> ... </div>
    <div class="bottom-bar"> ... </div>
</div>

<script>
// Your entire script up to the boot function — only boot() and a tiny addition are changed

// ... (all your constants, SYNTH_FACTORIES, INSTRUMENTS, engine state, etc. remain identical) ...

// ═══ BOOT ═══
document.getElementById('init-btn').addEventListener('click', boot);

async function boot(){
    if(booted) return;

    try {
        await Tone.start();                    // User gesture → starts AudioContext
        await Tone.context.resume();           // Extra safety for suspended state (very common fix)
        
        if (Tone.context.state !== 'running') {
            console.warn("AudioContext still suspended after resume");
            log("Audio blocked by browser. Tap again.");
            return;
        }
    } catch(e) {
        log("Audio blocked by browser.");
        console.error(e);
        return;
    }

    booted = true;
    engine.playing = true;

    document.getElementById('init-btn').textContent = '● Live';
    document.getElementById('init-btn').classList.add('active');
    document.getElementById('pause-btn').style.display = '';

    // === Build audio graph FIRST ===
    effects.master = new Tone.Gain(0.8).toDestination();
    effects.reverb = new Tone.Reverb({decay:5, wet:0.3}).connect(effects.master);
    effects.filter = new Tone.Filter(engine.filterCutoff, "lowpass").connect(effects.reverb);
    effects.delay = new Tone.FeedbackDelay("8n.", 0.3).connect(effects.filter);
    effects.chorus = new Tone.Chorus(3, 2.5, 0.5).connect(effects.reverb).start();
    effects.comp = new Tone.Compressor(-16, 4).connect(effects.master);
    effects.wide = new Tone.StereoWidener(0.6).connect(effects.reverb);

    analyser = new Tone.Analyser('waveform', 256);
    effects.master.connect(analyser);

    function wire(id) {
        const def = INSTRUMENTS[id];
        const base = def.base || id;
        const bus = SYNTH_BUS[base] || 'filter';
        const synth = SYNTH_FACTORIES[base]();
        const g = new Tone.Gain(engine.inst[id].vol);
        const p = new Tone.Panner(engine.inst[id].pan);
        synth.connect(g);
        g.connect(p);
        p.connect(effects[bus]);
        synths[id] = synth;
        gains[id] = g;
        panners[id] = p;
    }
    Object.keys(INSTRUMENTS).forEach(wire);

    // === Now start the transport and loop ===
    let arpStep = 0;

    new Tone.Loop(time => {
        const e = engine.energy;
        const s16 = currentStep % STEPS;
        const chord = engine.chords[engine.chordIndex];

        // Chord progression
        if (currentStep % 32 === 0 && autoProgress) {
            engine.chordIndex = (engine.chordIndex + 1) % engine.chords.length;
        }
        const curChord = engine.chords[engine.chordIndex];

        // Atmo (every 32 steps)
        if (currentStep % 32 === 0) {
            ['pad','strings'].forEach(id => {
                if (engine.inst[id]?.active && !engine.inst[id]?.usePattern) {
                    synths[id]?.triggerAttackRelease?.(curChord, "2m", time, e*0.2);
                    flashIcon(id);
                }
            });
            if (engine.inst.choir?.active && !engine.inst.choir?.usePattern) {
                synths.choir?.triggerAttackRelease?.(curChord.map(n => n.replace(/\d/,'4')), "2m", time, e*0.15);
                flashIcon('choir');
            }
            if (engine.inst.texture?.active && !engine.inst.texture?.usePattern) {
                synths.texture?.triggerAttackRelease?.("2m", time, e*0.1);
                flashIcon('texture');
            }
        }

        // Main instruments + clones
        Object.entries(engine.inst).forEach(([id, st]) => {
            if (!st.active) return;
            const def = INSTRUMENTS[id];
            if (!def) return;
            if (def.cat === 'atmo' && !st.usePattern) return;

            if (st.usePattern && st.pattern.some(p => p.length)) {
                const vals = st.pattern[s16];
                if (vals.length) playStep(id, def, curChord, vals, time, e);
            } else if (def.cat !== 'atmo') {
                genPlay(id, def, curChord, s16, currentStep, time, e, arpStep);
            }
        });

        if (engine.inst.arp?.active) arpStep++;
        currentStep++;
        updatePlayhead();
    }, "16n").start(0);   // Explicit .start(0)

    Tone.Transport.bpm.value = engine.tempo;
    Tone.Transport.start();   // Now safe

    buildStage();
    requestAnimationFrame(renderLoop);

    log("Live. Conduct above stage, tap icons to edit.");
    document.getElementById('conduct-hint').style.opacity = '1';
    setTimeout(() => document.getElementById('conduct-hint').style.opacity = '0', 3500);
}

// The rest of your code (playStep, genPlay, pause handler, conducting, AI, visuals, etc.) remains **unchanged**

// ... (your full original script continues here) ...
</script>
</body>
</html>
