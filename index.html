<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Conductive v11</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--c:#00e5ff;--g:#39ff14;--m:#ff2daa;--a:#ffb300;--bg:#020409;--p:rgba(4,8,20,0.92);--b:rgba(0,229,255,0.1)}
body{background:var(--bg);color:#c0dce6;font-family:'Outfit',sans-serif;overflow:hidden;height:100dvh;width:100vw;touch-action:none}
canvas#viz{position:fixed;inset:0;width:100%;height:100%;z-index:1}
.ui{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;pointer-events:none;overflow:hidden}
.ui>*{pointer-events:auto}
.m{font-family:'JetBrains Mono',monospace}
/* TOP */
.top{display:flex;justify-content:space-between;align-items:center;padding:5px 10px;gap:4px}
.brand{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,229,255,0.25)}.brand b{color:var(--c)}
.top-mid{display:flex;gap:4px;align-items:center}
.tb{display:inline-flex;align-items:center;justify-content:center;background:0;border:1px solid var(--b);color:var(--c);padding:4px 8px;border-radius:4px;font-size:8px;cursor:pointer;transition:all 0.1s;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.tb:hover{border-color:var(--c)}.tb.on{border-color:var(--g);color:var(--g)}.tb.pau{border-color:var(--a);color:var(--a)}
.tb.rec{border-color:var(--m);color:var(--m)}
.top-r{display:flex;align-items:center;gap:8px}
.stat .l{font-size:5px;letter-spacing:1px;text-transform:uppercase;color:rgba(0,229,255,0.15)}.stat .v{font-weight:900;font-size:15px;color:var(--c);line-height:1}
.stats{display:flex;gap:10px;text-align:right}
.api-a{position:relative}
.api-p{display:flex;align-items:center;gap:3px;font-size:6px;letter-spacing:1px;text-transform:uppercase;padding:3px 6px;border:1px solid var(--b);border-radius:4px;cursor:pointer}
.api-d{width:5px;height:5px;border-radius:50%;background:#333;transition:0.3s}
.api-p.ok .api-d{background:var(--g);box-shadow:0 0 5px rgba(57,255,20,0.5)}.api-p.ok{color:var(--g);border-color:rgba(57,255,20,0.1)}
.api-p.off .api-d{background:var(--a)}.api-p.off{color:var(--a)}
.api-p.chk .api-d{background:var(--c);animation:bl 1s infinite}
@keyframes bl{50%{opacity:0.3}}
.api-dd{position:absolute;top:100%;right:0;margin-top:3px;background:var(--p);border:1px solid var(--b);border-radius:6px;padding:7px;width:240px;display:none;backdrop-filter:blur(12px);z-index:20}
.api-dd.open{display:block}
.api-dd label{font-size:5px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(0,229,255,0.15);display:block;margin-bottom:2px}
.api-dd .n{font-size:5px;color:rgba(0,229,255,0.08);margin-top:3px}
.api-dd .e{font-size:5px;color:var(--a);margin-top:2px;word-break:break-all}
.api-r{display:flex;gap:3px}
.api-r input{flex:1;background:rgba(0,0,0,0.5);border:1px solid var(--b);color:var(--c);padding:4px 6px;border-radius:3px;font-size:8px;outline:none}
.api-r button{background:0;border:1px solid var(--b);color:var(--c);padding:4px 7px;border-radius:3px;font-size:7px;cursor:pointer}
/* FX BAR */
.fxbar{display:flex;gap:10px;padding:6px 12px;align-items:center;flex-wrap:wrap;pointer-events:none;flex-shrink:0}
.fxbar>*{pointer-events:auto}
.fxbar .tb{padding:4px 8px;font-size:7px}
.fxbar .sl{display:flex;align-items:center;gap:5px;background:rgba(0,229,255,0.02);padding:4px 8px;border-radius:5px;border:1px solid rgba(0,229,255,0.04)}
.fxbar .sl label{font-size:7px;color:rgba(0,229,255,0.25);letter-spacing:1px;text-transform:uppercase;min-width:35px}
.fxbar .sl input[type=range]{-webkit-appearance:none;width:80px;height:4px;background:rgba(0,229,255,0.1);border-radius:2px;outline:none}
.fxbar .sl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--c);cursor:pointer;box-shadow:0 0 4px rgba(0,229,255,0.3)}
/* CONDUCT */
.czone{cursor:crosshair;flex:1;min-height:40px}
/* CMD */
.cmd{display:flex;gap:3px;padding:3px 10px;align-items:center;pointer-events:none;flex-shrink:0}.cmd>*{pointer-events:auto}
.cmd input{flex:1;background:rgba(0,0,0,0.3);border:1px solid var(--b);color:var(--c);padding:5px 7px;border-radius:5px;font-size:9px;outline:none;min-width:0}
.cmd input:focus{border-color:var(--c)}.cmd input::placeholder{color:rgba(0,229,255,0.07)}
.cmd .tb{width:28px;height:28px;padding:0;flex-shrink:0;font-size:11px}
#log{font-size:6px;color:rgba(0,229,255,0.12);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;flex-shrink:1}
/* STAGE */
.stw{padding:0 3px;flex-shrink:0}
.stage{position:relative;height:min(310px, 38vh);overflow:visible}
canvas#sbg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.cpos{position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);font-size:5px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,229,255,0.05)}
.ic{position:absolute;width:42px;height:42px;transform:translate(-50%,-50%);cursor:grab;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;border:1.5px solid rgba(0,229,255,0.08);background:rgba(4,8,20,0.92);transition:border-color 0.08s;user-select:none;z-index:2}
.ic.off{opacity:0.18;border-style:dashed}.ic.on{border-color:rgba(0,229,255,0.22)}
.ic.sel{border-color:var(--c);box-shadow:0 0 10px rgba(0,229,255,0.12);z-index:3}
.ic .s{font-size:13px;line-height:1}.ic .l{font-size:4.5px;letter-spacing:.8px;text-transform:uppercase;color:rgba(0,229,255,0.2);margin-top:1px}
.ic .rn{position:absolute;inset:-3px;border-radius:50%;border:2px solid transparent;transition:border-color 0.04s}
.ic.fire .rn{border-color:var(--g);box-shadow:0 0 5px rgba(57,255,20,0.15)}
.ic.drag{cursor:grabbing;z-index:5;border-color:var(--c)}
/* CHORD */
.pb{padding:2px 3px;flex-shrink:0}
.pbox{background:var(--p);border:1px solid var(--b);border-radius:6px;padding:5px 8px;display:flex;align-items:center;gap:6px}
.psw{width:22px;height:11px;border-radius:6px;background:rgba(0,229,255,0.04);border:1px solid var(--b);position:relative;cursor:pointer;flex-shrink:0;transition:0.2s}
.psw::after{content:'';position:absolute;top:1px;left:1px;width:7px;height:7px;border-radius:50%;background:rgba(0,229,255,0.2);transition:0.2s}
.psw.on{background:rgba(57,255,20,0.05);border-color:rgba(57,255,20,0.1)}.psw.on::after{left:12px;background:var(--g)}
.psl{font-size:5px;letter-spacing:1px;text-transform:uppercase;color:rgba(0,229,255,0.12);flex-shrink:0}
.pcs{display:flex;gap:4px;flex:1}.pc{flex:1;text-align:center;padding:8px 4px;border-radius:5px;border:1px solid rgba(0,229,255,0.06);font-size:13px;font-weight:700;color:rgba(0,229,255,0.2);cursor:pointer;transition:0.1s;position:relative}
.pc.act{border-color:rgba(0,229,255,0.25);color:var(--c);background:rgba(0,229,255,0.04)}
.pc.dim{opacity:0.2}
.pci{position:absolute;top:0;left:2px;font-size:4px;color:rgba(0,229,255,0.06)}
.ced{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);margin-bottom:2px;background:var(--p);border:1px solid var(--b);border-radius:4px;padding:2px;display:none;z-index:20;min-width:60px}
.ced.open{display:flex;flex-wrap:wrap;gap:1px}
.co{padding:2px 4px;border-radius:2px;font-size:6px;color:rgba(0,229,255,0.25);cursor:pointer}.co:hover{background:rgba(0,229,255,0.04);color:var(--c)}.co.cur{color:var(--c)}
.prnd{font-size:16px;color:rgba(0,229,255,0.2);cursor:pointer;padding:4px 6px;flex-shrink:0}.prnd:hover{color:var(--c)}
/* PATTERN */
.pw{padding:0 3px;max-height:0;transition:max-height 0.3s,opacity 0.3s;opacity:0;overflow:hidden;flex-shrink:0}
.pw.open{max-height:180px;opacity:1}
.ppx{background:var(--p);border:1px solid var(--b);border-radius:6px;padding:4px 6px;margin-top:2px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;gap:2px}
.pt{font-size:6px;letter-spacing:1px;text-transform:uppercase;color:var(--c)}
.pa{display:flex;gap:6px}
.pa button{background:0;border:1px solid var(--b);color:rgba(0,229,255,0.25);padding:5px 10px;border-radius:4px;font-size:8px;cursor:pointer;transition:0.12s;min-width:40px;text-align:center}
.pa button:hover{color:var(--c);border-color:var(--c)}
.vc{display:flex;align-items:center;gap:2px;margin-left:auto;margin-right:4px}
.vc label{font-size:4px;color:rgba(0,229,255,0.12);letter-spacing:1px;text-transform:uppercase}
.vc input[type=range]{-webkit-appearance:none;width:40px;height:2px;background:rgba(0,229,255,0.06);border-radius:1px;outline:none}
.vc input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:8px;border-radius:50%;background:var(--c);cursor:pointer}
.sg{display:flex;gap:1px;user-select:none}
.sc{flex:1;min-width:0;border-radius:2px;border:1px solid rgba(0,229,255,0.02);background:rgba(0,229,255,0.005);position:relative}
.sc:nth-child(4n+1){border-left-color:rgba(0,229,255,0.06)}
.sc.ph::after{content:'';position:absolute;inset:0;border:1px solid var(--g);border-radius:2px;pointer-events:none}
.sg.rh .sc{height:28px;cursor:pointer}.sg.rh .sc.on{background:rgba(0,229,255,0.12);border-color:rgba(0,229,255,0.12)}
.sg.mel .sc{display:flex;flex-direction:column;gap:1px;padding:1px}
.nr{height:12px;border-radius:1px;background:rgba(0,229,255,0.008);cursor:pointer;position:relative}
.nr:active{background:rgba(0,229,255,0.05)}.nr.on{background:rgba(0,229,255,0.15)}
.nrl{position:absolute;left:1px;top:50%;transform:translateY(-50%);font-size:4px;color:rgba(0,229,255,0.08);pointer-events:none}.nr.on .nrl{color:rgba(0,229,255,0.3)}
@media(max-width:700px){.ic{width:36px;height:36px}.ic .s{font-size:11px}.stage{height:min(250px,35vh)}.stat .v{font-size:13px}.fxbar .sl input[type=range]{width:55px}}
</style>
</head>
<body>
<canvas id="viz"></canvas>
<div class="ui">
  <div class="top">
    <div class="brand m"><b>Conductive</b> v11</div>
    <div class="top-mid">
      <button class="tb m" id="startB">▶ Start</button>
      <button class="tb m" id="pauseB" style="display:none">⏸</button>
      <button class="tb m" id="voiceB">🎤 Speak</button>
    </div>
    <div class="top-r">
      <div class="api-a"><div class="api-p m" id="apiP" onclick="document.getElementById('apiDD').classList.toggle('open')"><div class="api-d"></div><span id="apiL">No Key</span></div>
        <div class="api-dd m" id="apiDD"><label>Gemini API Key</label><div class="api-r"><input type="password" id="apiK" placeholder="Paste key"><button onclick="connectAPI()">Go</button></div><div class="n">Memory only. ai.google.dev</div><div class="e" id="apiE"></div></div>
      </div>
      <div class="stats"><div class="stat"><div class="l m">BPM</div><div class="v" id="vB">110</div></div><div class="stat"><div class="l m">Nrg</div><div class="v" id="vE">50</div></div><div class="stat"><div class="l m">Key</div><div class="v" id="vK" style="font-size:11px">Cm</div></div></div>
    </div>
  </div>
  <!-- FX BAR -->
  <div class="fxbar m">
    <div class="sl"><label>Reverb</label><input type="range" min="0" max="100" value="25" id="fxRev" oninput="setFx('rev',this.value)"></div>
    <div class="sl"><label>Delay</label><input type="range" min="0" max="100" value="25" id="fxDel" oninput="setFx('del',this.value)"></div>
    <div class="sl"><label>Filter</label><input type="range" min="0" max="100" value="60" id="fxFilt" oninput="setFx('filt',this.value)"></div>
    <div class="sl"><label>Chorus</label><input type="range" min="0" max="100" value="30" id="fxCho" oninput="setFx('cho',this.value)"></div>
  </div>
  <div class="czone" id="cz"></div>
  <div class="cmd"><input type="text" id="cmdIn" class="m" placeholder="describe what you want…"><button class="tb m" id="cmdGo">→</button><div id="log" class="m">Tap Start</div></div>
  <div class="stw"><div class="stage" id="stage"><canvas id="sbg"></canvas><div class="cpos m">▲ you</div></div></div>
  <div class="pb"><div class="pbox"><div class="psw on" id="psw" onclick="toggleProg()"></div><div class="psl m">Prog</div><div class="pcs m" id="pcs"></div><div class="prnd m" onclick="randProg()">🎲</div></div></div>
  <div class="pw" id="pw"><div class="ppx"><div class="ph"><div class="pt m" id="ptitle">—</div><div class="vc m"><label>Vol</label><input type="range" min="0" max="100" value="100" id="volS" oninput="setVol(this.value)"></div><div class="pa m"><button onclick="clearP()">Clear</button><button onclick="randP()">Rand</button><button onclick="cloneI()">Clone</button><button onclick="desel()">✕</button></div></div><div class="sg" id="sg"></div></div></div>
  <div style="flex-shrink:0;height:12px;pointer-events:none"></div>
</div>
<script>
const ST=16,TIERS=4,TV=[1,0.8,0.65,0.5];
let gKey='',apiSt='',autoProg=true,booted=false,cStep=0,selI=null,cloneN=0;
const GM=['gemini-2.5-flash','gemini-2.0-flash'];let gMi=0;
function gURL(){return'https://generativelanguage.googleapis.com/v1beta/models/'+GM[gMi]+':generateContent?key='+gKey}

// ═══════════════════════════════════════════
// SYNTH FACTORIES — NO MetalSynth anywhere
// Every synth uses triggerAttackRelease(note, duration, time, velocity)
// except NoiseSynth which uses (duration, time, velocity) — no note
// ═══════════════════════════════════════════
const SF={
    // RHYTHM — all NoiseSynth with different filters
    kick:()=>new Tone.MembraneSynth({pitchDecay:0.05,octaves:5,volume:0,envelope:{attack:0.001,decay:0.3,sustain:0,release:0.15}}),
    snare:()=>new Tone.NoiseSynth({volume:-4,noise:{type:'white'},envelope:{attack:0.001,decay:0.15,sustain:0}}),
    hihat:()=>new Tone.Synth({oscillator:{type:"square"},volume:-6,envelope:{attack:0.001,decay:0.035,sustain:0,release:0.01}}),
    clap:()=>new Tone.NoiseSynth({volume:-4,noise:{type:'pink'},envelope:{attack:0.003,decay:0.18,sustain:0}}),
    perc:()=>new Tone.Synth({oscillator:{type:"triangle"},volume:-4,envelope:{attack:0.001,decay:0.06,sustain:0,release:0.01}}),
    // BASS
    subbass:()=>new Tone.MonoSynth({oscillator:{type:"sine"},volume:0,envelope:{attack:0.01,decay:0.4,sustain:0.7,release:0.3},filterEnvelope:{attack:0.01,decay:0.1,sustain:0,release:0.3,baseFrequency:40,octaves:2}}),
    synbass:()=>new Tone.MonoSynth({oscillator:{type:"sawtooth"},volume:-4,envelope:{attack:0.01,decay:0.2,sustain:0.4,release:0.3},filterEnvelope:{attack:0.01,decay:0.15,sustain:0,release:0.4,baseFrequency:100,octaves:3}}),
    // MELODIC
    lead:()=>new Tone.MonoSynth({oscillator:{type:"triangle"},volume:-4,envelope:{attack:0.05,decay:0.3,sustain:0.4,release:0.6},filterEnvelope:{attack:0.04,decay:0.3,sustain:0.1,release:0.6,baseFrequency:500,octaves:5}}),
    pluck:()=>new Tone.Synth({oscillator:{type:"triangle"},volume:-4,envelope:{attack:0.001,decay:0.4,sustain:0,release:0.3}}),
    bell:()=>new Tone.Synth({oscillator:{type:"sine"},volume:-6,envelope:{attack:0.001,decay:1.5,sustain:0,release:1}}),
    arp:()=>new Tone.MonoSynth({oscillator:{type:"square"},volume:-6,envelope:{attack:0.01,decay:0.12,sustain:0.15,release:0.2},filterEnvelope:{attack:0.01,decay:0.12,sustain:0.1,release:0.2,baseFrequency:800,octaves:4}}),
    // STRINGS
    violin:()=>new Tone.MonoSynth({oscillator:{type:"sawtooth"},volume:-8,envelope:{attack:0.3,decay:0.3,sustain:0.8,release:0.5},filterEnvelope:{attack:0.2,decay:0.3,sustain:0.3,release:0.5,baseFrequency:600,octaves:3}}),
    cello:()=>new Tone.MonoSynth({oscillator:{type:"sawtooth"},volume:-6,envelope:{attack:0.4,decay:0.3,sustain:0.8,release:0.6},filterEnvelope:{attack:0.3,decay:0.3,sustain:0.2,release:0.6,baseFrequency:200,octaves:3}}),
    // ATMOSPHERE
    pad:()=>new Tone.PolySynth(Tone.Synth,{oscillator:{type:"fatsawtooth",count:3,spread:40},volume:-6,envelope:{attack:2,decay:1,sustain:0.8,release:3}}),
    strings:()=>new Tone.PolySynth(Tone.Synth,{oscillator:{type:"fatsawtooth",count:5,spread:20},volume:-6,envelope:{attack:1.2,decay:0.5,sustain:0.9,release:2}}),
    choir:()=>new Tone.PolySynth(Tone.Synth,{oscillator:{type:"fatsine",count:3,spread:15},volume:-4,envelope:{attack:1,decay:0.5,sustain:0.9,release:2}}),
    texture:()=>new Tone.Synth({oscillator:{type:"fatsawtooth",count:2,spread:50},volume:-14,envelope:{attack:3,decay:2,sustain:0.4,release:4}}),
};

// ALL synths connect to their gain→panner→bus. Hihat/perc have internal filters.
// The _hiFilter/_percFilter need to connect to the gain node instead of the synth directly.
const SBUS={kick:'comp',snare:'comp',hihat:'comp',clap:'comp',perc:'comp',subbass:'comp',synbass:'comp',lead:'del',pluck:'del',bell:'cho',arp:'del',violin:'cho',cello:'cho',pad:'wide',strings:'cho',choir:'wide',texture:'rev'};

// Type map: how to trigger each synth
// 'note' = triggerAttackRelease(note, dur, time, vel)
// 'noise' = triggerAttackRelease(dur, time, vel) — no note
const STYPE={kick:'note',snare:'noise',hihat:'note',clap:'noise',perc:'note',subbass:'note',synbass:'note',lead:'note',pluck:'note',bell:'note',arp:'note',violin:'note',cello:'note',pad:'poly',strings:'poly',choir:'poly',texture:'note'};

// Universal trigger: trig(id, note, dur, time, vel)
// NoiseSynth: note ignored, uses (dur, time, vel)
// Synth/Mono/Membrane: uses (note, dur, time, vel)
// PolySynth: note=array, uses (notes, dur, time, vel)
function trig(id,note,dur,time,vel){
    const s=sy[id];if(!s){console.warn('No synth:',id);return}
    const b=INS[id]?.b;
    const type=STYPE[b]||'note';
    try{
        if(type==='noise')s.triggerAttackRelease(dur,time,vel);
        else if(type==='poly')s.triggerAttackRelease(note,dur,time,vel);
        else s.triggerAttackRelease(note,dur,time,vel);
    }catch(e){console.warn('trig fail',id,type,note,dur,e.message)}
}

const INS={
    kick:{c:'rhythm',n:'Kick',s:'◉',a:-60,t:0,b:'kick'},snare:{c:'rhythm',n:'Snare',s:'◎',a:-30,t:0,b:'snare'},
    hihat:{c:'rhythm',n:'HiHat',s:'✧',a:0,t:0,b:'hihat'},clap:{c:'rhythm',n:'Clap',s:'✦',a:30,t:0,b:'clap'},
    perc:{c:'rhythm',n:'Perc',s:'◇',a:60,t:1,b:'perc'},
    subbass:{c:'bass',n:'Sub',s:'≋',a:-18,t:1,b:'subbass'},synbass:{c:'bass',n:'Bass',s:'≈',a:18,t:1,b:'synbass'},
    lead:{c:'melodic',n:'Lead',s:'♪',a:-45,t:2,b:'lead'},pluck:{c:'melodic',n:'Pluck',s:'⊕',a:-10,t:2,b:'pluck'},
    bell:{c:'melodic',n:'Bell',s:'♦',a:20,t:2,b:'bell'},arp:{c:'melodic',n:'Arp',s:'↯',a:50,t:2,b:'arp'},
    violin:{c:'melodic',n:'Violin',s:'🎻',a:-35,t:2,b:'violin'},cello:{c:'melodic',n:'Cello',s:'🎻',a:38,t:2,b:'cello'},
    pad:{c:'atmo',n:'Pad',s:'◐',a:-55,t:3,b:'pad'},strings:{c:'atmo',n:'Strings',s:'∿',a:-22,t:3,b:'strings'},
    choir:{c:'atmo',n:'Choir',s:'❂',a:10,t:3,b:'choir'},texture:{c:'atmo',n:'Texture',s:'░',a:55,t:3,b:'texture'},
};

const E={tempo:110,energy:0.5,ci:0,key:'C',mode:'minor',chords:[["C3","Eb3","G3"],["Ab2","C3","Eb3"],["Bb2","D3","F3"],["G2","B2","D3"]],fc:3500,inst:{}};

function wireS(id,synth,gain,pan,bus){
    synth.connect(gain);
    gain.connect(pan);pan.connect(fx[bus]||fx.comp);
    sy[id]=synth;gn[id]=gain;pn[id]=pan;

document.getElementById('startB').addEventListener('click',boot);
async function boot(){
    if(booted)return;try{await Tone.start()}catch(e){lg("Audio blocked.");return}
    booted=true;document.getElementById('startB').textContent='● Live';document.getElementById('startB').classList.add('on');document.getElementById('pauseB').style.display='';
    fx.master=new Tone.Gain(0.9).toDestination();
    fx.rev=new Tone.Reverb({decay:4,wet:0.15}).connect(fx.master);await fx.rev.ready;
    fx.filt=new Tone.Filter(E.fc,"lowpass").connect(fx.rev);
    fx.del=new Tone.FeedbackDelay("8n.",0.2).connect(fx.filt);
    fx.cho=new Tone.Chorus(3,2.5,0.5).connect(fx.rev).start();
    fx.comp=new Tone.Compressor(-10,3).connect(fx.master);
    fx.wide=new Tone.StereoWidener(0.5).connect(fx.rev);
    an=new Tone.Analyser('waveform',256);fx.master.connect(an);

    Object.keys(INS).forEach(id=>{
        const d=INS[id],st=E.inst[id],bus=SBUS[d.b]||'comp';
        const s=SF[d.b](),g=new Tone.Gain(st.vol*st.uv),p=new Tone.Panner(st.pan);
        wireS(id,s,g,p,bus);
    });

    // Test each instrument on boot (silent — just verifies no errors)
    console.log("Instruments wired:",Object.keys(sy).join(', '));

    let arpS=0;
    new Tone.Loop(time=>{
        const e=E.energy,s16=cStep%ST;
        if(cStep%32===0&&autoProg)E.ci=(E.ci+1)%E.chords.length;
        const ch=E.chords[E.ci];
        // Atmo
        if(cStep%32===0){
            ['pad','strings'].forEach(id=>{const st=E.inst[id];if(st?.on&&!st.up)trig(id,ch,"2m",time,e*0.5+0.3)});
            if(E.inst.choir?.on&&!E.inst.choir?.up)trig('choir',ch.map(n=>n.replace(/\d/,'4')),"2m",time,e*0.5+0.3);
            if(E.inst.texture?.on&&!E.inst.texture?.up)trig('texture',ch[0].replace(/\d/,'2'),"2m",time,e*0.3+0.2);
        }
        Object.entries(E.inst).forEach(([id,st])=>{
            if(!st.on)return;const d=INS[id];if(!d||d.c==='atmo'&&!st.up)return;
            if(st.up&&st.pat.some(p=>p.length)){const v=st.pat[s16];if(!v.length)return;pS(id,d,ch,v,time,e)}
            else if(d.c!=='atmo'){gen(id,d,ch,s16,time,e,arpS)}
        });
        if(E.inst.arp?.on)arpS++;
        cStep++;
        Tone.Draw.schedule(()=>{upPH();upPC()},time);
    },"16n").start(0);
    Tone.Transport.bpm.value=E.tempo;Tone.Transport.start();
    // Boot test — play kick once to confirm audio chain works
    setTimeout(()=>{
        try{
            sy.kick.triggerAttackRelease("C1","8n",undefined,0.5);
            console.log("✓ Boot test: kick played");
        }catch(e){console.error("✗ Boot test failed:",e)}
    },300);
    buildStage();requestAnimationFrame(renderViz);
    lg("Live. 1 finger=point · 2 fingers=tempo");
}

function pS(id,d,ch,v,time,e){
    const b=d.b;
    if(d.c==='rhythm'){
        if(b==='kick')trig(id,"C1","8n",time,e*0.7+0.3);
        else if(b==='hihat')trig(id,"C8","32n",time,e*0.6+0.3);
        else if(b==='perc')trig(id,"G6","16n",time,e*0.6+0.3);
        else trig(id,null,"16n",time,e*0.6+0.3); // snare/clap NoiseSynth
    }else{
        v.forEach(ns=>trig(id,ns,"8n",time,e*0.5+0.3));
    }
    flash(id);
}

function gen(id,d,ch,s,t,e,arpS){
    const b=d.b,V=e*0.5+0.3; // baseline velocity
    switch(b){
        case'kick':if(s%8===0||(s%8===3&&e>0.6)||(s%8===6&&e>0.8)){trig(id,"C1","8n",t,V);flash(id)}break;
        case'snare':if(s%8===4||(s%16===10&&e>0.5)){trig(id,null,"16n",t,V);flash(id)}break;
        case'hihat':if(e>0.1&&(s%4===0||(s%2===0&&e>0.4))){trig(id,"C8","32n",t,V);flash(id)}break;
        case'clap':if(s%8===4){trig(id,null,"16n",t,V);flash(id)}break;
        case'perc':if(s%4===2){trig(id,"G6","16n",t,V);flash(id)}break;
        case'subbass':if(s%8===0){trig(id,ch[0].replace(/\d/,'1'),"4n",t,V);flash(id)}break;
        case'synbass':if(s%8===0){trig(id,ch[0].replace(/\d/,'2'),"4n",t,V);flash(id)}break;
        case'lead':if(Math.random()<e*0.55&&(s%4===0||(s%4===2&&Math.random()<0.4))){trig(id,ch[Math.floor(Math.random()*3)].replace(/[23]/,Math.random()>0.5?'5':'4'),"8n",t,V);flash(id)}break;
        case'pluck':if(s%8===0){trig(id,ch[Math.floor(Math.random()*3)].replace(/[23]/,'4'),"8n",t,V);flash(id)}break;
        case'bell':if(s%8===0){trig(id,ch[Math.floor(Math.random()*3)].replace(/[23]/,'5'),"4n",t,V*0.7);flash(id)}break;
        case'arp':if(s%2===0){const ns=[...ch.map(n=>n.replace(/[23]/,'4')),...ch.map(n=>n.replace(/[23]/,'5'))];trig(id,ns[arpS%ns.length],"16n",t,V);flash(id)}break;
        case'violin':if(Math.random()<e*0.4&&s%4===0){trig(id,ch[Math.floor(Math.random()*3)].replace(/[23]/,'5'),"4n",t,V);flash(id)}break;
        case'cello':if(s%8===0){trig(id,ch[0].replace(/\d/,'3'),"4n",t,V);flash(id)}break;
    }
}

function condS(e){e.preventDefault();if(e.touches&&e.touches.length>=2){twoF=true;tfY0=(e.touches[0].clientY+e.touches[1].clientY)/2;tfT0=E.tempo;return}cond=true;const tx=e.touches?e.touches[0].clientX:e.clientX,ty=e.touches?e.touches[0].clientY:e.clientY;condM(tx,ty)}
function condD(e){e.preventDefault();if(twoF&&e.touches&&e.touches.length>=2){const y=(e.touches[0].clientY+e.touches[1].clientY)/2,dy=tfY0-y;E.tempo=Math.max(40,Math.min(200,Math.round(tfT0+dy*0.5)));if(booted)Tone.Transport.bpm.rampTo(E.tempo,0.1);upUI();return}if(!cond||!booted)return;const tx=e.touches?e.touches[0].clientX:e.clientX,ty=e.touches?e.touches[0].clientY:e.clientY;condM(tx,ty)}
function condM(x,y){E.energy=Math.max(0,Math.min(1,1-y/window.innerHeight));const nx=x/window.innerWidth,pa=(nx-0.5)*160;Object.entries(E.inst).forEach(([id,st])=>{if(!gn[id])return;const prox=Math.max(0,1-Math.abs(st.a-pa)/80),boost=1+prox*0.6;gn[id].gain.rampTo(st.vol*st.uv*boost,0.12)});E.fc=200+nx*7000;if(fx.filt)fx.filt.frequency.rampTo(E.fc,0.08);upUI();trail.push({x,y,t:performance.now()});if(trail.length>80)trail.shift()}
function condE(){cond=false;twoF=false;if(booted)Object.entries(E.inst).forEach(([id,st])=>{if(gn[id])gn[id].gain.rampTo(st.vol*st.uv,0.3)})}
cz.addEventListener('touchstart',condS,{passive:false});cz.addEventListener('touchmove',condD,{passive:false});cz.addEventListener('touchend',condE);cz.addEventListener('touchcancel',condE);
cz.addEventListener('mousedown',e=>{cond=true;condM(e.clientX,e.clientY)});cz.addEventListener('mousemove',e=>{if(cond)condM(e.clientX,e.clientY)});cz.addEventListener('mouseup',condE);cz.addEventListener('mouseleave',condE);

// ═══ AI ═══
async function interp(input){if(!input?.trim())return;lg('…');if(!gKey){fallback(input);return}setAP('chk');const il=Object.entries(INS).map(([k,v])=>k+'('+v.n+')').join(', ');const al=Object.entries(E.inst).filter(([k,v])=>v.on).map(([k])=>k).join(',');const prompt=`You control a live music engine. Return ONLY JSON. No markdown.\nInstruments: ${il}\nKeys: C-B. Modes: minor, major.\n{"tempo":40-200,"energy":0-1,"key":"X","mode":"minor|major","filterCutoff":100-8000,"instruments":{"name":bool}}\nOnly changed fields.\nState: tempo=${E.tempo},energy=${E.energy},key=${E.key} ${E.mode},active=[${al}]\nCommand: "${input}"`;const r=await gCall(prompt,2);if(r.ok){try{applyAI(JSON.parse(r.text.replace(/```json|```/g,'').trim()));setAP('ok')}catch(e){setAP('ok');fallback(input)}}else{setAP('ok');fallback(input)}}
function applyAI(j){if(j.tempo)E.tempo=Math.max(40,Math.min(200,j.tempo));if(j.energy!==undefined)E.energy=Math.max(0,Math.min(1,j.energy));if(j.filterCutoff)E.fc=Math.max(100,Math.min(8000,j.filterCutoff));if(j.key&&KEYS[j.key])E.key=j.key;if(j.mode==='major'||j.mode==='minor')E.mode=j.mode;if(j.instruments)Object.entries(j.instruments).forEach(([k,v])=>{if(E.inst[k])E.inst[k].on=!!v});if(KEYS[E.key]?.[E.mode])E.chords=KEYS[E.key][E.mode];if(booted){Tone.Transport.bpm.rampTo(E.tempo,2);fx.filt.frequency.rampTo(E.fc,1)}buildStage();upUI();renderPC();lg('AI → '+E.tempo+'bpm '+E.key+(E.mode==='minor'?'m':''))}
function fallback(cmd){const t=(typeof cmd==='string'?cmd:'').toLowerCase();if(t.match(/chill|calm|slow|soft/)){E.tempo=78;E.energy=0.25}else if(t.match(/hype|dance|party|fast|drop/)){E.tempo=130;E.energy=0.9;E.inst.clap.on=true;E.inst.arp.on=true}else if(t.match(/dark|heavy|intense/)){E.tempo=95;E.energy=0.75;E.mode='minor';E.inst.subbass.on=true}else if(t.match(/cinematic|epic|film/)){E.tempo=85;E.energy=0.6;E.inst.strings.on=true;E.inst.pad.on=true;E.inst.violin.on=true;E.inst.cello.on=true}else if(t.match(/ambient|space|dream/)){E.tempo=70;E.energy=0.3;E.inst.pad.on=true;E.inst.texture.on=true;E.inst.bell.on=true}if(KEYS[E.key]?.[E.mode])E.chords=KEYS[E.key][E.mode];if(booted)Tone.Transport.bpm.rampTo(E.tempo,2);buildStage();upUI();renderPC();lg('→ '+E.tempo+'bpm')}

// ═══ VOICE ═══
document.getElementById('voiceB').addEventListener('click',()=>{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){lg("No speech");return}const rec=new SR();rec.lang='en-US';rec.interimResults=false;const btn=document.getElementById('voiceB');rec.onstart=()=>{btn.classList.add('rec');btn.textContent='●…'};rec.onresult=e=>interp(e.results[0][0].transcript);rec.onerror=e=>lg('Mic: '+e.error);rec.onend=()=>{btn.classList.remove('rec');btn.textContent='🎤 Speak'};try{rec.start()}catch(e){lg("Mic fail")}});
document.getElementById('cmdGo').addEventListener('click',()=>{const i=document.getElementById('cmdIn');if(i.value.trim()){interp(i.value.trim());i.value=''}});
document.getElementById('cmdIn').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('cmdGo').click()});

// ═══ VIZ ═══
const vc=document.getElementById('viz'),vx=vc.getContext('2d');const pts=[];
class P{constructor(x,y,c){this.x=x;this.y=y;this.c=c||'0,229,255';this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.d=0.01+Math.random()*0.01;this.sz=1+Math.random()*2}u(){this.x+=this.vx;this.y+=this.vy;this.vy-=0.006;this.life-=this.d}}
function renderViz(){const W=vc.width=window.innerWidth,H=vc.height=window.innerHeight,t=performance.now()*0.001,e=E.energy,now=performance.now();vx.clearRect(0,0,W,H);const g=vx.createRadialGradient(W/2,H*0.18,0,W/2,H*0.18,W*0.3);g.addColorStop(0,'rgba(0,'+(18+e*30|0)+','+(30+e*45|0)+','+(0.015+e*0.02)+')');g.addColorStop(1,'transparent');vx.fillStyle=g;vx.fillRect(0,0,W,H);const cx=W/2,cy=H*0.18,bR=20+e*40;vx.beginPath();for(let a=0;a<Math.PI*2;a+=0.06){const n=Math.sin(a*6+t*3)*6*e+Math.sin(a*3-t*2)*3*e;a===0?vx.moveTo(cx+Math.cos(a)*(bR+n),cy+Math.sin(a)*(bR+n)):vx.lineTo(cx+Math.cos(a)*(bR+n),cy+Math.sin(a)*(bR+n))}vx.closePath();vx.strokeStyle='rgba(0,229,255,'+(0.02+e*0.08)+')';vx.lineWidth=1;vx.stroke();if(trail.length>1){vx.beginPath();let st=false;trail.forEach(p=>{if((now-p.t)/2000>1)return;if(!st){vx.moveTo(p.x,p.y);st=true}else vx.lineTo(p.x,p.y)});vx.strokeStyle='rgba(0,229,255,0.2)';vx.lineWidth=1.5;vx.stroke()}while(trail.length&&now-trail[0].t>2000)trail.shift();if(Math.random()<e*0.1){const a=Math.random()*Math.PI*2;pts.push(new P(cx+Math.cos(a)*bR,cy+Math.sin(a)*bR))}for(let i=pts.length-1;i>=0;i--){const p=pts[i];p.u();if(p.life<=0){pts.splice(i,1);continue}vx.beginPath();vx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);vx.fillStyle='rgba('+p.c+','+p.life*0.15+')';vx.fill()}if(pts.length>80)pts.splice(0,pts.length-80);requestAnimationFrame(renderViz)}
function upUI(){document.getElementById('vB').textContent=Math.round(E.tempo);document.getElementById('vE').textContent=Math.round(E.energy*100);document.getElementById('vK').textContent=E.key+(E.mode==='minor'?'m':'');document.getElementById('vE').style.color=E.energy>0.75?'var(--g)':E.energy<0.25?'var(--a)':'var(--c)'}
function lg(m){document.getElementById('log').textContent='> '+m}
buildStage();
</script>
