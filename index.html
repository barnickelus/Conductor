<!DOCTYPE html>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);

            overflow: hidden;
            touch-action: none;
        }

        .glass-panel {
            background: rgba(10, 10, 10, 0.8);

        .neon-border {

            transition: all 0.2s;

            transition: transform 0.1s;

        .active-pulse {

        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.7); }
            70% { transform: scale(1.5); box-shadow: 0 0 0 15px rgba(0, 242, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); }

        .terminal-text {
            font-size: 10px;

            opacity: 0.8;
        }

        .status-dot {
            width: 8px;

            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Top Bar -->
    <div class="p-4 flex justify-between items-center z-50">
        <div>
            <h1 class="text-sm font-bold tracking-tighter" id="title-text">ORCHESTRA v2.1 // <span class="text-blue-400">STABLE</span></h1>

                <div class="text-[10px] opacity-50">BPM</div>
                <div class="text-xl font-bold" id="bpm-display">110</div>

            <div class="text-right">
                <div class="text-[10px] opacity-50">ENERGY</div>
                <div class="text-xl font-bold text-green-400" id="energy-display">57</div>
            </div>
        </div>
    </div>

    <!-- Main Orchestra Pit -->
    <div class="relative flex-grow flex items-center justify-center">
        <canvas id="visualizer-canvas"></canvas>
        <div id="orchestra-container" class="absolute inset-0 pointer-events-none"></div>
    </div>

    <!-- Control Interface -->
    <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-4 z-50">
        <!-- Connection Panel -->
        <div class="glass-panel p-4 flex flex-col gap-3">

                <span>GEMINI CORE CONFIG</span>

                   class="bg-black border border-blue-900 text-xs p-2 focus:outline-none focus:border-cyan-400 w-full"
                   value="AIzaSyBgrk8qAH94_HmuE45nOcdtX5YCDFOh-do">
            <button id="connect-btn" class="w-full py-2 bg-blue-900 hover:bg-blue-800 text-xs font-bold btn-action">CONNECT ENGINE</button>
        </div>

        <!-- Conduct Panel -->
        <div class="glass-panel p-4 flex flex-col gap-3">
            <div class="terminal-text mb-1">CONDUCTING INTERFACE</div>

                🎤 VOICE COMMAND
            </button>
            <button id="recalibrate-btn" class="w-full py-2 bg-cyan-400 text-black text-xs font-bold btn-action">
                RECALIBRATE SPACE
            </button>
        </div>

        <!-- Progression Panel -->
        <div class="glass-panel p-4 flex flex-col gap-3">
            <div class="terminal-text mb-1">PROGRESSION TOGGLES</div>
            <div class="grid grid-cols-2 gap-2">
                <button class="toggle-prog border border-gray-700 p-2 text-[10px] hover:border-blue-400" data-type="ambient">AMBIENT</button>
                <button class="toggle-prog border border-gray-700 p-2 text-[10px] hover:border-blue-400" data-type="beat">RHYTHM</button>
                <button class="toggle-prog border border-gray-700 p-2 text-[10px] hover:border-blue-400" data-type="melody">MELODY</button>
                <button class="toggle-prog border border-gray-700 p-2 text-[10px] hover:border-blue-400" data-type="harmony">HARMONY</button>
            </div>
        </div>
    </div>

    <!-- Error/Log Toast -->
    <div id="toast" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 glass-panel p-6 border-red-500 hidden max-w-sm z-[100]">
        <div class="text-red-500 text-xs mb-4 uppercase font-bold" id="toast-title">Engine Error</div>
        <div class="text-[10px] text-gray-300 leading-relaxed mb-4" id="toast-msg"></div>
        <button onclick="hideToast()" class="w-full py-2 border border-red-500 text-red-500 text-xs uppercase">Dismiss</button>
    </div>

    <script>
        // CONFIG
        const apiKey = ""; // Environment provided
        const fallbackModel = "gemini-2.5-flash-preview-09-2025";
        
        let audioCtx;
        let instruments = [];
        let isPlaying = false;
        let bpm = 110;
        let currentStep = 0;
        let sequenceInterval;

        // Instrument Definitions
        const instrumentConfigs = [
            { name: 'Kick', type: 'percussion', frequency: 60, color: '#ff3131', decay: 0.3 },
            { name: 'Snare', type: 'noise', frequency: 200, color: '#ffffff', decay: 0.2 },
            { name: 'Hi-Hat', type: 'hi-noise', frequency: 1000, color: '#00f2ff', decay: 0.05 },
            { name: 'Clap', type: 'clap-noise', frequency: 400, color: '#ffaa00', decay: 0.2 },
            { name: 'Bass', type: 'osc', frequency: 110, color: '#39ff14', decay: 0.4 },
            { name: 'Lead', type: 'osc', frequency: 440, color: '#f0f', decay: 0.3 },
            { name: 'Pad', type: 'osc', frequency: 220, color: '#0044ff', decay: 1.0 }
        ];

        // State for progression toggles
        const toggles = {
            ambient: true,
            beat: true,
            melody: false,
            harmony: false
        };

        // Initialize UI
        function initLayout() {
            const container = document.getElementById('orchestra-container');
            container.innerHTML = '';
            
            // Layout dimensions: Wide semi-circle
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight * 0.6; // Positioned lower
            const widthRadius = window.innerWidth * 0.4; // Wide
            const heightRadius = window.innerHeight * 0.25; // Shorter height

            instrumentConfigs.forEach((cfg, i) => {
                const angle = (Math.PI / (instrumentConfigs.length - 1)) * i - Math.PI;
                const x = centerX + Math.cos(angle) * widthRadius;
                const y = centerY + Math.sin(angle) * heightRadius;

                const dot = document.createElement('div');
                dot.className = 'instrument-dot';
                dot.id = `inst-${cfg.name.toLowerCase().replace(' ', '-')}`;
                dot.style.backgroundColor = cfg.color;
                dot.style.left = `${x}px`;
                dot.style.top = `${y}px`;
                dot.style.boxShadow = `0 0 15px ${cfg.color}`;
                
                const label = document.createElement('div');
                label.className = 'absolute text-[8px] uppercase opacity-50 whitespace-nowrap';
                label.innerText = cfg.name;
                label.style.left = `${x - 10}px`;
                label.style.top = `${y + 20}px`;
                
                container.appendChild(dot);
                container.appendChild(label);
            });
        }

        // Audio Engine
        function setupAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playPercussion(type, freq, decay) {
            if (!audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            if (type === 'noise' || type === 'hi-noise' || type === 'clap-noise') {
                const bufferSize = audioCtx.sampleRate * decay;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                
                const filter = audioCtx.createBiquadFilter();
                if (type === 'hi-noise') {
                    filter.type = 'highpass';
                    filter.frequency.value = 5000;
                } else if (type === 'clap-noise') {
                    filter.type = 'bandpass';
                    filter.frequency.value = 1200;
                    filter.Q.value = 1;
                } else {
                    filter.type = 'lowpass';
                    filter.frequency.value = 1000;
                }
                
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + decay);
                
                noise.start();
                noise.stop(audioCtx.currentTime + decay);
            } else {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1, audioCtx.currentTime + decay);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + decay);
                
                osc.start();
                osc.stop(audioCtx.currentTime + decay);
            }
        }

        function triggerInstrument(name) {
            const cfg = instrumentConfigs.find(c => c.name === name);
            if (!cfg) return;

            const el = document.getElementById(`inst-${name.toLowerCase().replace(' ', '-')}`);
            if (el) {
                el.classList.remove('active-pulse');
                void el.offsetWidth; // trigger reflow
                el.classList.add('active-pulse');
            }

            playPercussion(cfg.type, cfg.frequency, cfg.decay);
        }

        // Progression Loop
        function startSequence() {
            if (sequenceInterval) clearInterval(sequenceInterval);
            
            const stepTime = (60 / bpm / 4) * 1000; // 16th notes
            
            sequenceInterval = setInterval(() => {
                if (!isPlaying) return;

                // Simple beat logic
                if (toggles.beat) {
                    if (currentStep % 4 === 0) triggerInstrument('Kick');
                    if (currentStep % 8 === 4) triggerInstrument('Snare');
                    if (currentStep % 2 === 0) triggerInstrument('Hi-Hat');
                    if (currentStep % 16 === 12) triggerInstrument('Clap');
                }

                currentStep = (currentStep + 1) % 16;
            }, stepTime);
        }

        // Gemini Integration
        async function connectEngine() {
            const userKey = document.getElementById('api-key-input').value;
            const statusEl = document.getElementById('api-status');
            
            statusEl.innerText = "TESTING...";
            statusEl.className = "text-yellow-500";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${fallbackModel}:generateContent?key=${userKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Respond with the word 'ONLINE' if you receive this." }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                statusEl.innerText = "ONLINE";
                statusEl.className = "text-green-500";
                isPlaying = true;
                setupAudio();
                startSequence();
            } catch (err) {
                showToast("Connection Failed", `The Engine reported: ${err.message}. Ensure you are using gemini-2.5-flash-preview-09-2025 compatibility.`);
                statusEl.innerText = "OFFLINE";
                statusEl.className = "text-red-500";
            }
        }

        function showToast(title, msg) {
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast').classList.remove('hidden');
        }

        function hideToast() {
            document.getElementById('toast').classList.add('hidden');
        }

        // Event Listeners
        window.addEventListener('resize', initLayout);
        
        document.getElementById('connect-btn').addEventListener('click', connectEngine);

        document.getElementById('recalibrate-btn').addEventListener('click', () => {
            initLayout();
            setupAudio();
            if (!isPlaying) {
                isPlaying = true;
                startSequence();
            }
        });

        document.querySelectorAll('.toggle-prog').forEach(btn => {
            btn.addEventListener('click', function() {
                const type = this.getAttribute('data-type');
                toggles[type] = !toggles[type];
                
                if (toggles[type]) {
                    this.classList.add('bg-blue-900', 'border-blue-400');
                    this.classList.remove('border-gray-700');
                } else {
                    this.classList.remove('bg-blue-900', 'border-blue-400');
                    this.classList.add('border-gray-700');
                }
            });
        });

        // Initialize view
        window.onload = () => {
            initLayout();
            // Pre-select active toggles
            document.querySelectorAll('.toggle-prog').forEach(btn => {
                const type = btn.getAttribute('data-type');
                if (toggles[type]) {
                    btn.classList.add('bg-blue-900', 'border-blue-400');
                }
            });
        };

        // Visualizer Loop
        const canvas = document.getElementById('visualizer-canvas');
        const ctx = canvas.getContext('2d');

        function animate() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (isPlaying) {
                // Background subtle grid
                ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';
                ctx.lineWidth = 1;
                for(let i=0; i<canvas.width; i+=50) {
                    ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); ctx.stroke();
                }
                for(let i=0; i<canvas.height; i+=50) {
                    ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width, i); ctx.stroke();
                }
            }
            
            requestAnimationFrame(animate);
        }
        animate();

    </script>
</body>
</html>
