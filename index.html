<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Conductive v13</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--c:#00e5ff;--g:#39ff14;--m:#ff2daa;--a:#ffb300;--bg:#020409;--p:rgba(4,8,20,0.92);--b:rgba(0,229,255,0.1)}
body{background:var(--bg);color:#c0dce6;font-family:'Outfit',sans-serif;overflow:hidden;height:100dvh;width:100vw;touch-action:none}
canvas#viz{position:fixed;inset:0;width:100%;height:100%;z-index:1}
.ui{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;pointer-events:none;overflow:hidden}
.ui>*{pointer-events:auto}
.m{font-family:'JetBrains Mono',monospace}

/* === TOP BAR === */
.top{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;flex-shrink:0}
.brand{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:rgba(0,229,255,0.25)}.brand b{color:var(--c)}
.tmid{display:flex;gap:4px;align-items:center}
.tb{display:inline-flex;align-items:center;justify-content:center;background:0;border:1px solid var(--b);color:var(--c);padding:5px 9px;border-radius:5px;font-size:8px;cursor:pointer;transition:0.12s;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.tb:hover{border-color:var(--c)}.tb.on{border-color:var(--g);color:var(--g)}.tb.pau{border-color:var(--a);color:var(--a)}.tb.rec{border-color:var(--m);color:var(--m)}
.tr{display:flex;align-items:center;gap:10px}
.stat .l{font-size:6px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(0,229,255,0.15)}.stat .v{font-weight:900;font-size:16px;color:var(--c);line-height:1}
.stats{display:flex;gap:12px;text-align:right}
/* API */
.apia{position:relative}
.apip{display:flex;align-items:center;gap:4px;font-size:7px;letter-spacing:1px;text-transform:uppercase;padding:4px 7px;border:1px solid var(--b);border-radius:5px;cursor:pointer}
.apid{width:6px;height:6px;border-radius:50%;background:#333;transition:0.3s}
.apip.ok .apid{background:var(--g);box-shadow:0 0 5px rgba(57,255,20,0.5)}.apip.ok{color:var(--g)}
.apip.off .apid{background:var(--a)}.apip.off{color:var(--a)}
.apip.chk .apid{background:var(--c);animation:bl 1s infinite}
@keyframes bl{50%{opacity:0.3}}
.apidd{position:absolute;top:100%;right:0;margin-top:4px;background:var(--p);border:1px solid var(--b);border-radius:6px;padding:8px;width:260px;display:none;backdrop-filter:blur(12px);z-index:20}
.apidd.open{display:block}
.apidd label{font-size:6px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,229,255,0.15);display:block;margin-bottom:3px}
.apidd .n{font-size:6px;color:rgba(0,229,255,0.08);margin-top:3px}
.apidd .e{font-size:6px;color:var(--a);margin-top:2px;word-break:break-all}
.apir{display:flex;gap:3px}.apir input{flex:1;background:rgba(0,0,0,0.5);border:1px solid var(--b);color:var(--c);padding:5px 7px;border-radius:4px;font-size:9px;outline:none}
.apir button{background:0;border:1px solid var(--b);color:var(--c);padding:5px 8px;border-radius:4px;font-size:8px;cursor:pointer}

/* === FX BAR === */
.fxb{display:flex;gap:10px;padding:4px 12px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.fxb .sl{display:flex;align-items:center;gap:5px;background:rgba(0,229,255,0.015);padding:4px 8px;border-radius:5px;border:1px solid rgba(0,229,255,0.03)}
.fxb .sl label{font-size:7px;color:rgba(0,229,255,0.2);letter-spacing:1px;text-transform:uppercase;min-width:32px}
.fxb .sl input[type=range]{-webkit-appearance:none;width:70px;height:4px;background:rgba(0,229,255,0.08);border-radius:2px;outline:none}
.fxb .sl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--c);cursor:pointer}

/* === CONDUCT ZONE === */
.cz{flex:1;min-height:40px;cursor:crosshair}

/* === COMMAND BAR === */
.cmdb{display:flex;gap:4px;padding:3px 12px;align-items:center;flex-shrink:0}
.cmdb input{flex:1;background:rgba(0,0,0,0.3);border:1px solid var(--b);color:var(--c);padding:6px 8px;border-radius:6px;font-size:9px;outline:none;min-width:0}
.cmdb input:focus{border-color:var(--c)}.cmdb input::placeholder{color:rgba(0,229,255,0.07)}
.cmdb .tb{width:30px;height:30px;padding:0;flex-shrink:0;font-size:12px}
#log{font-size:6px;color:rgba(0,229,255,0.12);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}

/* === STAGE === */
.stw{padding:0 4px;flex-shrink:0}
.stage{position:relative;height:min(300px,36vh);overflow:visible}
canvas#sbg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.cpos{position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);font-size:5px;letter-spacing:2px;color:rgba(0,229,255,0.05)}
.ic{position:absolute;width:44px;height:44px;transform:translate(-50%,-50%);cursor:grab;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;border:1.5px solid rgba(0,229,255,0.08);background:rgba(4,8,20,0.92);transition:border-color 0.08s;user-select:none;z-index:2}
.ic.off{opacity:0.18;border-style:dashed}.ic.on{border-color:rgba(0,229,255,0.22)}
.ic.sel{border-color:var(--c);box-shadow:0 0 10px rgba(0,229,255,0.12);z-index:3}
.ic .s{font-size:13px;line-height:1}.ic .l{font-size:4.5px;letter-spacing:.8px;text-transform:uppercase;color:rgba(0,229,255,0.2);margin-top:1px}
.ic .rn{position:absolute;inset:-3px;border-radius:50%;border:2px solid transparent;transition:border-color 0.04s}
.ic.fire .rn{border-color:var(--g);box-shadow:0 0 5px rgba(57,255,20,0.15)}
.ic.drag{cursor:grabbing;z-index:5;border-color:var(--c)}

/* === CHORD PROGRESSION === */
.pb{padding:2px 4px;flex-shrink:0}
.pbox{background:var(--p);border:1px solid var(--b);border-radius:6px;padding:5px 8px;display:flex;align-items:center;gap:6px}
.psw{width:24px;height:12px;border-radius:6px;background:rgba(0,229,255,0.04);border:1px solid var(--b);position:relative;cursor:pointer;flex-shrink:0}
.psw::after{content:'';position:absolute;top:1px;left:1px;width:8px;height:8px;border-radius:50%;background:rgba(0,229,255,0.2);transition:0.2s}
.psw.on{background:rgba(57,255,20,0.06)}.psw.on::after{left:13px;background:var(--g)}
.psl{font-size:6px;letter-spacing:1px;color:rgba(0,229,255,0.12);flex-shrink:0}
.pcs{display:flex;gap:4px;flex:1}
.pc{flex:1;text-align:center;padding:7px 3px;border-radius:5px;border:1px solid rgba(0,229,255,0.05);font-size:12px;font-weight:700;color:rgba(0,229,255,0.18);cursor:pointer;transition:0.1s;position:relative}
.pc.act{border-color:rgba(0,229,255,0.2);color:var(--c);background:rgba(0,229,255,0.03)}
.pc.dim{opacity:0.2}
.pci{position:absolute;top:1px;left:2px;font-size:4px;color:rgba(0,229,255,0.06)}
.ced{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);margin-bottom:2px;background:var(--p);border:1px solid var(--b);border-radius:4px;padding:3px;display:none;z-index:20;min-width:60px}.ced.open{display:flex;flex-wrap:wrap;gap:2px}
.co{padding:3px 5px;border-radius:2px;font-size:7px;color:rgba(0,229,255,0.25);cursor:pointer}.co:hover{background:rgba(0,229,255,0.04);color:var(--c)}.co.cur{color:var(--c)}
.prnd{font-size:15px;color:rgba(0,229,255,0.15);cursor:pointer;padding:3px 5px;flex-shrink:0}.prnd:hover{color:var(--c)}

/* === PATTERN EDITOR === */
.pw{padding:0 4px;max-height:0;transition:max-height 0.3s,opacity 0.3s;opacity:0;overflow:hidden;flex-shrink:0}
.pw.open{max-height:250px;opacity:1}
.ppx{background:var(--p);border:1px solid var(--b);border-radius:6px;padding:6px 8px;margin-top:2px}
.phdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:4px;flex-wrap:wrap}
.ptit{font-size:7px;letter-spacing:1.5px;text-transform:uppercase;color:var(--c)}
.pact{display:flex;gap:6px}
.pact button{background:0;border:1px solid var(--b);color:rgba(0,229,255,0.22);padding:5px 10px;border-radius:4px;font-size:8px;cursor:pointer;min-width:42px;text-align:center;transition:0.12s}
.pact button:hover{color:var(--c);border-color:var(--c)}
.pfx{display:flex;gap:8px;margin-bottom:4px;flex-wrap:wrap;align-items:center}
.pfx .sl{display:flex;align-items:center;gap:3px}
.pfx .sl label{font-size:6px;color:rgba(0,229,255,0.15);letter-spacing:1px;text-transform:uppercase}
.pfx .sl input[type=range]{-webkit-appearance:none;width:50px;height:3px;background:rgba(0,229,255,0.06);border-radius:2px;outline:none}
.pfx .sl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--c);cursor:pointer}
.kmsel{display:none;gap:4px;align-items:center}.kmsel.show{display:flex}
.kmsel .tb{font-size:6px;padding:3px 7px}
.sg{display:flex;gap:1px;user-select:none}
.sc{flex:1;min-width:0;border-radius:2px;border:1px solid rgba(0,229,255,0.02);background:rgba(0,229,255,0.005);position:relative}
.sc:nth-child(4n+1){border-left-color:rgba(0,229,255,0.06)}
.sc.ph::after{content:'';position:absolute;inset:0;border:1px solid var(--g);border-radius:2px;pointer-events:none}
.sg.rh .sc{height:30px;cursor:pointer}.sg.rh .sc.on{background:rgba(0,229,255,0.12);border-color:rgba(0,229,255,0.1)}
.sg.mel .sc{display:flex;flex-direction:column;gap:1px;padding:1px}
.nr{height:13px;border-radius:1px;background:rgba(0,229,255,0.008);cursor:pointer;position:relative}
.nr:active{background:rgba(0,229,255,0.05)}.nr.on{background:rgba(0,229,255,0.15)}
.nrl{position:absolute;left:1px;top:50%;transform:translateY(-50%);font-size:4.5px;color:rgba(0,229,255,0.08);pointer-events:none}.nr.on .nrl{color:rgba(0,229,255,0.3)}

/* SPACER */
.bspc{flex-shrink:0;height:10px}

@media(max-width:700px){.ic{width:36px;height:36px}.ic .s{font-size:11px}.stage{height:min(240px,32vh)}.stat .v{font-size:13px}.fxb .sl input[type=range]{width:50px}}
</style>
</head>
<body>
<canvas id="viz"></canvas>
<div class="ui">
  <!-- TOP -->
  <div class="top">
    <div class="brand m"><b>Conductive</b> v13</div>
    <div class="tmid">
      <button class="tb m" id="startB">▶ Start</button>
      <button class="tb m" id="pauseB" style="display:none">⏸</button>
      <button class="tb m" id="voiceB">🎤 Speak</button>
      <button class="tb m" onclick="saveSong()">💾 Save</button>
      <button class="tb m" onclick="document.getElementById('loadFile').click()">📂 Load</button>
      <input type="file" id="loadFile" accept=".json" style="display:none" onchange="loadSong(this)">
    </div>
    <div class="tr">
      <div class="apia"><div class="apip m" id="apiP" onclick="document.getElementById('apiDD').classList.toggle('open')"><div class="apid"></div><span id="apiL">No Key</span></div>
        <div class="apidd m" id="apiDD"><label>Gemini API Key</label><div class="apir"><input type="password" id="apiK" placeholder="Paste key"><button onclick="connectAPI()">Go</button></div><div class="n">Memory only. ai.google.dev</div><div class="e" id="apiE"></div></div></div>
      <div class="stats"><div class="stat"><div class="l m">BPM</div><div class="v" id="vB">110</div></div><div class="stat"><div class="l m">Nrg</div><div class="v" id="vE">50</div></div><div class="stat"><div class="l m">Key</div><div class="v" id="vK" style="font-size:11px">Cm</div></div></div>
    </div>
  </div>
  <!-- FX -->
  <div class="fxb m">
    <div class="sl"><label>Reverb</label><input type="range" min="0" max="100" value="20" id="fxRev" oninput="setGFx('rev',this.value)"></div>
    <div class="sl"><label>Delay</label><input type="range" min="0" max="100" value="20" id="fxDel" oninput="setGFx('del',this.value)"></div>
    <div class="sl"><label>Filter</label><input type="range" min="0" max="100" value="65" id="fxFilt" oninput="setGFx('filt',this.value)"></div>
    <div class="sl"><label>Chorus</label><input type="range" min="0" max="100" value="25" id="fxCho" oninput="setGFx('cho',this.value)"></div>
  </div>
  <!-- CONDUCT -->
  <div class="cz" id="cz"></div>
  <!-- CMD -->
  <div class="cmdb"><input type="text" id="cmdIn" class="m" placeholder="describe what you want to hear…"><button class="tb m" id="cmdGo">→</button><div id="log" class="m">Tap Start</div></div>
  <!-- STAGE -->
  <div class="stw"><div class="stage" id="stage"><canvas id="sbg"></canvas><div class="cpos m">▲ you</div></div></div>
  <!-- CHORD PROG -->
  <div class="pb"><div class="pbox"><div class="psw on" id="psw" onclick="toggleProg()"></div><div class="psl m">Prog</div><div class="pcs m" id="pcs"></div><div class="prnd m" onclick="randProg()">🎲</div></div></div>
  <!-- PATTERN EDITOR -->
  <div class="pw" id="pw"><div class="ppx">
    <div class="phdr">
      <div class="ptit m" id="ptit">—</div>
      <div class="pfx m">
        <div class="sl"><label>Vol</label><input type="range" min="0" max="100" value="100" id="iVol" oninput="setIVol(this.value)"></div>
        <div class="sl"><label>Sus</label><input type="range" min="0" max="100" value="50" id="iSus" oninput="setISus(this.value)"></div>
        <div class="sl"><label>Rev</label><input type="range" min="0" max="100" value="0" id="iRev"></div>
        <div class="sl"><label>Del</label><input type="range" min="0" max="100" value="0" id="iDel"></div>
      </div>
      <div class="kmsel m" id="kmsel">
        <button class="tb" onclick="setKM('piano')">Piano</button>
        <button class="tb" onclick="setKM('organ')">Organ</button>
        <button class="tb" onclick="setKM('elec')">Elec</button>
        <button class="tb" onclick="setKM('class')">Classic</button>
      </div>
      <div class="pact m">
        <button onclick="clearPat()">Clear</button>
        <button onclick="randPat()">Rand</button>
        <button onclick="cloneInst()">Clone</button>
        <button onclick="deselect()">✕</button>
      </div>
    </div>
    <div class="sg" id="sg"></div>
  </div></div>
  <div class="bspc"></div>
</div>

<script>
// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const ST = 16;
const TIERS = 4;
const TV = [1, 0.8, 0.65, 0.5]; // tier volume multipliers

// ═══════════════════════════════════════════
// INSTRUMENT DEFINITIONS
// ═══════════════════════════════════════════
// type: 'note' = triggerAttackRelease(note, dur, time, vel)
//       'noise' = triggerAttackRelease(dur, time, vel)
//       'poly' = triggerAttackRelease([notes], dur, time, vel)
const DEFS = {
  kick:    {cat:'rhythm',  name:'Kick',    sym:'◉', tier:0, type:'note',  bus:'comp', defOn:true},
  snare:   {cat:'rhythm',  name:'Snare',   sym:'◎', tier:0, type:'noise', bus:'comp', defOn:true},
  hihat:   {cat:'rhythm',  name:'HiHat',   sym:'✧', tier:0, type:'note',  bus:'comp', defOn:true},
  clap:    {cat:'rhythm',  name:'Clap',    sym:'✦', tier:0, type:'noise', bus:'comp', defOn:false},
  perc:    {cat:'rhythm',  name:'Perc',    sym:'◇', tier:1, type:'note',  bus:'comp', defOn:false},
  subbass: {cat:'bass',    name:'Sub',     sym:'≋', tier:1, type:'note',  bus:'comp', defOn:false},
  synbass: {cat:'bass',    name:'Bass',    sym:'≈', tier:1, type:'note',  bus:'comp', defOn:true},
  lead:    {cat:'melodic', name:'Lead',    sym:'♪', tier:2, type:'note',  bus:'del',  defOn:true},
  pluck:   {cat:'melodic', name:'Pluck',   sym:'⊕', tier:2, type:'note',  bus:'del',  defOn:false},
  bell:    {cat:'melodic', name:'Bell',    sym:'♦', tier:2, type:'note',  bus:'cho',  defOn:false},
  arp:     {cat:'melodic', name:'Arp',     sym:'↯', tier:2, type:'note',  bus:'del',  defOn:false},
  violin:  {cat:'melodic', name:'Violin',  sym:'🎻', tier:2, type:'note',  bus:'cho',  defOn:false},
  cello:   {cat:'melodic', name:'Cello',   sym:'🎻', tier:2, type:'note',  bus:'cho',  defOn:false},
  keys:    {cat:'melodic', name:'Keys',    sym:'🎹', tier:2, type:'poly',  bus:'cho',  defOn:false},
  pad:     {cat:'atmo',    name:'Pad',     sym:'◐', tier:3, type:'poly',  bus:'wide', defOn:false},
  strings: {cat:'atmo',    name:'Strings', sym:'∿', tier:3, type:'poly',  bus:'cho',  defOn:false},
  choir:   {cat:'atmo',    name:'Choir',   sym:'❂', tier:3, type:'poly',  bus:'wide', defOn:false},
  texture: {cat:'atmo',    name:'Texture', sym:'░', tier:3, type:'note',  bus:'rev',  defOn:false},
};

// Auto-distribute angles per tier: -70° to +70°
(function autoSpace(){
  const tiers = {};
  Object.entries(DEFS).forEach(([id,d]) => { if(!tiers[d.tier]) tiers[d.tier]=[]; tiers[d.tier].push(id); });
  Object.values(tiers).forEach(ids => {
    const n = ids.length;
    ids.forEach((id,i) => { DEFS[id].angle = n===1 ? 0 : -70 + (140/(n-1))*i; });
  });
})();

// ═══════════════════════════════════════════
// SYNTH FACTORIES — NO MetalSynth
// ═══════════════════════════════════════════
const FACTORY = {
  kick:    () => new Tone.MembraneSynth({pitchDecay:0.05,octaves:5,volume:0,envelope:{attack:0.001,decay:0.3,sustain:0,release:0.15}}),
  snare:   () => new Tone.NoiseSynth({volume:-4,noise:{type:'white'},envelope:{attack:0.001,decay:0.15,sustain:0}}),
  hihat:   () => new Tone.Synth({oscillator:{type:"square"},volume:-4,envelope:{attack:0.001,decay:0.035,sustain:0,release:0.01}}),
  clap:    () => new Tone.NoiseSynth({volume:-4,noise:{type:'pink'},envelope:{attack:0.003,decay:0.2,sustain:0}}),
  perc:    () => new Tone.Synth({oscillator:{type:"triangle"},volume:-2,envelope:{attack:0.001,decay:0.06,sustain:0,release:0.01}}),
  subbass: () => new Tone.MonoSynth({oscillator:{type:"sine"},volume:0,envelope:{attack:0.01,decay:0.4,sustain:0.7,release:0.3},filterEnvelope:{attack:0.01,decay:0.1,sustain:0,release:0.3,baseFrequency:40,octaves:2}}),
  synbass: () => new Tone.MonoSynth({oscillator:{type:"sawtooth"},volume:-4,envelope:{attack:0.01,decay:0.2,sustain:0.4,release:0.3},filterEnvelope:{attack:0.01,decay:0.15,sustain:0,release:0.4,baseFrequency:100,octaves:3}}),
  lead:    () => new Tone.MonoSynth({oscillator:{type:"triangle"},volume:-4,envelope:{attack:0.05,decay:0.3,sustain:0.4,release:0.6},filterEnvelope:{attack:0.04,decay:0.3,sustain:0.1,release:0.6,baseFrequency:500,octaves:5}}),
  pluck:   () => new Tone.Synth({oscillator:{type:"triangle"},volume:-4,envelope:{attack:0.001,decay:0.4,sustain:0,release:0.3}}),
  bell:    () => new Tone.Synth({oscillator:{type:"sine"},volume:-4,envelope:{attack:0.001,decay:1.5,sustain:0,release:1}}),
  arp:     () => new Tone.MonoSynth({oscillator:{type:"square"},volume:-6,envelope:{attack:0.01,decay:0.15,sustain:0.2,release:0.3},filterEnvelope:{attack:0.01,decay:0.15,sustain:0.1,release:0.3,baseFrequency:800,octaves:4}}),
  violin:  () => new Tone.MonoSynth({oscillator:{type:"sawtooth"},volume:-6,envelope:{attack:0.3,decay:0.3,sustain:0.8,release:0.5},filterEnvelope:{attack:0.2,decay:0.3,sustain:0.3,release:0.5,baseFrequency:600,octaves:3}}),
  cello:   () => new Tone.MonoSynth({oscillator:{type:"sawtooth"},volume:-4,envelope:{attack:0.4,decay:0.3,sustain:0.8,release:0.6},filterEnvelope:{attack:0.3,decay:0.3,sustain:0.2,release:0.6,baseFrequency:200,octaves:3}}),
  keys:    () => new Tone.PolySynth(Tone.Synth,{oscillator:{type:"triangle"},volume:-4,envelope:{attack:0.01,decay:0.3,sustain:0.5,release:0.4}}),
  pad:     () => new Tone.PolySynth(Tone.Synth,{oscillator:{type:"fatsawtooth",count:3,spread:40},volume:-6,envelope:{attack:2,decay:1,sustain:0.8,release:3}}),

// UNIVERSAL TRIGGER
// ═══════════════════════════════════════════
function trig(id, note, dur, time, vel) {
  const s = synths[id]; if(!s) return;
  const def = DEFS[id]; if(!def) return;
  try {
    if(def.type === 'noise') s.triggerAttackRelease(dur, time, vel);
    else if(def.type === 'poly') s.triggerAttackRelease(note, dur, time, vel);
    else s.triggerAttackRelease(note, dur, time, vel);
  } catch(e) { console.warn('trig', id, e.message); }
}

const N2S={'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'F':5,'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11};
const S2N=['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
function noteToMidi(ns){const m=ns.match(/^([A-G][b#]?)(\d)$/);if(!m)return 60;return N2S[m[1]]+(+m[2]+1)*12}
function midiToNote(m){return S2N[m%12]+(Math.floor(m/12)-1)}
function chordRoot(ch){return ch?.[0] ? (N2S[ch[0].replace(/\d/,'')] || 0) : 0}

// ═══════════════════════════════════════════
// SCALE
// ═══════════════════════════════════════════
function getScale(k,m){
  const s=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const f=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
  const iv = m==='minor' ? [0,2,3,5,7,8,10] : [0,2,4,5,7,9,11];
  const ri = s.indexOf(k); if(ri<0) return s.slice(0,7);
  return iv.map(i => (m==='minor'?f:s)[(ri+i)%12]);
}
function patNotes(id){
  const sc=getScale(E.key,E.mode), d=DEFS[id];
  let lo=4,hi=5;
  if(d.cat==='bass'){lo=2;hi=3} else if(d.cat==='atmo'){lo=3;hi=4}
  return[sc[4]+hi,sc[2]+hi,sc[0]+hi,sc[4]+lo,sc[2]+lo,sc[0]+lo];
}

function gURL(){return'https://generativelanguage.googleapis.com/v1beta/models/'+GM[gMi]+':generateContent?key='+gKey}
async function gCall(p,retries){
  const rd=[1500,3000],mx=retries||rd.length;
  for(let a=0;a<=mx;a++){
    try{
      const r=await fetch(gURL(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:p}]}]})});
      const d=await r.json();
      if(r.ok&&d.candidates?.[0]?.content?.parts?.[0]?.text) return{ok:1,text:d.candidates[0].content.parts[0].text};
      if(d.error&&a===mx) return{ok:0,error:d.error.message};
    }catch(e){if(a===mx)return{ok:0,error:e.message}}
    if(a<mx) await new Promise(r=>setTimeout(r,rd[Math.min(a,rd.length-1)]));
  }
  return{ok:0,error:'Retries'};
}

const stageEl=document.getElementById('stage'), sbg=document.getElementById('sbg'), sbgCtx=sbg.getContext('2d');

function sGeo(){const r=stageEl.getBoundingClientRect();return{W:r.width,H:r.height,cx:r.width/2,cy:r.height+10,mr:36,ts:(r.height-5-36)/(TIERS-1)}}
function tierR(t){const g=sGeo();return g.mr+t*g.ts}
function ang2xy(a,t){const g=sGeo(),r=tierR(t),rd=a*Math.PI/180;return{x:g.cx+Math.sin(rd)*r,y:g.cy-Math.cos(rd)*r}}
function xy2ang(x,y){const g=sGeo(),dx=x-g.cx,dy=g.cy-y;return{a:Math.max(-80,Math.min(80,Math.atan2(dx,dy)*180/Math.PI)),t:Math.round(Math.max(0,Math.min(TIERS-1,(Math.sqrt(dx*dx+dy*dy)-g.mr)/g.ts)))}}

function drawArcs(){const g=sGeo();sbg.width=g.W;sbg.height=g.H;const c=sbgCtx;c.clearRect(0,0,g.W,g.H);for(let t=0;t<TIERS;t++){const r=tierR(t);c.beginPath();c.arc(g.cx,g.cy,r,Math.PI+0.12,-0.12);c.strokeStyle='rgba(0,229,255,'+(0.015+(TIERS-1-t)*0.006)+')';c.lineWidth=1;c.stroke()}}

function buildStage(){
  stageEl.querySelectorAll('.ic').forEach(e=>e.remove());
  drawArcs();
  Object.entries(DEFS).forEach(([id,d]) => {
    const st=E.inst[id]; if(!st) return;
    const p=ang2xy(st.angle,st.tier);
    const el=document.createElement('div');
    el.className='ic'+(st.on?' on':' off')+(selInst===id?' sel':'');
    el.id='i-'+id;
    el.style.left=p.x+'px'; el.style.top=p.y+'px';
    el.innerHTML=`<div class="rn"></div><div class="s">${d.sym}</div><div class="l">${d.name}</div>`;

    let drag=false,sx=0,sy=0;
    const oS=(cx,cy)=>{sx=cx;sy=cy;drag=false;el.classList.add('drag')};
    const oM=(cx,cy)=>{
      if(Math.abs(cx-sx)+Math.abs(cy-sy)>8) drag=true;
      if(!drag) return;
      const rect=stageEl.getBoundingClientRect(), at=xy2ang(cx-rect.left,cy-rect.top);
      st.angle=at.a; st.tier=at.t;
      st.pan=Math.sin(at.a*Math.PI/180); st.vol=TV[at.t];
      if(panners[id]) panners[id].pan.value=st.pan;
      if(gains[id]) gains[id].gain.rampTo(st.vol*st.uVol,0.1);
      const np=ang2xy(st.angle,st.tier);
      el.style.left=np.x+'px'; el.style.top=np.y+'px';
    };
    const oE=()=>{el.classList.remove('drag');if(!drag)tapInst(id)};

    el.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();oS(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
    el.addEventListener('touchmove',e=>{e.stopPropagation();e.preventDefault();oM(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
    el.addEventListener('touchend',e=>{e.stopPropagation();oE()});
    el.addEventListener('mousedown',e=>{e.stopPropagation();oS(e.clientX,e.clientY);
      const mm=ev=>oM(ev.clientX,ev.clientY),mu=()=>{oE();window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu)};
      window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);
    });
    stageEl.appendChild(el);
  });
}

  const g=document.getElementById('sg'), isR=d.cat==='rhythm';

  for(let s=0; s<ST; s++){
    const cell=document.createElement('div'); cell.className='sc';

      });
    } else {
      notes.forEach(ns=>{
        const row=document.createElement('div');
        row.className='nr'+(st.pat[s].includes(ns)?' on':'');
        row.innerHTML='<span class="nrl">'+ns+'</span>';
        row.addEventListener('pointerdown', e=>{

          if(st.usePat && st.patRoot===undefined) st.patRoot=chordRoot(E.chords[E.ci]);
        });

      });

  }
}

document.getElementById('startB').addEventListener('click', boot);
async function boot(){
  if(booted) return;
  try{await Tone.start()}catch(e){lg("Audio blocked.");return}
  booted=true;
  document.getElementById('startB').textContent='● Live';
  document.getElementById('startB').classList.add('on');
  document.getElementById('pauseB').style.display='';

  // Effects chain
  fx.master = new Tone.Gain(0.9).toDestination();
  fx.rev = new Tone.Reverb({decay:4,wet:0.12}).connect(fx.master); await fx.rev.ready;
  fx.filt = new Tone.Filter(E.fc,"lowpass").connect(fx.rev);
  fx.del = new Tone.FeedbackDelay("8n.",0.2).connect(fx.filt);
  fx.cho = new Tone.Chorus(3,2.5,0.5).connect(fx.rev).start();
  fx.comp = new Tone.Compressor(-10,3).connect(fx.master);
  fx.wide = new Tone.StereoWidener(0.5).connect(fx.rev);
  analyser = new Tone.Analyser('waveform',256); fx.master.connect(analyser);

  // Wire all instruments
  Object.entries(DEFS).forEach(([id,d]) => {
    const st=E.inst[id], bus=d.bus||'comp';
    const s=FACTORY[id](), g=new Tone.Gain(st.vol*st.uVol), p=new Tone.Panner(st.pan);
    s.connect(g); g.connect(p); p.connect(fx[bus]||fx.comp);
    synths[id]=s; gains[id]=g; panners[id]=p;
  });
  console.log("Wired:",Object.keys(synths).join(', '));

  // Boot test
  setTimeout(()=>{try{synths.kick.triggerAttackRelease("C1","8n",undefined,0.5);console.log("✓ Boot kick")}catch(e){console.error("✗",e)}},300);

  // Sequencer
  let arpS=0;
  new Tone.Loop(time => {
    const e=E.energy, s16=cStep%ST;

    // Chord change every 16 steps
    if(cStep%ST===0 && autoProg) E.ci=(E.ci+1)%E.chords.length;
    const ch=E.chords[E.ci];

    // Atmosphere (generative only)
    if(cStep%ST===0){
      ['pad','strings'].forEach(id=>{const st=E.inst[id];if(st?.on&&!st.usePat)trig(id,ch,"1m",time,e*0.5+0.3)});
      if(E.inst.choir?.on&&!E.inst.choir.usePat) trig('choir',ch.map(n=>n.replace(/\d/,'4')),"1m",time,e*0.5+0.3);
      if(E.inst.texture?.on&&!E.inst.texture.usePat) trig('texture',ch[0].replace(/\d/,'2'),"1m",time,e*0.3+0.2);
    }

    // All instruments
    const V = e*0.5+0.3;
    Object.entries(E.inst).forEach(([id,st]) => {
      if(!st.on) return;
      const d=DEFS[id]; if(!d) return;
      if(d.cat==='atmo' && !st.usePat) return;

      if(st.usePat && st.pat.some(p=>p.length)){
        // PATTERN MODE
        const v=st.pat[s16]; if(!v.length) return;
        playPatStep(id, d, ch, v, time, e);
      } else if(d.cat!=='atmo'){
        // GENERATIVE MODE
        genPlay(id, d, ch, s16, time, e, arpS);
      }
    });

    if(E.inst.arp?.on) arpS++;
    cStep++;
    Tone.Draw.schedule(()=>{upPlayhead();upChordHL()},time);
  },"16n").start(0);

  Tone.Transport.bpm.value=E.tempo;
  Tone.Transport.start();
  buildStage();
  requestAnimationFrame(renderViz);
  lg("Live. 1 finger=point · 2 fingers=tempo");
}

// ═══════════════════════════════════════════
// PATTERN STEP PLAYBACK
// ═══════════════════════════════════════════
function playPatStep(id, d, ch, vals, time, e) {
  if(d.cat==='rhythm'){
    if(id.startsWith('kick')) trig(id,"C1","8n",time,e*0.7+0.3);
    else if(id.startsWith('hihat')) trig(id,"C8","32n",time,e*0.6+0.3);
    else if(id.startsWith('perc')) trig(id,"G6","16n",time,e*0.6+0.3);
    else trig(id, null, "16n", time, e*0.6+0.3); // snare/clap
  } else {
    const st=E.inst[id];
    const shift = st.patRoot!==undefined ? (chordRoot(ch)-st.patRoot+12)%12 : 0;
    const dur = d.cat==='bass'?'4n' : d.cat==='atmo'?'2n' : '8n';
    if(d.type==='poly'){
      const notes = vals.map(ns => { if(shift===0)return ns; return midiToNote(noteToMidi(ns)+shift); });
      trig(id, notes, dur, time, e*0.5+0.3);
    } else {
      vals.forEach(ns => {
        const note = shift===0 ? ns : midiToNote(noteToMidi(ns)+shift);
        trig(id, note, dur, time, e*0.5+0.3);
      });
    }
  }
  flashInst(id);
}

// ═══════════════════════════════════════════
// GENERATIVE PLAYBACK
// ═══════════════════════════════════════════
function genPlay(id, d, ch, s, t, e, arpS) {
  const V = e*0.5+0.3;
  const base = id.split('_')[0]; // handle clones
  switch(base){
    case'kick':    if(s%8===0||(s%8===3&&e>0.6)||(s%8===6&&e>0.8)){trig(id,"C1","8n",t,V);flashInst(id)}break;
    case'snare':   if(s%8===4||(s%16===10&&e>0.5)){trig(id,null,"16n",t,V);flashInst(id)}break;
    case'hihat':   if(e>0.1&&(s%4===0||(s%2===0&&e>0.4))){trig(id,"C8","32n",t,V);flashInst(id)}break;
    case'clap':    if(s%8===4){trig(id,null,"16n",t,V);flashInst(id)}break;
    case'perc':    if(s%4===2){trig(id,"G6","16n",t,V);flashInst(id)}break;
    case'subbass': if(s%8===0){trig(id,ch[0].replace(/\d/,'1'),"4n",t,V);flashInst(id)}break;
    case'synbass': if(s%8===0){trig(id,ch[0].replace(/\d/,'2'),"4n",t,V);flashInst(id)}break;
    case'lead':    if(Math.random()<e*0.55&&(s%4===0||(s%4===2&&Math.random()<0.4))){trig(id,ch[Math.floor(Math.random()*3)].replace(/[23]/,Math.random()>0.5?'5':'4'),"8n",t,V);flashInst(id)}break;
    case'pluck':   if(s%8===0){trig(id,ch[Math.floor(Math.random()*3)].replace(/[23]/,'4'),"8n",t,V);flashInst(id)}break;
    case'bell':    if(s%8===0){trig(id,ch[Math.floor(Math.random()*3)].replace(/[23]/,'5'),"4n",t,V*0.7);flashInst(id)}break;
    case'arp':     if(s%2===0){const ns=[...ch.map(n=>n.replace(/[23]/,'4')),...ch.map(n=>n.replace(/[23]/,'5'))];trig(id,ns[arpS%ns.length],"16n",t,V);flashInst(id)}break;
    case'violin':  if(Math.random()<e*0.4&&s%4===0){trig(id,ch[Math.floor(Math.random()*3)].replace(/[23]/,'5'),"4n",t,V);flashInst(id)}break;
    case'cello':   if(s%8===0){trig(id,ch[0].replace(/\d/,'3'),"4n",t,V);flashInst(id)}break;
    case'keys':    if(s%4===0){trig(id,[ch[0].replace(/\d/,'4'),ch[1]?.replace(/\d/,'4'),ch[2]?.replace(/\d/,'4')].filter(Boolean),"4n",t,V*0.8);flashInst(id)}break;
  }
}

// ═══════════════════════════════════════════
// PAUSE
// ═══════════════════════════════════════════
document.getElementById('pauseB').addEventListener('click',()=>{
  if(!booted)return;
  const playing=Tone.Transport.state==='started';
  if(playing){Tone.Transport.pause();document.getElementById('pauseB').textContent='▶';document.getElementById('pauseB').classList.add('pau')}
  else{Tone.Transport.start();document.getElementById('pauseB').textContent='⏸';document.getElementById('pauseB').classList.remove('pau')}
});

// ═══════════════════════════════════════════
// CONDUCTING — spatial volume + 2-finger tempo
// ═══════════════════════════════════════════
const trail=[]; let conducting=false, twoFinger=false, tfStartY=0, tfStartTempo=0;
const czEl=document.getElementById('cz');

czEl.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length>=2){twoFinger=true;tfStartY=(e.touches[0].clientY+e.touches[1].clientY)/2;tfStartTempo=E.tempo;return}
  conducting=true; doConduct(e.touches[0].clientX, e.touches[0].clientY);
},{passive:false});
czEl.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(twoFinger&&e.touches.length>=2){const y=(e.touches[0].clientY+e.touches[1].clientY)/2;E.tempo=Math.max(40,Math.min(200,Math.round(tfStartTempo+(tfStartY-y)*0.5)));if(booted)Tone.Transport.bpm.rampTo(E.tempo,0.1);upUI();return}
  if(conducting) doConduct(e.touches[0].clientX, e.touches[0].clientY);
},{passive:false});
czEl.addEventListener('touchend',conductEnd);czEl.addEventListener('touchcancel',conductEnd);
czEl.addEventListener('mousedown',e=>{conducting=true;doConduct(e.clientX,e.clientY)});
czEl.addEventListener('mousemove',e=>{if(conducting)doConduct(e.clientX,e.clientY)});
czEl.addEventListener('mouseup',conductEnd);czEl.addEventListener('mouseleave',conductEnd);

function doConduct(x,y){
  if(!booted) return;
  E.energy=Math.max(0,Math.min(1,1-y/window.innerHeight));
  const nx=x/window.innerWidth, pointerAngle=(nx-0.5)*160;
  Object.entries(E.inst).forEach(([id,st])=>{
    if(!gains[id]) return;
    const prox=Math.max(0,1-Math.abs(st.angle-pointerAngle)/80);
    gains[id].gain.rampTo(st.vol*st.uVol*(1+prox*0.6),0.12);
  });
  E.fc=200+nx*7000;
  if(fx.filt) fx.filt.frequency.rampTo(E.fc,0.08);
  upUI();
  trail.push({x,y,t:performance.now()});if(trail.length>80)trail.shift();
}

function conductEnd(){
  conducting=false; twoFinger=false;
  if(booted) Object.entries(E.inst).forEach(([id,st])=>{if(gains[id])gains[id].gain.rampTo(st.vol*st.uVol,0.3)});
}

// ═══════════════════════════════════════════
// AI
// ═══════════════════════════════════════════
async function interpret(input){
  if(!input?.trim()) return; lg('…');
  if(!gKey){fallback(input);return}
  setAP('chk');
  const il=Object.entries(DEFS).map(([k,v])=>k+'('+v.name+')').join(', ');
  const al=Object.entries(E.inst).filter(([k,v])=>v.on).map(([k])=>k).join(',');
  const sc=getScale(E.key,E.mode);
  const prompt=`You control a live music engine. Return ONLY JSON. No markdown.
Instruments: ${il}
Keys: C-B. Modes: minor, major. Scale: ${sc.join(',')}
You can activate instruments AND program 16-step patterns.

Format: {"tempo":40-200,"energy":0-1,"key":"X","mode":"minor|major","filterCutoff":100-8000,
"instruments":{"name":bool},
"patterns":{"name":["C4",null,"E4",null,null,null,null,null,null,null,null,null,null,null,null,null]}}

Pattern: 16 slots. Rhythm uses "hit"/null. Melodic uses note strings or null.

State: tempo=${E.tempo},energy=${E.energy},key=${E.key} ${E.mode},active=[${al}]
Command: "${input}"`;
  const r=await gCall(prompt,2);
  if(r.ok){try{applyAI(JSON.parse(r.text.replace(/```json|```/g,'').trim()));setAP('ok')}catch(e){setAP('ok');fallback(input)}}
  else{setAP('ok');fallback(input)}
}

function applyAI(j){
  if(j.tempo) E.tempo=Math.max(40,Math.min(200,j.tempo));
  if(j.energy!==undefined) E.energy=Math.max(0,Math.min(1,j.energy));
  if(j.filterCutoff) E.fc=Math.max(100,Math.min(8000,j.filterCutoff));
  if(j.key&&KEYS_DATA[j.key]) E.key=j.key;
  if(j.mode==='major'||j.mode==='minor') E.mode=j.mode;
  if(j.instruments) Object.entries(j.instruments).forEach(([k,v])=>{if(E.inst[k])E.inst[k].on=!!v});
  if(j.patterns) Object.entries(j.patterns).forEach(([id,pat])=>{
    if(!E.inst[id]||!Array.isArray(pat)) return;
    E.inst[id].pat=pat.map(v=>v?[v]:[]);
    E.inst[id].usePat=E.inst[id].pat.some(p=>p.length);
    if(E.inst[id].usePat) E.inst[id].patRoot=chordRoot(E.chords[E.ci]);
  });
  if(KEYS_DATA[E.key]?.[E.mode]) E.chords=KEYS_DATA[E.key][E.mode];
  if(booted){Tone.Transport.bpm.rampTo(E.tempo,2);fx.filt.frequency.rampTo(E.fc,1)}
  buildStage();upUI();renderChords();
  if(selInst&&(j.patterns?.[selInst]||j.instruments?.[selInst]!==undefined)) openPat(selInst);
  lg('AI → '+E.tempo+'bpm '+E.key+(E.mode==='minor'?'m':''));
}

function fallback(cmd){
  const t=(typeof cmd==='string'?cmd:'').toLowerCase();
  if(t.match(/chill|calm|slow|soft/)){E.tempo=78;E.energy=0.25}
  else if(t.match(/hype|dance|party|fast|drop/)){E.tempo=130;E.energy=0.9;E.inst.clap.on=true;E.inst.arp.on=true}
  else if(t.match(/dark|heavy|intense/)){E.tempo=95;E.energy=0.75;E.mode='minor';E.inst.subbass.on=true}
  else if(t.match(/cinematic|epic|film/)){E.tempo=85;E.energy=0.6;E.inst.strings.on=true;E.inst.pad.on=true;E.inst.violin.on=true;E.inst.cello.on=true}
  else if(t.match(/ambient|space|dream/)){E.tempo=70;E.energy=0.3;E.inst.pad.on=true;E.inst.texture.on=true;E.inst.bell.on=true}
  if(KEYS_DATA[E.key]?.[E.mode]) E.chords=KEYS_DATA[E.key][E.mode];
  if(booted) Tone.Transport.bpm.rampTo(E.tempo,2);
  buildStage();upUI();renderChords();lg('→ '+E.tempo+'bpm');
}

// VOICE

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;

// ═══════════════════════════════════════════
// VISUALS
// ═══════════════════════════════════════════
const vc=document.getElementById('viz'), vx=vc.getContext('2d');
const particles=[];
class Particle{
  constructor(x,y,c){this.x=x;this.y=y;this.c=c||'0,229,255';this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=1;this.d=0.01+Math.random()*0.01;this.sz=1+Math.random()*2}
  update(){this.x+=this.vx;this.y+=this.vy;this.vy-=0.006;this.life-=this.d}
}

function renderViz(){
  const W=vc.width=window.innerWidth, H=vc.height=window.innerHeight;
  const t=performance.now()*0.001, e=E.energy, now=performance.now();
  vx.clearRect(0,0,W,H);

  // BG glow
  const g=vx.createRadialGradient(W/2,H*0.18,0,W/2,H*0.18,W*0.3);
  g.addColorStop(0,'rgba(0,'+(18+e*30|0)+','+(30+e*45|0)+','+(0.015+e*0.02)+')');
  g.addColorStop(1,'transparent');
  vx.fillStyle=g;vx.fillRect(0,0,W,H);

  // Pulse
  const cx=W/2,cy=H*0.18,bR=20+e*40;
  vx.beginPath();
  for(let a=0;a<Math.PI*2;a+=0.06){const n=Math.sin(a*6+t*3)*6*e+Math.sin(a*3-t*2)*3*e;a===0?vx.moveTo(cx+Math.cos(a)*(bR+n),cy+Math.sin(a)*(bR+n)):vx.lineTo(cx+Math.cos(a)*(bR+n),cy+Math.sin(a)*(bR+n))}
  vx.closePath();vx.strokeStyle='rgba(0,229,255,'+(0.02+e*0.08)+')';vx.lineWidth=1;vx.stroke();

  // Trail
  if(trail.length>1){
    vx.beginPath();let started=false;
    trail.forEach(p=>{if((now-p.t)/2000>1)return;if(!started){vx.moveTo(p.x,p.y);started=true}else vx.lineTo(p.x,p.y)});
    vx.strokeStyle='rgba(0,229,255,0.2)';vx.lineWidth=1.5;vx.stroke();
  }
  while(trail.length&&now-trail[0].t>2000) trail.shift();

  // Particles
  if(Math.random()<e*0.1){const a=Math.random()*Math.PI*2;particles.push(new Particle(cx+Math.cos(a)*bR,cy+Math.sin(a)*bR))}
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.update();if(p.life<=0){particles.splice(i,1);continue}vx.beginPath();vx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);vx.fillStyle='rgba('+p.c+','+p.life*0.15+')';vx.fill()}
  if(particles.length>80) particles.splice(0,particles.length-80);

  requestAnimationFrame(renderViz);
}

function upUI(){
  document.getElementById('vB').textContent=Math.round(E.tempo);
  document.getElementById('vE').textContent=Math.round(E.energy*100);
  document.getElementById('vK').textContent=E.key+(E.mode==='minor'?'m':'');
}
function lg(m){document.getElementById('log').textContent='> '+m}

// ═══════════════════════════════════════════
// SONG SAVE / LOAD
// ═══════════════════════════════════════════
function saveSong(){
  const song = {
    version: 13,
    name: prompt('Song name:', 'Untitled') || 'Untitled',
    timestamp: new Date().toISOString(),
    tempo: E.tempo,
    energy: E.energy,
    key: E.key,
    mode: E.mode,
    chords: E.chords,
    filterCutoff: E.fc,
    autoProg: autoProg,
    instruments: {}
  };
  // Save each instrument's full state
  Object.entries(E.inst).forEach(([id, st]) => {
    const d = DEFS[id];
    song.instruments[id] = {
      on: st.on,
      angle: st.angle,
      tier: st.tier,
      uVol: st.uVol,
      sus: st.sus,
      pat: st.pat,
      usePat: st.usePat,
      patRoot: st.patRoot,
      // Include def info for cloned instruments
      isClone: !FACTORY[id],
      cloneBase: d?.name?.split(' ')[0]?.toLowerCase(),
    };
  });

  // Download as JSON
  const blob = new Blob([JSON.stringify(song, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = song.name.replace(/[^a-zA-Z0-9_-]/g,'_') + '.json';
  a.click();
  URL.revokeObjectURL(url);
  lg('Saved: ' + song.name);
}

function loadSong(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const song = JSON.parse(ev.target.result);
      applySong(song);
      lg('Loaded: ' + (song.name || 'song'));
    } catch(e) {
      lg('Bad file: ' + e.message);
    }
  };
  reader.readAsText(file);
  input.value = ''; // reset so same file can be loaded again
}

function applySong(song){
  // Core state
  E.tempo = song.tempo || 110;
  E.energy = song.energy || 0.5;
  E.key = song.key || 'C';
  E.mode = song.mode || 'minor';
  E.fc = song.filterCutoff || 3500;
  if(song.chords) E.chords = song.chords;
  if(song.autoProg !== undefined) { autoProg = song.autoProg; document.getElementById('psw').classList.toggle('on', autoProg); }

  // Update chords from key if not provided
  if(!song.chords && KEYS_DATA[E.key]?.[E.mode]) E.chords = KEYS_DATA[E.key][E.mode];

  // Instruments
  if(song.instruments){
    Object.entries(song.instruments).forEach(([id, saved]) => {
      if(!E.inst[id]) {
        // This might be a cloned instrument — recreate it
        if(saved.isClone && saved.cloneBase && FACTORY[saved.cloneBase]){
          const base = saved.cloneBase;
          const srcDef = Object.entries(DEFS).find(([k,v])=>k===base)?.[1];
          if(srcDef){
            DEFS[id] = {cat:srcDef.cat, name:id, sym:srcDef.sym, tier:saved.tier||srcDef.tier, angle:saved.angle||0, type:srcDef.type, bus:srcDef.bus, defOn:true};
            E.inst[id] = {on:true,angle:0,tier:0,pan:0,vol:1,uVol:1,sus:0.5,pat:Array.from({length:ST},()=>[]),usePat:false,patRoot:undefined};
            // Wire synth if booted
            if(booted && FACTORY[base]){
              const s=FACTORY[base](), g=new Tone.Gain(1), p=new Tone.Panner(0);
              s.connect(g);g.connect(p);p.connect(fx[srcDef.bus]||fx.comp);
              synths[id]=s;gains[id]=g;panners[id]=p;
            }
          }
        } else return; // unknown instrument, skip
      }

      const st = E.inst[id];
      if(saved.on !== undefined) st.on = saved.on;
      if(saved.angle !== undefined) { st.angle = saved.angle; st.pan = Math.sin(saved.angle * Math.PI/180); }
      if(saved.tier !== undefined) { st.tier = saved.tier; st.vol = TV[saved.tier]; }
      if(saved.uVol !== undefined) st.uVol = saved.uVol;
      if(saved.sus !== undefined) st.sus = saved.sus;
      if(saved.pat) { st.pat = saved.pat.map(p => Array.isArray(p) ? [...p] : []); }
      if(saved.usePat !== undefined) st.usePat = saved.usePat;
      if(saved.patRoot !== undefined) st.patRoot = saved.patRoot;

      // Apply to live audio
      if(booted){
        if(gains[id]) gains[id].gain.rampTo(st.vol * st.uVol, 0.1);
        if(panners[id]) panners[id].pan.value = st.pan;
        if(synths[id] && saved.sus !== undefined){
          try{ synths[id].set({envelope:{sustain:st.sus, release:0.1+st.sus*2}}); }catch(e){}
        }
      }
    });
  }

  // Apply transport
  if(booted){
    Tone.Transport.bpm.rampTo(E.tempo, 1);
    if(fx.filt) fx.filt.frequency.rampTo(E.fc, 0.5);
  }

  // Refresh UI
  buildStage();
  upUI();
  renderChords();
  if(selInst) openPat(selInst);
}

// Init
buildStage();
