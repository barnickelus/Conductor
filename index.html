<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conductive v8.0</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --cyan:#00e5ff;--green:#39ff14;--magenta:#ff2daa;--amber:#ffb300;--red:#ff3d3d;
            --bg:#020409;--panel:rgba(4,8,20,0.92);--border:rgba(0,229,255,0.1);
        }
        body{background:var(--bg);color:#c0dce6;font-family:'Outfit',sans-serif;overflow:hidden;height:100vh;width:100vw;touch-action:none}
        canvas#main{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
        canvas#waveform{position:fixed;bottom:0;left:0;width:100%;height:36px;z-index:2;opacity:0.2}
        #conduct-surface{position:fixed;top:0;left:0;width:100%;height:100%;z-index:3;cursor:crosshair}
        .ui{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;pointer-events:none}
        .ui>*{pointer-events:auto}

        /* ═══ TOP BAR ═══ */
        .top-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;pointer-events:none;flex-shrink:0}
        .top-bar>*{pointer-events:auto}
        .brand{display:flex;align-items:center;gap:8px}
        .brand-text{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(0,229,255,0.35);font-family:'JetBrains Mono',monospace}
        .brand-text span{color:var(--cyan);font-weight:700}
        .top-right{display:flex;align-items:center;gap:20px}
        .stats{display:flex;gap:18px;text-align:right}
        .stat-block .label{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,229,255,0.25);font-family:'JetBrains Mono',monospace}
        .stat-block .value{font-family:'Outfit';font-weight:900;font-size:22px;color:var(--cyan);line-height:1.1}
        /* API Status */
        .api-status{display:flex;align-items:center;gap:6px;font-size:8px;font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase;padding:5px 10px;border:1px solid var(--border);border-radius:6px}
        .api-dot{width:7px;height:7px;border-radius:50%;background:#333;transition:all 0.3s}
        .api-status.connected .api-dot{background:var(--green);box-shadow:0 0 8px rgba(57,255,20,0.5)}
        .api-status.connected{color:var(--green);border-color:rgba(57,255,20,0.2)}
        .api-status.offline .api-dot{background:var(--amber);box-shadow:0 0 8px rgba(255,179,0,0.4)}
        .api-status.offline{color:var(--amber);border-color:rgba(255,179,0,0.15)}
        .api-status.checking .api-dot{background:var(--cyan);animation:blink 1s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

        /* ═══ CONDUCTING ZONE ═══ */
        .conduct-zone{flex:1;pointer-events:none;min-height:40px}
        .conduct-hint{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);font-size:10px;font-family:'JetBrains Mono',monospace;color:rgba(0,229,255,0.1);letter-spacing:2px;text-transform:uppercase;pointer-events:none;z-index:4;transition:opacity 0.6s}

        /* ═══ SEMICIRCULAR STAGE ═══ */
        .stage-wrap{flex-shrink:0;padding:0 8px;position:relative}
        .stage{position:relative;height:260px;overflow:visible}
        canvas#stage-bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

        .inst-icon{
            position:absolute;width:46px;height:46px;transform:translate(-50%,-50%);
            cursor:grab;display:flex;flex-direction:column;align-items:center;justify-content:center;
            border-radius:50%;border:1.5px solid rgba(0,229,255,0.1);
            background:rgba(4,8,20,0.92);transition:border-color 0.15s,box-shadow 0.15s;
            user-select:none;z-index:2;
        }
        .inst-icon.inactive{opacity:0.25;border-style:dashed}
        .inst-icon.active{border-color:rgba(0,229,255,0.3)}
        .inst-icon.selected{border-color:var(--cyan);box-shadow:0 0 18px rgba(0,229,255,0.25);z-index:3}
        .inst-icon .sym{font-size:16px;line-height:1}
        .inst-icon .lbl{font-size:5.5px;letter-spacing:1px;text-transform:uppercase;color:rgba(0,229,255,0.35);font-family:'JetBrains Mono',monospace;margin-top:1px}
        .inst-icon .ring{position:absolute;inset:-4px;border-radius:50%;border:2px solid transparent;transition:border-color 0.08s}
        .inst-icon.firing .ring{border-color:var(--green);box-shadow:0 0 8px rgba(57,255,20,0.25)}
        .inst-icon.dragging{cursor:grabbing;z-index:5;border-color:var(--cyan)}
        .conductor-pos{
            position:absolute;bottom:0;left:50%;transform:translate(-50%,50%);
            font-size:7px;letter-spacing:2px;text-transform:uppercase;
            color:rgba(0,229,255,0.12);font-family:'JetBrains Mono',monospace;
        }

        /* ═══ PATTERN EDITOR ═══ */
        .pattern-wrap{flex-shrink:0;padding:0 8px;max-height:0;transition:max-height 0.3s,opacity 0.3s;opacity:0;overflow:hidden}
        .pattern-wrap.open{max-height:180px;opacity:1}
        .pattern-box{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-top:6px}
        .pattern-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
        .pattern-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);font-family:'JetBrains Mono',monospace}
        .pattern-actions{display:flex;gap:5px}
        .pattern-actions button{background:transparent;border:1px solid var(--border);color:rgba(0,229,255,0.35);padding:3px 8px;border-radius:4px;font-size:8px;cursor:pointer;font-family:'JetBrains Mono',monospace;letter-spacing:1px;transition:all 0.2s}
        .pattern-actions button:hover{border-color:var(--cyan);color:var(--cyan)}

        .step-grid{display:flex;gap:2px}
        .step-cell{flex:1;min-width:0;border-radius:3px;border:1px solid rgba(0,229,255,0.04);background:rgba(0,229,255,0.01);cursor:pointer;position:relative;transition:background 0.08s}
        .step-cell:nth-child(4n+1){border-left-color:rgba(0,229,255,0.1)}
        .step-cell.playhead::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--green);border-radius:2px 2px 0 0}
        /* Rhythm grid */
        .step-grid.rhythm .step-cell{height:32px}
        .step-grid.rhythm .step-cell.on{background:rgba(0,229,255,0.18);border-color:rgba(0,229,255,0.25)}
        /* Melodic grid */
        .step-grid.melodic .step-cell{display:flex;flex-direction:column;gap:1px;padding:1px;height:auto}
        .note-row{height:14px;border-radius:2px;background:rgba(0,229,255,0.015);cursor:pointer;transition:background 0.08s;position:relative}
        .note-row:hover{background:rgba(0,229,255,0.06)}
        .note-row.on{background:rgba(0,229,255,0.22)}
        .note-row-label{position:absolute;right:1px;top:50%;transform:translateY(-50%);font-size:5px;color:rgba(0,229,255,0.15);font-family:'JetBrains Mono',monospace;pointer-events:none}

        /* ═══ BOTTOM CONTROLS ═══ */
        .bottom-bar{flex-shrink:0;display:flex;gap:7px;align-items:center;padding:8px 12px;flex-wrap:wrap}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;background:transparent;border:1px solid var(--border);color:var(--cyan);padding:8px 12px;border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;transition:all 0.2s;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;user-select:none}
        .btn:hover{background:rgba(0,229,255,0.05);border-color:var(--cyan)}
        .btn.active{border-color:var(--green);color:var(--green)}
        .btn.recording{border-color:var(--magenta);color:var(--magenta);animation:pmag 1s infinite}
        .btn.paused{border-color:var(--amber);color:var(--amber)}
        @keyframes pmag{0%,100%{box-shadow:0 0 6px rgba(255,45,170,0.12)}50%{box-shadow:0 0 16px rgba(255,45,170,0.35)}}
        .text-input-row{display:flex;gap:4px;flex:1;min-width:180px;max-width:360px}
        .text-input-row input{flex:1;background:rgba(0,0,0,0.5);border:1px solid var(--border);color:var(--cyan);padding:8px 10px;border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:10px;outline:none}
        .text-input-row input:focus{border-color:var(--cyan)}
        .text-input-row input::placeholder{color:rgba(0,229,255,0.12)}
        .text-input-row .btn{flex-shrink:0;width:34px;padding:0}
        #log{font-family:'JetBrains Mono',monospace;font-size:7px;color:rgba(0,229,255,0.2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
        @media(max-width:700px){.inst-icon{width:38px;height:38px}.inst-icon .sym{font-size:13px}.stage{height:220px}.stat-block .value{font-size:18px}}
    </style>
</head>
<body>
<canvas id="main"></canvas>
<canvas id="waveform"></canvas>
<div id="conduct-surface"></div>
<div class="conduct-hint" id="conduct-hint">Touch above to conduct</div>

<div class="ui">
    <div class="top-bar">
        <div class="brand">
            <svg width="18" height="18" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="12" stroke="var(--cyan)" stroke-width="1" opacity="0.3"/><circle cx="14" cy="14" r="6" stroke="var(--cyan)" stroke-width="1.5"/><circle cx="14" cy="14" r="2" fill="var(--cyan)"/></svg>
            <div class="brand-text"><span>Conductive</span> v8</div>
        </div>
        <div class="top-right">
            <div class="api-status" id="api-status"><div class="api-dot"></div><span id="api-label">AI Off</span></div>
            <div class="stats">
                <div class="stat-block"><div class="label">BPM</div><div class="value" id="bpm-val">110</div></div>
                <div class="stat-block"><div class="label">Energy</div><div class="value" id="energy-val">50</div></div>
                <div class="stat-block"><div class="label">Key</div><div class="value" id="key-val" style="font-size:16px">Cm</div></div>
            </div>
        </div>
    </div>

    <div class="conduct-zone"></div>

    <!-- SEMICIRCULAR STAGE -->
    <div class="stage-wrap">
        <div class="stage" id="stage">
            <canvas id="stage-bg"></canvas>
            <div class="conductor-pos">▲ you</div>
        </div>
    </div>

    <!-- PATTERN EDITOR -->
    <div class="pattern-wrap" id="pattern-wrap">
        <div class="pattern-box">
            <div class="pattern-header">
                <div class="pattern-title" id="pattern-title">—</div>
                <div class="pattern-actions">
                    <button onclick="clearPattern()">Clear</button>
                    <button onclick="randomPattern()">Random</button>
                    <button onclick="deselectInst()">✕</button>
                </div>
            </div>
            <div class="step-grid" id="step-grid"></div>
        </div>
    </div>

    <!-- BOTTOM -->
    <div class="bottom-bar">
        <button class="btn" id="init-btn">▶ Start</button>
        <button class="btn" id="pause-btn" style="display:none">⏸</button>
        <button class="btn" id="voice-btn" title="Speak a command">🎤 Speak</button>
        <div class="text-input-row">
            <input type="text" id="cmd-input" placeholder="describe what you want…">
            <button class="btn" id="cmd-send">→</button>
        </div>
        <div id="log">Tap Start</div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════
const GEMINI_KEY = 'AIzaSyA_HmuE45nOcdtX5YCDFOh-do';
const STEPS = 16;
const TIERS = 4; // 0=front(loud) → 3=back(quiet)
const TIER_VOLS = [1, 0.65, 0.4, 0.2];
let apiStatus = 'off'; // off | checking | connected | offline

// ═══════════════════════════════════════════
// INSTRUMENTS
// ═══════════════════════════════════════════
const INSTRUMENTS = {
    kick:    {cat:'rhythm', name:'Kick',    sym:'◉', angle:-35, tier:0},
    snare:   {cat:'rhythm', name:'Snare',   sym:'◎', angle:-15, tier:0},
    hihat:   {cat:'rhythm', name:'HiHat',   sym:'✧', angle:5,   tier:0},
    clap:    {cat:'rhythm', name:'Clap',    sym:'✦', angle:25,  tier:0},
    perc:    {cat:'rhythm', name:'Perc',    sym:'◇', angle:45,  tier:1},
    subbass: {cat:'bass',   name:'Sub',     sym:'≋', angle:-10, tier:1},
    synbass: {cat:'bass',   name:'Bass',    sym:'≈', angle:10,  tier:1},
    lead:    {cat:'melodic',name:'Lead',    sym:'♪', angle:-25, tier:2},
    pluck:   {cat:'melodic',name:'Pluck',   sym:'⊕', angle:0,   tier:2},
    bell:    {cat:'melodic',name:'Bell',    sym:'♦', angle:25,  tier:2},
    arp:     {cat:'melodic',name:'Arp',     sym:'↯', angle:45,  tier:2},
    pad:     {cat:'atmo',   name:'Pad',     sym:'◐', angle:-40, tier:3},
    strings: {cat:'atmo',   name:'Strings', sym:'∿', angle:-15, tier:3},
    choir:   {cat:'atmo',   name:'Choir',   sym:'❂', angle:15,  tier:3},
    texture: {cat:'atmo',   name:'Texture', sym:'░', angle:40,  tier:3},
};

// ═══════════════════════════════════════════
// ENGINE STATE
// ═══════════════════════════════════════════
const engine = {
    tempo:110, energy:0.5, chordIndex:0, key:'C', mode:'minor',
    chords:[["C3","Eb3","G3"],["Ab2","C3","Eb3"],["Bb2","D3","F3"],["G2","B2","D3"]],
    filterCutoff:2500, playing:false, paused:false,
    inst:{},
};

Object.entries(INSTRUMENTS).forEach(([id,def])=>{
    const on = ['kick','snare','hihat','synbass','lead'].includes(id);
    engine.inst[id] = {
        active:on,
        angle:def.angle, tier:def.tier,
        pan: Math.sin(def.angle * Math.PI/180),
        vol: TIER_VOLS[def.tier],
        pattern: Array.from({length:STEPS},()=>[]), // each step is array of values
        usePattern:false,
    };
});

const KEYS={
    'C':{minor:[["C3","Eb3","G3"],["Ab2","C3","Eb3"],["Bb2","D3","F3"],["G2","B2","D3"]],major:[["C3","E3","G3"],["F2","A2","C3"],["G2","B2","D3"],["A2","C3","E3"]]},
    'D':{minor:[["D3","F3","A3"],["Bb2","D3","F3"],["C3","E3","G3"],["A2","C#3","E3"]],major:[["D3","F#3","A3"],["G2","B2","D3"],["A2","C#3","E3"],["B2","D3","F#3"]]},
    'E':{minor:[["E3","G3","B3"],["C3","E3","G3"],["D3","F#3","A3"],["B2","D#3","F#3"]],major:[["E3","G#3","B3"],["A2","C#3","E3"],["B2","D#3","F#3"],["C#3","E3","G#3"]]},
    'F':{minor:[["F3","Ab3","C4"],["Db3","F3","Ab3"],["Eb3","G3","Bb3"],["C3","E3","G3"]],major:[["F3","A3","C4"],["Bb2","D3","F3"],["C3","E3","G3"],["D3","F3","A3"]]},
    'G':{minor:[["G3","Bb3","D4"],["Eb3","G3","Bb3"],["F3","A3","C4"],["D3","F#3","A3"]],major:[["G3","B3","D4"],["C3","E3","G3"],["D3","F#3","A3"],["E3","G3","B3"]]},
    'A':{minor:[["A3","C4","E4"],["F3","A3","C4"],["G3","B3","D4"],["E3","G#3","B3"]],major:[["A3","C#4","E4"],["D3","F#3","A3"],["E3","G#3","B3"],["F#3","A3","C#4"]]},
    'B':{minor:[["B3","D4","F#4"],["G3","B3","D4"],["A3","C#4","E4"],["F#3","A#3","C#4"]],major:[["B3","D#4","F#4"],["E3","G#3","B3"],["F#3","A#3","C#4"],["G#3","B3","D#4"]]},
};

let synths={},panners={},gains={},effects={},analyser=null,booted=false;
let currentStep=0, selectedInst=null;

// ═══════════════════════════════════════════
// STAGE — SEMICIRCULAR LAYOUT
// ═══════════════════════════════════════════
const stageEl = document.getElementById('stage');
const stageBg = document.getElementById('stage-bg');
const stageBgCtx = stageBg.getContext('2d');

function stageGeom() {
    const r = stageEl.getBoundingClientRect();
    const W = r.width, H = r.height;
    const cx = W/2, cy = H + 10; // conductor is below stage
    const minR = 60, maxR = H - 10;
    const tierStep = (maxR - minR) / (TIERS - 1);
    return {W,H,cx,cy,minR,maxR,tierStep};
}

function tierRadius(tier, g) { return g.minR + tier * g.tierStep; }

function angleTierToXY(angle, tier) {
    const g = stageGeom();
    const r = tierRadius(tier, g);
    const rad = angle * Math.PI / 180;
    return { x: g.cx + Math.sin(rad)*r, y: g.cy - Math.cos(rad)*r };
}

function xyToAngleTier(x, y) {
    const g = stageGeom();
    const dx = x - g.cx, dy = g.cy - y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const angle = Math.atan2(dx, dy) * 180 / Math.PI;
    const tier = Math.round(Math.max(0, Math.min(TIERS-1, (dist - g.minR) / g.tierStep)));
    return { angle: Math.max(-75, Math.min(75, angle)), tier };
}

function drawStageArcs() {
    const g = stageGeom();
    stageBg.width = g.W; stageBg.height = g.H;
    const ctx = stageBgCtx;
    ctx.clearRect(0,0,g.W,g.H);

    // Draw tier arcs
    for (let t = 0; t < TIERS; t++) {
        const r = tierRadius(t, g);
        ctx.beginPath();
        ctx.arc(g.cx, g.cy, r, Math.PI + 0.35, -0.35);
        ctx.strokeStyle = 'rgba(0,229,255,' + (0.04 + (TIERS-1-t)*0.02) + ')';
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    // Tier labels
    const labels = ['Front · Loud','','','Back · Soft'];
    [0, TIERS-1].forEach(t => {
        const r = tierRadius(t, g);
        const lx = g.cx + Math.sin(-70*Math.PI/180)*r - 10;
        const ly = g.cy - Math.cos(-70*Math.PI/180)*r;
        ctx.font = '7px JetBrains Mono';
        ctx.fillStyle = 'rgba(0,229,255,0.1)';
        ctx.fillText(labels[t], lx - 30, ly);
    });

    // Center line
    ctx.beginPath();
    ctx.moveTo(g.cx, g.cy - g.minR + 10);
    ctx.lineTo(g.cx, g.cy - g.maxR - 5);
    ctx.strokeStyle = 'rgba(0,229,255,0.04)';
    ctx.stroke();
}

function buildStage() {
    stageEl.querySelectorAll('.inst-icon').forEach(e=>e.remove());
    drawStageArcs();

    Object.entries(INSTRUMENTS).forEach(([id,def])=>{
        const st = engine.inst[id];
        const pos = angleTierToXY(st.angle, st.tier);
        const icon = document.createElement('div');
        icon.className = 'inst-icon'+(st.active?' active':' inactive')+(selectedInst===id?' selected':'');
        icon.id = 'icon-'+id;
        icon.style.left = pos.x+'px'; icon.style.top = pos.y+'px';
        icon.innerHTML = `<div class="ring"></div><div class="sym">${def.sym}</div><div class="lbl">${def.name}</div>`;

        let dragged=false, startX=0, startY=0;
        const onStart=(cx,cy)=>{startX=cx;startY=cy;dragged=false;icon.classList.add('dragging')};
        const onMove=(cx,cy)=>{
            const dx=cx-startX, dy=cy-startY;
            if(Math.abs(dx)+Math.abs(dy)>8) dragged=true;
            if(!dragged) return;
            const rect=stageEl.getBoundingClientRect();
            const lx=cx-rect.left, ly=cy-rect.top;
            const at=xyToAngleTier(lx,ly);
            st.angle=at.angle; st.tier=at.tier;
            st.pan=Math.sin(at.angle*Math.PI/180);
            st.vol=TIER_VOLS[at.tier];
            if(panners[id]) panners[id].pan.value=st.pan;
            if(gains[id]) gains[id].gain.rampTo(st.vol,0.1);
            const np=angleTierToXY(st.angle,st.tier);
            icon.style.left=np.x+'px'; icon.style.top=np.y+'px';
        };
        const onEnd=()=>{icon.classList.remove('dragging');if(!dragged)handleTap(id)};

        icon.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();onStart(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
        icon.addEventListener('touchmove',e=>{e.stopPropagation();e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
        icon.addEventListener('touchend',e=>{e.stopPropagation();onEnd()});
        icon.addEventListener('mousedown',e=>{e.stopPropagation();onStart(e.clientX,e.clientY);
            const mm=ev=>onMove(ev.clientX,ev.clientY);
            const mu=()=>{onEnd();window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu)};
            window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);
        });
        stageEl.appendChild(icon);
    });
}

function handleTap(id) {
    if (selectedInst===id) { engine.inst[id].active=!engine.inst[id].active; updateStage(); return; }
    selectedInst=id;
    updateStage();
    openPattern(id);
}

function deselectInst() { selectedInst=null; document.getElementById('pattern-wrap').classList.remove('open'); updateStage(); }

function updateStage() {
    Object.keys(INSTRUMENTS).forEach(id=>{
        const el=document.getElementById('icon-'+id); if(!el)return;
        const s=engine.inst[id];
        el.className='inst-icon'+(s.active?' active':' inactive')+(selectedInst===id?' selected':'');
    });
}

function flashIcon(id) {
    const el=document.getElementById('icon-'+id); if(!el)return;
    el.classList.add('firing'); setTimeout(()=>el.classList.remove('firing'),100);
}

window.addEventListener('resize',()=>{drawStageArcs();
    Object.entries(engine.inst).forEach(([id,st])=>{
        const el=document.getElementById('icon-'+id); if(!el)return;

        el.style.left=p.x+'px'; el.style.top=p.y+'px';
    });
});

// PATTERN EDITOR — MULTI-NOTE
// ═══════════════════════════════════════════
const NOTE_OCTS = ['5','4','3','2']; // top to bottom

function openPattern(id) {
    const def=INSTRUMENTS[id], st=engine.inst[id];
    document.getElementById('pattern-title').textContent=def.name+' Pattern';
    document.getElementById('pattern-wrap').classList.add('open');
    const grid=document.getElementById('step-grid');
    const isR = def.cat==='rhythm';
    grid.innerHTML='';
    grid.className='step-grid '+(isR?'rhythm':'melodic');

    for(let s=0;s<STEPS;s++){
        const cell=document.createElement('div');
        cell.className='step-cell';
        cell.dataset.step=s;

        if(isR){
            if(st.pattern[s].length) cell.classList.add('on');
            const toggle=()=>{
                st.pattern[s] = st.pattern[s].length ? [] : ['hit'];
                st.usePattern = st.pattern.some(p=>p.length);
                cell.classList.toggle('on', st.pattern[s].length>0);
            };
            cell.addEventListener('click', toggle);
            cell.addEventListener('touchstart', e=>{e.preventDefault();toggle()},{passive:false});
        } else {
            NOTE_OCTS.forEach(oct=>{
                const row=document.createElement('div');
                row.className='note-row'+(st.pattern[s].includes(oct)?' on':'');
                row.dataset.oct=oct;
                row.innerHTML='<span class="note-row-label">'+oct+'</span>';
                const toggle=()=>{
                    const arr=st.pattern[s];
                    const idx=arr.indexOf(oct);
                    if(idx>=0) arr.splice(idx,1); else arr.push(oct);
                    row.classList.toggle('on',arr.includes(oct));
                    st.usePattern = st.pattern.some(p=>p.length);
                };
                row.addEventListener('click',e=>{e.stopPropagation();toggle()});
                row.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();toggle()},{passive:false});
                cell.appendChild(row);
            });
        }
        grid.appendChild(cell);
    }
}

function updatePlayhead() {
    if(!selectedInst)return;
    const cells=document.getElementById('step-grid').children;
    const s16=currentStep%STEPS;
    for(let i=0;i<STEPS;i++){if(cells[i])cells[i].classList.toggle('playhead',i===s16)}
}

function clearPattern() {
    if(!selectedInst)return;
    engine.inst[selectedInst].pattern=Array.from({length:STEPS},()=>[]);
    engine.inst[selectedInst].usePattern=false;
    openPattern(selectedInst);
}

function randomPattern() {
    if(!selectedInst)return;
    const def=INSTRUMENTS[selectedInst], st=engine.inst[selectedInst];
    const e=engine.energy;
    for(let s=0;s<STEPS;s++){
        st.pattern[s]=[];
        if(Math.random()<e*0.45){
            if(def.cat==='rhythm') st.pattern[s]=['hit'];
            else {
                const oct=NOTE_OCTS[Math.floor(Math.random()*4)];
                st.pattern[s]=[oct];
                if(Math.random()<0.2){ // chance of double note
                    const oct2=NOTE_OCTS[Math.floor(Math.random()*4)];
                    if(!st.pattern[s].includes(oct2)) st.pattern[s].push(oct2);
                }
            }
        }
    }
    st.usePattern=true;
    openPattern(selectedInst);
}

async function boot() {
    if(booted)return;
    try{await Tone.start()}catch(e){log("Audio blocked.");return}
    booted=true; engine.playing=true;
    document.getElementById('init-btn').textContent='● Live';
    document.getElementById('init-btn').classList.add('active');
    document.getElementById('pause-btn').style.display='';

    effects.master=new Tone.Gain(0.8).toDestination();
    effects.reverb=new Tone.Reverb({decay:5,wet:0.3}).connect(effects.master);
    effects.filter=new Tone.Filter(engine.filterCutoff,"lowpass").connect(effects.reverb);
    effects.delay=new Tone.FeedbackDelay("8n.",0.3).connect(effects.filter);
    effects.chorus=new Tone.Chorus(3,2.5,0.5).connect(effects.reverb).start();
    effects.comp=new Tone.Compressor(-16,4).connect(effects.master);
    effects.wide=new Tone.StereoWidener(0.6).connect(effects.reverb);
    analyser=new Tone.Analyser('waveform',256);
    effects.master.connect(analyser);

    function wire(id,synth,dest){
        const g=new Tone.Gain(engine.inst[id].vol);
        const p=new Tone.Panner(engine.inst[id].pan);
        synth.connect(g); g.connect(p); p.connect(dest);
        gains[id]=g; panners[id]=p; synths[id]=synth;
    }

    // Rhythm
    wire('kick',new Tone.MembraneSynth({pitchDecay:0.05,octaves:5,volume:-6,envelope:{attack:0.001,decay:0.25,sustain:0,release:0.25}}),effects.comp);
    wire('snare',new Tone.NoiseSynth({volume:-14,noise:{type:'white'},envelope:{attack:0.001,decay:0.12,sustain:0}}),effects.filter);
    wire('hihat',new Tone.MetalSynth({volume:-22,frequency:300,envelope:{attack:0.001,decay:0.05,release:0.01},harmonicity:5.1,modulationIndex:32,resonance:2500,octaves:1.5}),effects.filter);
    wire('clap',new Tone.NoiseSynth({volume:-16,noise:{type:'pink'},envelope:{attack:0.005,decay:0.15,sustain:0}}),effects.filter);
    wire('perc',new Tone.MetalSynth({volume:-20,frequency:800,envelope:{attack:0.001,decay:0.08,release:0.01},harmonicity:3,modulationIndex:16,resonance:3000,octaves:1}),effects.delay);

    // Bass
    wire('subbass',new Tone.MonoSynth({oscillator:{type:"sine"},volume:-8,envelope:{attack:0.01,decay:0.4,sustain:0.6,release:0.3},filterEnvelope:{attack:0.01,decay:0.1,sustain:0,release:0.3,baseFrequency:40,octaves:2}}),effects.comp);
    wire('synbass',new Tone.MonoSynth({oscillator:{type:"sawtooth"},volume:-12,envelope:{attack:0.01,decay:0.2,sustain:0.4,release:0.3},filterEnvelope:{attack:0.01,decay:0.15,sustain:0,release:0.4,baseFrequency:100,octaves:3}}),effects.comp);

    // Melodic
    wire('lead',new Tone.MonoSynth({oscillator:{type:"sine"},volume:-14,envelope:{attack:0.06,decay:0.25,sustain:0.3,release:0.6},filterEnvelope:{attack:0.05,decay:0.3,sustain:0,release:0.6,baseFrequency:400,octaves:4}}),effects.delay);
    wire('pluck',new Tone.PluckSynth({volume:-14,resonance:0.9,release:1.2}),effects.delay);
    wire('bell',new Tone.MetalSynth({volume:-18,frequency:600,envelope:{attack:0.001,decay:0.8,release:0.3},harmonicity:12,modulationIndex:20,resonance:800,octaves:2}),effects.chorus);
    wire('arp',new Tone.MonoSynth({oscillator:{type:"square"},volume:-16,envelope:{attack:0.01,decay:0.1,sustain:0.1,release:0.2},filterEnvelope:{attack:0.01,decay:0.1,sustain:0,release:0.2,baseFrequency:500,octaves:3}}),effects.delay);

    // Atmo
    wire('pad',new Tone.PolySynth(Tone.Synth,{oscillator:{type:"fatsawtooth",count:3,spread:40},volume:-20,envelope:{attack:2.5,decay:1,sustain:0.8,release:3}}),effects.wide);
    wire('strings',new Tone.PolySynth(Tone.Synth,{oscillator:{type:"fatsawtooth",count:5,spread:20},volume:-20,envelope:{attack:1.5,decay:0.5,sustain:0.9,release:2.5}}),effects.chorus);
    wire('choir',new Tone.PolySynth(Tone.Synth,{oscillator:{type:"sine"},volume:-22,envelope:{attack:2,decay:1,sustain:0.7,release:3}}),effects.wide);
    wire('texture',new Tone.NoiseSynth({volume:-28,noise:{type:'brown'},envelope:{attack:3,decay:2,sustain:0.3,release:4}}),effects.reverb);

    // Sequencer
    let arpStep=0;
    new Tone.Loop(time=>{
        const e=engine.energy, s16=currentStep%STEPS;
        const chord=engine.chords[engine.chordIndex];

        if(currentStep%32===0){
            engine.chordIndex=(engine.chordIndex+1)%engine.chords.length;
            const ch=engine.chords[engine.chordIndex];
            ['pad','strings'].forEach(id=>{if(engine.inst[id]?.active){synths[id].triggerAttackRelease(ch,"2m",time,e*0.2);flashIcon(id)}});
            if(engine.inst.choir?.active){synths.choir.triggerAttackRelease(ch.map(n=>n.replace(/\d/,'4')),"2m",time,e*0.15);flashIcon('choir')}
            if(engine.inst.texture?.active){synths.texture.triggerAttackRelease("2m",time,e*0.1);flashIcon('texture')}
        }

        Object.entries(engine.inst).forEach(([id,st])=>{
            if(!st.active||INSTRUMENTS[id].cat==='atmo')return;
            if(st.usePattern&&st.pattern.some(p=>p.length)){
                const vals=st.pattern[s16]; if(!vals.length)return;
                playStep(id,chord,vals,time,e);
            } else { genPlay(id,chord,s16,currentStep,time,e,arpStep); }
        });

        if(engine.inst.arp?.active)arpStep++;
        currentStep++;
        updatePlayhead();
    },"16n").start(0);

    Tone.Transport.bpm.value=engine.tempo;
    Tone.Transport.start();
    buildStage();
    requestAnimationFrame(renderLoop);
    testAPI();
    log("Live. Touch to conduct, tap icons to edit.");
    document.getElementById('conduct-hint').style.opacity='1';
    setTimeout(()=>document.getElementById('conduct-hint').style.opacity='0',3500);
}

function playStep(id,chord,vals,time,e) {
    const def=INSTRUMENTS[id];
    if(def.cat==='rhythm'){
        const m={kick:()=>synths.kick.triggerAttackRelease("C1","8n",time,e),snare:()=>synths.snare.triggerAttackRelease("16n",time,e*0.4),hihat:()=>synths.hihat.triggerAttackRelease("32n",time,e*0.1),clap:()=>synths.clap.triggerAttackRelease("16n",time,e*0.3),perc:()=>synths.perc.triggerAttackRelease("32n",time,e*0.12)};
        if(m[id])m[id]();
    } else {
        vals.forEach(oct=>{
            const note=chord[Math.floor(Math.random()*3)].replace(/\d/,oct);
            if(id==='pluck')synths.pluck.triggerAttackRelease(note,time);
            else if(id==='bell')synths.bell.triggerAttackRelease("16n",time,e*0.1);
            else synths[id]?.triggerAttackRelease?.(note,"8n",time,e*0.3);
        });
    }
    flashIcon(id);
}

function genPlay(id,chord,s16,abs,time,e,arpS) {
    switch(id){
        case 'kick': if(s16%8===0||(s16%8===3&&e>0.65)||(s16%8===6&&e>0.8)){synths.kick.triggerAttackRelease("C1","8n",time,Math.min(e*1.1,1));flashIcon('kick')} break;
        case 'snare': if(s16%8===4||(s16%16===10&&e>0.5)){synths.snare.triggerAttackRelease("16n",time,e*0.4);flashIcon('snare')} break;
        case 'hihat': if(e>0.2&&(s16%4===0||(s16%2===0&&e>0.6))){synths.hihat.triggerAttackRelease("32n",time,e*0.08);flashIcon('hihat')} break;
        case 'clap': if(s16%16===4){synths.clap.triggerAttackRelease("16n",time,e*0.3);flashIcon('clap')} break;
        case 'perc': if(Math.random()<e*0.2&&s16%4===2){synths.perc.triggerAttackRelease("32n",time,e*0.1);flashIcon('perc')} break;
        case 'subbass': if(s16%8===0){synths.subbass.triggerAttackRelease(chord[0].replace(/\d/,'1'),"4n",time,e*0.6);flashIcon('subbass')} break;
        case 'synbass': if(s16%8===0){synths.synbass.triggerAttackRelease(chord[0].replace(/\d/,'2'),"4n",time,e*0.5);flashIcon('synbass')} break;
        case 'lead': if(Math.random()<e*0.6&&(s16%4===0||(s16%4===2&&Math.random()<0.35))){const n=chord[Math.floor(Math.random()*3)].replace(/[23]/,Math.random()>0.5?'5':'4');synths.lead.triggerAttackRelease(n,"8n",time,e*0.25);flashIcon('lead')} break;
        case 'pluck': if(s16%8===0){synths.pluck.triggerAttackRelease(chord[Math.floor(Math.random()*3)].replace(/[23]/,'4'),time);flashIcon('pluck')} break;
        case 'bell': if(Math.random()<e*0.12&&s16%8===0){synths.bell.triggerAttackRelease("16n",time,e*0.08);flashIcon('bell')} break;
        case 'arp': if(s16%2===0){const ns=[...chord.map(n=>n.replace(/[23]/,'4')),...chord.map(n=>n.replace(/[23]/,'5'))];synths.arp.triggerAttackRelease(ns[arpS%ns.length],"16n",time,e*0.2);flashIcon('arp')} break;
    }
}

function setAPIStatus(s) {
    apiStatus=s;
    const el=document.getElementById('api-status');
    const lb=document.getElementById('api-label');
    el.className='api-status '+s;
    lb.textContent=s==='connected'?'AI On':s==='checking'?'Testing…':s==='offline'?'Fallback':'AI Off';
}

async function testAPI() {
    if(!GEMINI_KEY){setAPIStatus('offline');return}
    setAPIStatus('checking');
    try{
        const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+GEMINI_KEY,{
            method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({contents:[{parts:[{text:'Reply with just the word OK'}]}]})
        });
        const d=await r.json();
        if(d.candidates?.[0]) setAPIStatus('connected');
        else setAPIStatus('offline');
    }catch(e){setAPIStatus('offline')}
}

async function interpret(input) {
    if(!input?.trim())return;
    log('Thinking: "'+input+'"');

    if(apiStatus!=='connected'){localFallback(input);return}
    setAPIStatus('checking');

    const instList=Object.entries(INSTRUMENTS).map(([k,v])=>k+'('+v.name+')').join(', ');
    const activeList=Object.entries(engine.inst).filter(([k,v])=>v.active).map(([k])=>k).join(',');
    const prompt=`You control "Conductive", a live music engine. Instruments: ${instList}.
Current: tempo=${engine.tempo}, energy=${engine.energy}, key=${engine.key} ${engine.mode}, filterCutoff=${engine.filterCutoff}, active=[${activeList}]
Available keys: C,D,E,F,G,A,B. Modes: minor, major.
Command: "${input}"
Return ONLY valid JSON. No markdown. Include only changed fields:
{"tempo":number(40-200),"energy":number(0-1),"key":"letter","mode":"minor|major","filterCutoff":number(100-8000),"instruments":{"kick":bool,...}}
Be bold. Interpret poetic language musically.`;

    try{
        const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+GEMINI_KEY,{
            method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
        });
        const d=await r.json();
        if(!d.candidates?.[0]?.content?.parts?.[0]?.text){setAPIStatus('offline');localFallback(input);return}
        const raw=d.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim();
        applyAI(JSON.parse(raw));
        setAPIStatus('connected');
    }catch(e){console.error(e);setAPIStatus('offline');localFallback(input)}
}

function applyAI(j) {
    if(j.tempo)engine.tempo=Math.max(40,Math.min(200,j.tempo));
    if(j.energy!==undefined)engine.energy=Math.max(0,Math.min(1,j.energy));
    if(j.filterCutoff)engine.filterCutoff=Math.max(100,Math.min(8000,j.filterCutoff));
    if(j.key&&KEYS[j.key])engine.key=j.key;
    if(j.mode==='major'||j.mode==='minor')engine.mode=j.mode;
    if(j.instruments)Object.entries(j.instruments).forEach(([k,v])=>{if(engine.inst[k])engine.inst[k].active=!!v});
    if(KEYS[engine.key]?.[engine.mode])engine.chords=KEYS[engine.key][engine.mode];
    if(booted){Tone.Transport.bpm.rampTo(engine.tempo,2);effects.filter.frequency.rampTo(engine.filterCutoff,1)}
    buildStage();updateUI();
    const names=Object.entries(engine.inst).filter(([k,v])=>v.active).map(([k])=>INSTRUMENTS[k].name);
    log('AI → '+engine.tempo+'bpm '+engine.key+(engine.mode==='minor'?'m':'')+' | '+names.join(', '));
}

function localFallback(cmd) {
    const t=(typeof cmd==='string'?cmd:'').toLowerCase();
    if(t.match(/chill|calm|slow|soft/)){engine.tempo=78;engine.energy=0.25}
    else if(t.match(/hype|dance|party|fast|drop/)){engine.tempo=130;engine.energy=0.9;engine.inst.clap.active=true;engine.inst.arp.active=true}
    else if(t.match(/dark|heavy|intense/)){engine.tempo=95;engine.energy=0.75;engine.mode='minor';engine.inst.subbass.active=true}
    else if(t.match(/cinematic|epic|film/)){engine.tempo=85;engine.energy=0.6;engine.inst.strings.active=true;engine.inst.pad.active=true;engine.inst.subbass.active=true}
    else if(t.match(/ambient|space|dream/)){engine.tempo=70;engine.energy=0.3;engine.inst.pad.active=true;engine.inst.texture.active=true;engine.inst.bell.active=true}
    if(KEYS[engine.key]?.[engine.mode])engine.chords=KEYS[engine.key][engine.mode];
    if(booted)Tone.Transport.bpm.rampTo(engine.tempo,2);
    buildStage();updateUI();
    log('Fallback → '+engine.tempo+'bpm');
}

// VISUALS
// ═══════════════════════════════════════════
const mc=document.getElementById('main'),mx=mc.getContext('2d');
const wc=document.getElementById('waveform'),wx=wc.getContext('2d');
const particles=[];
class Particle{constructor(x,y,c){this.x=x;this.y=y;this.c=c||'0,229,255';this.vx=(Math.random()-0.5)*3;this.vy=(Math.random()-0.5)*3;this.life=1;this.decay=0.009+Math.random()*0.014;this.size=1+Math.random()*2.5}update(){this.x+=this.vx;this.y+=this.vy;this.vy-=0.01;this.life-=this.decay}}

function renderLoop(){
    const W=mc.width=window.innerWidth, H=mc.height=window.innerHeight;
    const t=performance.now()*0.001, e=engine.energy, now=performance.now();
    mx.clearRect(0,0,W,H);

    // BG
    const g=mx.createRadialGradient(W/2,H*0.35,0,W/2,H*0.35,W*0.5);
    g.addColorStop(0,'rgba(0,'+(25+e*45|0)+','+(40+e*60|0)+','+(0.03+e*0.04)+')');
    g.addColorStop(1,'transparent');
    mx.fillStyle=g;mx.fillRect(0,0,W,H);

    // Pulse
    const cx=W/2,cy=H*0.32,baseR=40+e*80;
    mx.beginPath();
    for(let a=0;a<Math.PI*2;a+=0.05){
        const n=Math.sin(a*6+t*3)*10*e+Math.sin(a*3-t*2)*5*e;
        const r=baseR+n;
        a===0?mx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r):mx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    }
    mx.closePath();mx.strokeStyle='rgba(0,229,255,'+(0.06+e*0.18)+')';mx.lineWidth=1.5;
    mx.shadowBlur=18*e;mx.shadowColor='#00e5ff';mx.stroke();mx.shadowBlur=0;

    // Trail
    if(trail.length>1){
        mx.beginPath();let st=false;
        trail.forEach(p=>{const age=(now-p.t)/2500;if(age>1)return;if(!st){mx.moveTo(p.x,p.y);st=true}else mx.lineTo(p.x,p.y)});
        mx.strokeStyle='rgba(0,229,255,0.4)';mx.lineWidth=2.5;mx.shadowBlur=8;mx.shadowColor='#00e5ff';mx.stroke();mx.shadowBlur=0;
        trail.forEach(p=>{const age=(now-p.t)/2500;if(age>1)return;mx.beginPath();mx.arc(p.x,p.y,(1-age)*3.5,0,Math.PI*2);mx.fillStyle='rgba(0,229,255,'+(1-age)*0.4+')';mx.fill()});
        const last=trail[trail.length-1];
        if(now-last.t<400){mx.beginPath();mx.arc(last.x,last.y,8,0,Math.PI*2);mx.fillStyle='rgba(0,229,255,0.1)';mx.fill();mx.beginPath();mx.arc(last.x,last.y,3,0,Math.PI*2);mx.fillStyle='rgba(255,255,255,0.6)';mx.fill()}
    }
    while(trail.length&&now-trail[0].t>2500)trail.shift();

    // Particles
    if(Math.random()<e*0.2){const a=Math.random()*Math.PI*2;particles.push(new Particle(cx+Math.cos(a)*baseR,cy+Math.sin(a)*baseR))}
    if(conducting&&trail.length){const lp=trail[trail.length-1];particles.push(new Particle(lp.x,lp.y,'57,255,20'))}
    for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.update();if(p.life<=0){particles.splice(i,1);continue}mx.beginPath();mx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);mx.fillStyle='rgba('+p.c+','+p.life*0.3+')';mx.fill()}
    if(particles.length>160)particles.splice(0,particles.length-160);

    // Waveform
    if(analyser){wc.width=W;wc.height=36;const wv=analyser.getValue();wx.clearRect(0,0,W,36);wx.beginPath();wx.moveTo(0,18);for(let i=0;i<wv.length;i++)wx.lineTo((i/wv.length)*W,18+wv[i]*28);wx.strokeStyle='rgba(0,229,255,0.18)';wx.lineWidth=1;wx.stroke()}
    requestAnimationFrame(renderLoop);
}

function updateUI(){
    document.getElementById('bpm-val').textContent=Math.round(engine.tempo);
    document.getElementById('energy-val').textContent=Math.round(engine.energy*100);
    document.getElementById('key-val').textContent=engine.key+(engine.mode==='minor'?'m':'');
    document.getElementById('energy-val').style.color=engine.energy>0.75?'var(--green)':engine.energy<0.25?'var(--amber)':'var(--cyan)';
}
function log(m){document.getElementById('log').textContent='> '+m}

buildStage();
</script>
