<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Conductive Prototype</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body {
  margin:0;
  background:#000;
  color:#0ff;
  font-family:sans-serif;
  overflow:hidden;
}
video, canvas {
  position:absolute;
  top:0; left:0;
  width:100%;
  height:100%;
  object-fit:cover;
}
#ui {
  position:fixed;
  bottom:10px;
  left:10px;
  z-index:10;
}
button {
  padding:10px;
  margin:4px;
  font-size:14px;
}
#status {
  margin-top:6px;
  font-size:12px;
  white-space:pre-line;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="ui">
  <button onclick="startAudio()">Start Audio</button>
  <button onclick="startVoice()">Voice</button>
  <button onclick="startPitch()">Humming</button>
  <div id="status">Ready</div>
</div>

<script>
// ---------------- STATE ----------------
let tempo = 90;
let volume = 0.5;

let drumDensity = 0.7;
let drumActive = true;
let fluteActive = true;

// ---------------- AUDIO ----------------
let flute, drum, loop;

async function startAudio() {
  await Tone.start();

  flute = new Tone.Synth().toDestination();
  drum = new Tone.MembraneSynth().toDestination();

  loop = new Tone.Loop(time => {
    if (fluteActive) {
      flute.volume.value = (volume * 20) - 20;
      flute.triggerAttackRelease("C5", "16n", time);
    }

    if (drumActive && Math.random() < drumDensity) {
      drum.triggerAttackRelease("C2", "8n", time);
    }
  }, "16n").start(0);

  Tone.Transport.bpm.value = tempo;
  Tone.Transport.start();

  status("Audio started");
}

// ---------------- GESTURE ----------------
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastY=null,lastTime=null;

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands:1,
  minDetectionConfidence:0.7,
  minTrackingConfidence:0.7
});

hands.onResults(results=>{
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(results.multiHandLandmarks.length>0){
    const y = results.multiHandLandmarks[0][0].y;
    const now = Date.now();

    if(lastY!==null){
      const speed = Math.abs(y-lastY)/(now-lastTime);

      tempo = Math.max(60, Math.min(180, speed*2000));
      volume = Math.min(1, speed*5);

      Tone.Transport.bpm.value = tempo;

      status(`Tempo: ${tempo.toFixed(0)}\nVolume: ${volume.toFixed(2)}`);
    }

    lastY=y;
    lastTime=now;
  }
});

const camera = new Camera(video,{
  onFrame: async()=>{ await hands.send({image:video}); },
  width:640,
  height:480
});
camera.start();

// ---------------- LOCAL INTERPRETER ----------------
function interpretLocal(text){
  text = text.toLowerCase();

  let cmd = { tempo_change:0, intensity:null, sections:[] };

  if(text.includes("faster")) cmd.tempo_change+=10;
  if(text.includes("slower")) cmd.tempo_change-=10;

  if(text.includes("soft")) cmd.intensity=0.3;
  if(text.includes("intense")) cmd.intensity=0.9;

  ["drums","flute"].forEach(inst=>{
    if(text.includes(inst)){
      let action="modify";
      if(text.includes("add")) action="add";
      if(text.includes("remove")||text.includes("drop")) action="remove";

      let density=0;
      if(text.includes("more")) density=0.3;
      if(text.includes("less")||text.includes("thin")) density=-0.3;

      cmd.sections.push({name:inst,action,density_change:density});
    }
  });

  return cmd;
}

// ---------------- APPLY COMMAND ----------------
function applyCommand(cmd){
  tempo += cmd.tempo_change||0;
  tempo = Math.max(60, Math.min(180, tempo));
  Tone.Transport.bpm.value = tempo;

  if(cmd.intensity!==null) volume = cmd.intensity;

  cmd.sections.forEach(sec=>{
    if(sec.name==="drums"){
      if(sec.action==="add") drumActive=true;
      if(sec.action==="remove") drumActive=false;
      drumDensity = Math.max(0, Math.min(1, drumDensity + sec.density_change));
    }

    if(sec.name==="flute"){
      if(sec.action==="add") fluteActive=true;
      if(sec.action==="remove") fluteActive=false;
    }
  });
}

// ---------------- LLM (API READY) ----------------
async function interpretLLM(text){
  // fallback for now
  return interpretLocal(text);
}

// ---------------- VOICE ----------------
let recognition;

function startVoice(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous=true;

  recognition.onresult = async (e)=>{
    const text = e.results[e.results.length-1][0].transcript;

    status("Heard: "+text);

    const cmd = await interpretLLM(text);
    applyCommand(cmd);
  };

  recognition.start();
  status("Voice active");
}

// ---------------- HUMMING ----------------
let audioCtx, analyser, dataArray;

async function startPitch(){
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});

  const mic = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize=2048;

  mic.connect(analyser);
  dataArray = new Float32Array(analyser.fftSize);

  detectPitch();
}

function autoCorrelate(buf,sampleRate){
  let SIZE=buf.length;
  let rms=0;
  for(let i=0;i<SIZE;i++){rms+=buf[i]*buf[i];}
  rms=Math.sqrt(rms/SIZE);
  if(rms<0.01) return -1;

  let best=0;
  let bestVal=0;

  for(let i=20;i<1000;i++){
    let sum=0;
    for(let j=0;j<SIZE-i;j++){
      sum+=buf[j]*buf[j+i];
    }
    if(sum>bestVal){bestVal=sum;best=i;}
  }

  return sampleRate/best;
}

function freqToNote(f){
  const A4=440;
  const notes=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  let n = Math.round(12*Math.log2(f/A4))+57;
  return notes[n%12]+Math.floor(n/12);
}

function detectPitch(){
  analyser.getFloatTimeDomainData(dataArray);
  let freq = autoCorrelate(dataArray, audioCtx.sampleRate);

  if(freq!==-1 && fluteActive){
    let note = freqToNote(freq);
    flute.triggerAttackRelease(note,"8n");
    status("🎤 "+note+"\nTempo:"+tempo);
  }

  requestAnimationFrame(detectPitch);
}

// ---------------- UTIL ----------------
function status(txt){
  document.getElementById("status").innerText = txt;
}
</script>

</body>
</html>
