<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Conductive v10</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--c:#00e5ff;--g:#39ff14;--m:#ff2daa;--a:#ffb300;--bg:#020409;--p:rgba(4,8,20,0.92);--b:rgba(0,229,255,0.1)}
body{background:var(--bg);color:#c0dce6;font-family:'Outfit',sans-serif;overflow:hidden;height:100dvh;width:100vw;touch-action:none}
canvas#viz{position:fixed;inset:0;width:100%;height:100%;z-index:1}
.ui{position:fixed;inset:0;z-index:10;display:grid;grid-template-rows:auto minmax(60px,1fr) auto auto auto auto;pointer-events:none}
.ui>*{pointer-events:auto}
.m{font-family:'JetBrains Mono',monospace}
/* TOP */
.top{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;gap:6px}
.brand{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:rgba(0,229,255,0.3)}.brand b{color:var(--c)}
.top-mid{display:flex;gap:5px;align-items:center}
.tb{display:inline-flex;align-items:center;justify-content:center;background:0;border:1px solid var(--b);color:var(--c);padding:5px 9px;border-radius:5px;font-size:9px;cursor:pointer;transition:all 0.12s;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.tb:hover{border-color:var(--c);background:rgba(0,229,255,0.03)}
.tb.on{border-color:var(--g);color:var(--g)}.tb.pau{border-color:var(--a);color:var(--a)}
.tb.rec{border-color:var(--m);color:var(--m);animation:pu 1s infinite}
@keyframes pu{50%{box-shadow:0 0 12px rgba(255,45,170,0.25)}}
.top-r{display:flex;align-items:center;gap:10px}
.stat .l{font-size:6px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(0,229,255,0.18)}.stat .v{font-weight:900;font-size:17px;color:var(--c);line-height:1}
.stats{display:flex;gap:12px;text-align:right}
.api-a{position:relative}
.api-p{display:flex;align-items:center;gap:4px;font-size:7px;letter-spacing:1px;text-transform:uppercase;padding:4px 7px;border:1px solid var(--b);border-radius:5px;cursor:pointer}
.api-d{width:6px;height:6px;border-radius:50%;background:#333;transition:0.3s}
.api-p.ok .api-d{background:var(--g);box-shadow:0 0 6px rgba(57,255,20,0.5)}.api-p.ok{color:var(--g);border-color:rgba(57,255,20,0.12)}
.api-p.off .api-d{background:var(--a)}.api-p.off{color:var(--a)}
.api-p.chk .api-d{background:var(--c);animation:bl 1s infinite}
@keyframes bl{50%{opacity:0.3}}
.api-dd{position:absolute;top:100%;right:0;margin-top:4px;background:var(--p);border:1px solid var(--b);border-radius:7px;padding:8px;width:270px;display:none;backdrop-filter:blur(14px);z-index:20}
.api-dd.open{display:block}
.api-dd label{font-size:6px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,229,255,0.18);display:block;margin-bottom:3px}
.api-dd .n{font-size:6px;color:rgba(0,229,255,0.1);margin-top:4px;line-height:1.3}
.api-dd .e{font-size:6px;color:var(--a);margin-top:3px;word-break:break-all}
.api-r{display:flex;gap:3px}
.api-r input{flex:1;background:rgba(0,0,0,0.5);border:1px solid var(--b);color:var(--c);padding:5px 7px;border-radius:4px;font-size:9px;outline:none}
.api-r button{background:0;border:1px solid var(--b);color:var(--c);padding:5px 8px;border-radius:4px;font-size:8px;cursor:pointer}
/* CONDUCT */
.czone{cursor:crosshair;min-height:60px}
.chint{position:fixed;top:22%;left:50%;transform:translate(-50%,-50%);font-size:8px;color:rgba(0,229,255,0.06);letter-spacing:2px;text-transform:uppercase;pointer-events:none;z-index:11;transition:opacity 0.5s}
/* CMD BAR */
.cmd{display:flex;gap:4px;padding:3px 12px;align-items:center;pointer-events:none}.cmd>*{pointer-events:auto}
.cmd input{flex:1;background:rgba(0,0,0,0.35);border:1px solid var(--b);color:var(--c);padding:6px 8px;border-radius:6px;font-size:9px;outline:none;min-width:0}
.cmd input:focus{border-color:var(--c)}.cmd input::placeholder{color:rgba(0,229,255,0.08)}
.cmd .tb{width:32px;height:32px;padding:0;flex-shrink:0;font-size:12px}
#log{font-size:6px;color:rgba(0,229,255,0.15);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;flex-shrink:1}
/* STAGE */
.stw{padding:0 4px}
.stage{position:relative;height:320px;overflow:visible}
canvas#sbg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.cpos{position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);font-size:5px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,229,255,0.06)}
.ic{position:absolute;width:46px;height:46px;transform:translate(-50%,-50%);cursor:grab;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;border:1.5px solid rgba(0,229,255,0.1);background:rgba(4,8,20,0.92);transition:border-color 0.1s,box-shadow 0.1s;user-select:none;z-index:2}
.ic.off{opacity:0.2;border-style:dashed}.ic.on{border-color:rgba(0,229,255,0.25)}
.ic.sel{border-color:var(--c);box-shadow:0 0 12px rgba(0,229,255,0.15);z-index:3}
.ic .s{font-size:14px;line-height:1}.ic .l{font-size:5px;letter-spacing:1px;text-transform:uppercase;color:rgba(0,229,255,0.25);margin-top:1px}
.ic .rn{position:absolute;inset:-4px;border-radius:50%;border:2px solid transparent;transition:border-color 0.05s}
.ic.fire .rn{border-color:var(--g);box-shadow:0 0 6px rgba(57,255,20,0.2)}
.ic.drag{cursor:grabbing;z-index:5;border-color:var(--c)}
/* CHORD PROG */
.pb{padding:1px 4px}
.pbox{background:var(--p);border:1px solid var(--b);border-radius:6px;padding:4px 6px;display:flex;align-items:center;gap:5px}
.psw{width:24px;height:12px;border-radius:6px;background:rgba(0,229,255,0.05);border:1px solid var(--b);position:relative;cursor:pointer;flex-shrink:0;transition:0.2s}
.psw::after{content:'';position:absolute;top:1px;left:1px;width:8px;height:8px;border-radius:50%;background:rgba(0,229,255,0.2);transition:0.2s}
.psw.on{background:rgba(57,255,20,0.06);border-color:rgba(57,255,20,0.12)}.psw.on::after{left:13px;background:var(--g)}
.psl{font-size:6px;letter-spacing:1px;text-transform:uppercase;color:rgba(0,229,255,0.15);flex-shrink:0}
.pcs{display:flex;gap:2px;flex:1}.pc{flex:1;text-align:center;padding:4px 2px;border-radius:3px;border:1px solid rgba(0,229,255,0.03);font-size:9px;font-weight:700;color:rgba(0,229,255,0.2);cursor:pointer;transition:0.1s;position:relative}
.pc:hover{border-color:rgba(0,229,255,0.1);color:rgba(0,229,255,0.35)}
.pc.act{border-color:rgba(0,229,255,0.2);color:var(--c);background:rgba(0,229,255,0.04)}
.pc.dim{opacity:0.25}
.pci{position:absolute;top:1px;left:2px;font-size:4px;color:rgba(0,229,255,0.08);font-weight:400}
.ced{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);margin-bottom:3px;background:var(--p);border:1px solid var(--b);border-radius:5px;padding:3px;display:none;z-index:20;backdrop-filter:blur(10px);min-width:65px}
.ced.open{display:flex;flex-wrap:wrap;gap:2px}
.co{padding:2px 5px;border-radius:2px;font-size:7px;color:rgba(0,229,255,0.3);cursor:pointer;transition:0.1s}
.co:hover{background:rgba(0,229,255,0.05);color:var(--c)}.co.cur{color:var(--c);background:rgba(0,229,255,0.06)}
/* PATTERN */
.pw{padding:0 4px;max-height:0;transition:max-height 0.3s,opacity 0.3s;opacity:0;overflow:hidden}
.pw.open{max-height:200px;opacity:1}
.ppx{background:var(--p);border:1px solid var(--b);border-radius:7px;padding:5px 7px;margin-top:2px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:3px}
.pt{font-size:7px;letter-spacing:1.5px;text-transform:uppercase;color:var(--c)}
.pa{display:flex;gap:3px}
.pa button{background:0;border:1px solid var(--b);color:rgba(0,229,255,0.2);padding:2px 6px;border-radius:3px;font-size:6px;cursor:pointer;transition:0.12s}
.pa button:hover{border-color:var(--c);color:var(--c)}
.vc{display:flex;align-items:center;gap:3px;margin-left:auto;margin-right:6px}
.vc label{font-size:5px;color:rgba(0,229,255,0.15);letter-spacing:1px;text-transform:uppercase}
.vc input[type=range]{-webkit-appearance:none;width:50px;height:3px;background:rgba(0,229,255,0.08);border-radius:2px;outline:none}
.vc input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--c);cursor:pointer}
.sg{display:flex;gap:1px;user-select:none}
.sc{flex:1;min-width:0;border-radius:2px;border:1px solid rgba(0,229,255,0.03);background:rgba(0,229,255,0.006);position:relative}
.sc:nth-child(4n+1){border-left-color:rgba(0,229,255,0.08)}
.sc.ph::after{content:'';position:absolute;inset:0;border:1px solid var(--g);border-radius:2px;pointer-events:none}
.sg.rh .sc{height:32px;cursor:pointer}.sg.rh .sc.on{background:rgba(0,229,255,0.14);border-color:rgba(0,229,255,0.15)}
.sg.mel .sc{display:flex;flex-direction:column;gap:1px;padding:1px}
.nr{height:14px;border-radius:2px;background:rgba(0,229,255,0.01);cursor:pointer;transition:background 0.05s;position:relative}
.nr:active{background:rgba(0,229,255,0.06)}.nr.on{background:rgba(0,229,255,0.18)}
.nrl{position:absolute;left:1px;top:50%;transform:translateY(-50%);font-size:5px;color:rgba(0,229,255,0.1);pointer-events:none}.nr.on .nrl{color:rgba(0,229,255,0.35)}
@media(max-width:700px){.ic{width:38px;height:38px}.ic .s{font-size:12px}.stage{height:260px}.stat .v{font-size:14px}}
</style>
</head>
<body>
<canvas id="viz"></canvas>
<div class="chint" id="chint">Touch above stage to conduct</div>
<div class="ui">
  <div class="top">
    <div class="brand m"><b>Conductive</b> v10</div>
    <div class="top-mid">
      <button class="tb m" id="startB">▶ Start</button>
      <button class="tb m" id="pauseB" style="display:none">⏸</button>
      <button class="tb m" id="voiceB">🎤 Speak</button>
    </div>
    <div class="top-r">
      <div class="api-a"><div class="api-p m" id="apiP" onclick="toggleAPIDrop()"><div class="api-d"></div><span id="apiL">No Key</span></div>
        <div class="api-dd m" id="apiDD"><label>Gemini API Key</label><div class="api-r"><input type="password" id="apiK" placeholder="Paste key"><button onclick="connectAPI()">Go</button></div><div class="n">Memory only. Never in source. Free: ai.google.dev</div><div class="e" id="apiE"></div></div>
      </div>
      <div class="stats"><div class="stat"><div class="l m">BPM</div><div class="v" id="vB">110</div></div><div class="stat"><div class="l m">Energy</div><div class="v" id="vE">50</div></div><div class="stat"><div class="l m">Key</div><div class="v" id="vK" style="font-size:12px">Cm</div></div></div>
    </div>
  </div>
  <div class="czone" id="cz"></div>
  <div class="cmd"><input type="text" id="cmdIn" class="m" placeholder="describe what you want to hear…"><button class="tb m" id="cmdGo">→</button><div id="log" class="m">Tap Start</div></div>
  <div class="stw"><div class="stage" id="stage"><canvas id="sbg"></canvas><div class="cpos m">▲ you</div></div></div>
  <div class="pb"><div class="pbox"><div class="psw on" id="psw" onclick="toggleProg()"></div><div class="psl m">Prog</div><div class="pcs m" id="pcs"></div></div></div>
  <div class="pw" id="pw"><div class="ppx"><div class="ph"><div class="pt m" id="ptitle">—</div><div class="vc m"><label>Vol</label><input type="range" min="0" max="100" value="100" id="volS" oninput="setVol(this.value)"></div><div class="pa m"><button onclick="clearP()">Clear</button><button onclick="randP()">Random</button><button onclick="cloneI()">Clone</button><button onclick="desel()">✕</button></div></div><div class="sg" id="sg"></div></div></div>
</div>
<script>
const ST=16,TIERS=4,TV=[1,0.8,0.6,0.45];
let gKey='',apiSt='',autoProg=true,booted=false,cStep=0,selI=null,cloneN=0;
const GM=['gemini-2.5-flash','gemini-2.0-flash'];let gMi=0;
function gURL(){return'https://generativelanguage.googleapis.com/v1beta/models/'+GM[gMi]+':generateContent?key='+gKey}

// ═══ SYNTH FACTORIES ═══
// MetalSynth: resonance = HIGHPASS filter freq. Keep low so sound passes through.
// Route MetalSynth to 'comp' (bypasses lowpass filter in effects chain)
const SF={
    kick:()=>new Tone.MembraneSynth({pitchDecay:0.05,octaves:5,volume:-2,envelope:{attack:0.001,decay:0.3,sustain:0,release:0.2}}),
    snare:()=>new Tone.NoiseSynth({volume:-6,noise:{type:'white'},envelope:{attack:0.001,decay:0.15,sustain:0}}),
    hihat:()=>new Tone.MetalSynth({volume:-4,frequency:200,envelope:{attack:0.001,decay:0.08,release:0.01},harmonicity:5.1,modulationIndex:32,resonance:300,octaves:1.5}),
    clap:()=>new Tone.NoiseSynth({volume:-6,noise:{type:'pink'},envelope:{attack:0.005,decay:0.2,sustain:0}}),
    perc:()=>new Tone.MetalSynth({volume:-4,frequency:400,envelope:{attack:0.001,decay:0.12,release:0.02},harmonicity:4,modulationIndex:20,resonance:200,octaves:1.5}),
    subbass:()=>new Tone.MonoSynth({oscillator:{type:"sine"},volume:-2,envelope:{attack:0.01,decay:0.4,sustain:0.7,release:0.3},filterEnvelope:{attack:0.01,decay:0.1,sustain:0,release:0.3,baseFrequency:40,octaves:2}}),
    synbass:()=>new Tone.MonoSynth({oscillator:{type:"sawtooth"},volume:-6,envelope:{attack:0.01,decay:0.2,sustain:0.4,release:0.3},filterEnvelope:{attack:0.01,decay:0.15,sustain:0,release:0.4,baseFrequency:100,octaves:3}}),
    lead:()=>new Tone.MonoSynth({oscillator:{type:"sine"},volume:-6,envelope:{attack:0.06,decay:0.3,sustain:0.4,release:0.6},filterEnvelope:{attack:0.05,decay:0.3,sustain:0.1,release:0.6,baseFrequency:400,octaves:5}}),
    pluck:()=>new Tone.PluckSynth({volume:-4,resonance:0.9,release:1.2}),
    bell:()=>new Tone.MetalSynth({volume:-4,frequency:300,envelope:{attack:0.001,decay:1.2,release:0.5},harmonicity:8,modulationIndex:14,resonance:150,octaves:2}),
    arp:()=>new Tone.MonoSynth({oscillator:{type:"square"},volume:-6,envelope:{attack:0.01,decay:0.15,sustain:0.2,release:0.3},filterEnvelope:{attack:0.01,decay:0.15,sustain:0.1,release:0.3,baseFrequency:800,octaves:4}}),
    pad:()=>new Tone.PolySynth(Tone.Synth,{oscillator:{type:"fatsawtooth",count:3,spread:40},volume:-10,envelope:{attack:2.5,decay:1,sustain:0.8,release:3}}),
    strings:()=>new Tone.PolySynth(Tone.Synth,{oscillator:{type:"fatsawtooth",count:5,spread:20},volume:-10,envelope:{attack:1.5,decay:0.5,sustain:0.9,release:2.5}}),
    choir:()=>new Tone.PolySynth(Tone.Synth,{oscillator:{type:"sine"},volume:-8,envelope:{attack:1.5,decay:0.8,sustain:0.8,release:2.5}}),
    texture:()=>new Tone.Synth({oscillator:{type:"fatsawtooth",count:2,spread:50},volume:-18,envelope:{attack:4,decay:3,sustain:0.4,release:5}}),
};
// MetalSynth → comp (bypass lowpass). Texture → texBus (custom with AutoFilter)
const SBUS={kick:'comp',snare:'filt',hihat:'comp',clap:'filt',perc:'comp',subbass:'comp',synbass:'comp',lead:'del',pluck:'del',bell:'comp',arp:'del',pad:'wide',strings:'cho',choir:'wide',texture:'texBus'};

// Trigger helpers
function trigR(s,d,t,v){try{s.triggerAttackRelease(d,t,v)}catch(e){}}
function trigM(s,d,t,v){try{s.triggerAttack(t,v);s.triggerRelease(t+Tone.Time(d).toSeconds())}catch(e){console.warn('tM',e)}}
function trigN(s,n,d,t,v){try{s.triggerAttackRelease(n,d,t,v)}catch(e){}}
function trigPl(s,n,d,t){try{s.triggerAttackRelease(n,d,t)}catch(e){}}
function trigPo(s,n,d,t,v){try{s.triggerAttackRelease(n,d,t,v)}catch(e){}}

const INS={
    kick:{c:'rhythm',n:'Kick',s:'◉',a:-55,t:0,b:'kick'},snare:{c:'rhythm',n:'Snare',s:'◎',a:-25,t:0,b:'snare'},
    hihat:{c:'rhythm',n:'HiHat',s:'✧',a:5,t:0,b:'hihat'},clap:{c:'rhythm',n:'Clap',s:'✦',a:30,t:0,b:'clap'},
    perc:{c:'rhythm',n:'Perc',s:'◇',a:55,t:1,b:'perc'},subbass:{c:'bass',n:'Sub',s:'≋',a:-15,t:1,b:'subbass'},
    synbass:{c:'bass',n:'Bass',s:'≈',a:15,t:1,b:'synbass'},lead:{c:'melodic',n:'Lead',s:'♪',a:-40,t:2,b:'lead'},
    pluck:{c:'melodic',n:'Pluck',s:'⊕',a:-5,t:2,b:'pluck'},bell:{c:'melodic',n:'Bell',s:'♦',a:30,t:2,b:'bell'},
    arp:{c:'melodic',n:'Arp',s:'↯',a:55,t:2,b:'arp'},pad:{c:'atmo',n:'Pad',s:'◐',a:-55,t:3,b:'pad'},
    strings:{c:'atmo',n:'Strings',s:'∿',a:-20,t:3,b:'strings'},choir:{c:'atmo',n:'Choir',s:'❂',a:20,t:3,b:'choir'},
    texture:{c:'atmo',n:'Texture',s:'░',a:55,t:3,b:'texture'},
};

const E={tempo:110,energy:0.5,ci:0,key:'C',mode:'minor',chords:[["C3","Eb3","G3"],["Ab2","C3","Eb3"],["Bb2","D3","F3"],["G2","B2","D3"]],fc:2500,inst:{}};
Object.entries(INS).forEach(([id,d])=>{E.inst[id]={on:['kick','snare','hihat','synbass','lead'].includes(id),a:d.a,t:d.t,pan:Math.sin(d.a*Math.PI/180),vol:TV[d.t],uv:1.0,pat:Array.from({length:ST},()=>[]),up:false}});

const KEYS={
'C':{minor:[["C3","Eb3","G3"],["Ab2","C3","Eb3"],["Bb2","D3","F3"],["G2","B2","D3"]],major:[["C3","E3","G3"],["F2","A2","C3"],["G2","B2","D3"],["A2","C3","E3"]]},
'D':{minor:[["D3","F3","A3"],["Bb2","D3","F3"],["C3","E3","G3"],["A2","C#3","E3"]],major:[["D3","F#3","A3"],["G2","B2","D3"],["A2","C#3","E3"],["B2","D3","F#3"]]},
'E':{minor:[["E3","G3","B3"],["C3","E3","G3"],["D3","F#3","A3"],["B2","D#3","F#3"]],major:[["E3","G#3","B3"],["A2","C#3","E3"],["B2","D#3","F#3"],["C#3","E3","G#3"]]},
'F':{minor:[["F3","Ab3","C4"],["Db3","F3","Ab3"],["Eb3","G3","Bb3"],["C3","E3","G3"]],major:[["F3","A3","C4"],["Bb2","D3","F3"],["C3","E3","G3"],["D3","F3","A3"]]},
'G':{minor:[["G3","Bb3","D4"],["Eb3","G3","Bb3"],["F3","A3","C4"],["D3","F#3","A3"]],major:[["G3","B3","D4"],["C3","E3","G3"],["D3","F#3","A3"],["E3","G3","B3"]]},
'A':{minor:[["A3","C4","E4"],["F3","A3","C4"],["G3","B3","D4"],["E3","G#3","B3"]],major:[["A3","C#4","E4"],["D3","F#3","A3"],["E3","G#3","B3"],["F#3","A3","C#4"]]},
'B':{minor:[["B3","D4","F#4"],["G3","B3","D4"],["A3","C#4","E4"],["F#3","A#3","C#4"]],major:[["B3","D#4","F#4"],["E3","G#3","B3"],["F#3","A#3","C#4"],["G#3","B3","D#4"]]},
};

let sy={},pn={},gn={},fx={},an=null;

// ═══ API ═══
function toggleAPIDrop(){document.getElementById('apiDD').classList.toggle('open')}
document.addEventListener('click',e=>{if(!document.querySelector('.api-a').contains(e.target))document.getElementById('apiDD').classList.remove('open')});
function setAP(s,err){apiSt=s;const el=document.getElementById('apiP'),lb=document.getElementById('apiL');el.className='api-p m '+{ok:'ok',chk:'chk',off:'off','':''}[s]||'';lb.textContent={ok:'AI On',chk:'…',off:'Fallback','':'No Key'}[s]||'No Key';document.getElementById('apiE').textContent=err||''}

function getScale(k,m){const s=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'],f=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];const iv=m==='minor'?[0,2,3,5,7,8,10]:[0,2,4,5,7,9,11];const ri=s.indexOf(k);if(ri<0)return s.slice(0,7);return iv.map(i=>(m==='minor'?f:s)[(ri+i)%12])}
function pNotes(id){const sc=getScale(E.key,E.mode),d=INS[id];let lo=4,hi=5;if(d.c==='bass'){lo=2;hi=3}else if(d.c==='atmo'){lo=3;hi=4}return[sc[4]+hi,sc[2]+hi,sc[0]+hi,sc[4]+lo,sc[2]+lo,sc[0]+lo]}

const stg=document.getElementById('stage'),sbg=document.getElementById('sbg'),sctx=sbg.getContext('2d');
function sG(){const r=stg.getBoundingClientRect();return{W:r.width,H:r.height,cx:r.width/2,cy:r.height+10,mr:40,xr:r.height-5,ts:(r.height-5-40)/(TIERS-1)}}
function tR(t,g){return g.mr+t*g.ts}
function a2xy(a,t){const g=sG(),r=tR(t,g),rd=a*Math.PI/180;return{x:g.cx+Math.sin(rd)*r,y:g.cy-Math.cos(rd)*r}}
function xy2at(x,y){const g=sG(),dx=x-g.cx,dy=g.cy-y;return{a:Math.max(-80,Math.min(80,Math.atan2(dx,dy)*180/Math.PI)),t:Math.round(Math.max(0,Math.min(TIERS-1,(Math.sqrt(dx*dx+dy*dy)-g.mr)/g.ts)))}}
function drawArcs(){const g=sG();sbg.width=g.W;sbg.height=g.H;const c=sctx;c.clearRect(0,0,g.W,g.H);for(let t=0;t<TIERS;t++){const r=tR(t,g);c.beginPath();c.arc(g.cx,g.cy,r,Math.PI+0.15,-0.15);c.strokeStyle='rgba(0,229,255,'+(0.02+(TIERS-1-t)*0.008)+')';c.lineWidth=1;c.stroke()}}
function buildStage(){stg.querySelectorAll('.ic').forEach(e=>e.remove());drawArcs();Object.entries(INS).forEach(([id,d])=>{const st=E.inst[id];if(!st)return;const p=a2xy(st.a,st.t),el=document.createElement('div');el.className='ic'+(st.on?' on':' off')+(selI===id?' sel':'');el.id='i-'+id;el.style.left=p.x+'px';el.style.top=p.y+'px';el.innerHTML=`<div class="rn"></div><div class="s">${d.s}</div><div class="l">${d.n}</div>`;let drag=false,sx=0,sy2=0;const oS=(cx,cy)=>{sx=cx;sy2=cy;drag=false;el.classList.add('drag')};const oM=(cx,cy)=>{if(Math.abs(cx-sx)+Math.abs(cy-sy2)>8)drag=true;if(!drag)return;const rect=stg.getBoundingClientRect(),at=xy2at(cx-rect.left,cy-rect.top);st.a=at.a;st.t=at.t;st.pan=Math.sin(at.a*Math.PI/180);st.vol=TV[at.t];if(pn[id])pn[id].pan.value=st.pan;if(gn[id])gn[id].gain.rampTo(st.vol*st.uv,0.1);const np=a2xy(st.a,st.t);el.style.left=np.x+'px';el.style.top=np.y+'px'};const oE=()=>{el.classList.remove('drag');if(!drag)tapI(id)};el.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();oS(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});el.addEventListener('touchmove',e=>{e.stopPropagation();e.preventDefault();oM(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});el.addEventListener('touchend',e=>{e.stopPropagation();oE()});el.addEventListener('mousedown',e=>{e.stopPropagation();oS(e.clientX,e.clientY);const mm=ev=>oM(ev.clientX,ev.clientY),mu=()=>{oE();window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu)};window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu)});stg.appendChild(el)})}

function chN(n){if(!n?.length)return'?';const r=n[0].replace(/\d/,''),s=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'],f=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];let ri=s.indexOf(r);if(ri<0)ri=f.indexOf(r);const sec=n[1]?.replace(/\d/,'');let si=s.indexOf(sec);if(si<0)si=f.indexOf(sec);if(ri<0||si<0)return r;return((si-ri+12)%12===3)?r+'m':r}

document.getElementById('startB').addEventListener('click',boot);
async function boot(){
    if(booted)return;try{await Tone.start()}catch(e){lg("Audio blocked.");return}
    booted=true;document.getElementById('startB').textContent='● Live';document.getElementById('startB').classList.add('on');document.getElementById('pauseB').style.display='';
    fx.master=new Tone.Gain(0.85).toDestination();
    fx.rev=new Tone.Reverb({decay:4,wet:0.22}).connect(fx.master);await fx.rev.ready;
    fx.filt=new Tone.Filter(E.fc,"lowpass").connect(fx.rev);
    fx.del=new Tone.FeedbackDelay("8n.",0.25).connect(fx.filt);
    fx.cho=new Tone.Chorus(3,2.5,0.5).connect(fx.rev).start();
    fx.comp=new Tone.Compressor(-12,3).connect(fx.master);
    fx.wide=new Tone.StereoWidener(0.6).connect(fx.rev);
    // Texture bus: AutoFilter → reverb for pitch movement
    fx.texFilt=new Tone.AutoFilter({frequency:0.15,baseFrequency:100,octaves:4,depth:0.8}).connect(fx.rev).start();
    fx.texBus=fx.texFilt;
    an=new Tone.Analyser('waveform',256);fx.master.connect(an);
    Object.keys(INS).forEach(id=>{const d=INS[id],st=E.inst[id],bus=SBUS[d.b]||'filt';const s2=SF[d.b](),g2=new Tone.Gain(st.vol*st.uv),p2=new Tone.Panner(st.pan);s2.connect(g2);g2.connect(p2);p2.connect(fx[bus]);sy[id]=s2;gn[id]=g2;pn[id]=p2});
    let arpS=0;
    new Tone.Loop(time=>{
        const e=E.energy,s16=cStep%ST;
        if(cStep%32===0&&autoProg)E.ci=(E.ci+1)%E.chords.length;
        const ch=E.chords[E.ci];
        if(cStep%32===0){
            ['pad','strings'].forEach(id=>{const st=E.inst[id];if(st?.on&&!st.up&&sy[id])trigPo(sy[id],ch,"2m",time,e*0.4+0.2)});
            if(E.inst.choir?.on&&!E.inst.choir?.up&&sy.choir)trigPo(sy.choir,ch.map(n=>n.replace(/\d/,'4')),"2m",time,e*0.4+0.2);
            if(E.inst.texture?.on&&!E.inst.texture?.up&&sy.texture){const tn=ch[0].replace(/\d/,'2');trigN(sy.texture,tn,"2m",time,e*0.3+0.15)}
        }
        Object.entries(E.inst).forEach(([id,st])=>{
            if(!st.on)return;const d=INS[id];if(!d||d.c==='atmo'&&!st.up)return;
            if(st.up&&st.pat.some(p=>p.length)){const v=st.pat[s16];if(!v.length)return;pS(id,d,ch,v,time,e)}
            else if(d.c!=='atmo'){gen(id,d,ch,s16,time,e,arpS)}
        });
        if(E.inst.arp?.on)arpS++;
        cStep++;
        Tone.Draw.schedule(()=>{upPH();upPC()},time);
    },"16n").start(0);
    Tone.Transport.bpm.value=E.tempo;Tone.Transport.start();
    buildStage();requestAnimationFrame(renderViz);
    lg("Live. Touch above stage to conduct.");
    document.getElementById('chint').style.opacity='1';setTimeout(()=>document.getElementById('chint').style.opacity='0',3000);
}

function pS(id,d,ch,v,t,e){
    const b=d.b;
    if(d.c==='rhythm'){
        if(b==='kick')trigN(sy[id],"C1","8n",t,e*0.7+0.3);
        else if(b==='hihat'||b==='perc'||b==='bell')trigM(sy[id],"16n",t,e*0.6+0.3);
        else trigR(sy[id],"16n",t,e*0.6+0.3);
    }else{
        v.forEach(ns=>{
            if(b==='pluck')trigPl(sy[id],ns,"8n",t);
            else if(b==='bell')trigM(sy[id],"4n",t,e*0.5+0.3);
            else if(b==='texture')trigN(sy[id],ns,"4n",t,e*0.3+0.2);
            else trigN(sy[id],ns,"8n",t,e*0.5+0.3);
        });
    }
    flash(id);
}

function gen(id,d,ch,s,t,e,arpS){
    const b=d.b;
    switch(b){
        case'kick':if(s%8===0||(s%8===3&&e>0.6)||(s%8===6&&e>0.8)){trigN(sy[id],"C1","8n",t,Math.min(e+0.3,1));flash(id)}break;
        case'snare':if(s%8===4||(s%16===10&&e>0.5)){trigR(sy[id],"16n",t,e*0.7+0.2);flash(id)}break;
        case'hihat':if(e>0.15&&(s%4===0||(s%2===0&&e>0.45))){trigM(sy[id],"16n",t,e*0.5+0.3);flash(id)}break;
        case'clap':if(s%8===4){trigR(sy[id],"16n",t,e*0.6+0.2);flash(id)}break;
        case'perc':if(s%4===2){trigM(sy[id],"16n",t,e*0.5+0.3);flash(id)}break;
        case'subbass':if(s%8===0){trigN(sy[id],ch[0].replace(/\d/,'1'),"4n",t,e*0.7+0.3);flash(id)}break;
        case'synbass':if(s%8===0){trigN(sy[id],ch[0].replace(/\d/,'2'),"4n",t,e*0.6+0.2);flash(id)}break;
        case'lead':if(Math.random()<e*0.55&&(s%4===0||(s%4===2&&Math.random()<0.4))){trigN(sy[id],ch[Math.floor(Math.random()*3)].replace(/[23]/,Math.random()>0.5?'5':'4'),"8n",t,e*0.5+0.2);flash(id)}break;
        case'pluck':if(s%8===0){trigPl(sy[id],ch[Math.floor(Math.random()*3)].replace(/[23]/,'4'),"8n",t);flash(id)}break;
        case'bell':if(s%8===0&&Math.random()<e*0.4){trigM(sy[id],"4n",t,e*0.4+0.3);flash(id)}break;
        case'arp':if(s%2===0){const ns=[...ch.map(n=>n.replace(/[23]/,'4')),...ch.map(n=>n.replace(/[23]/,'5'))];trigN(sy[id],ns[arpS%ns.length],"16n",t,e*0.5+0.2);flash(id)}break;
    }
}

// ═══ AI ═══
async function interp(input){
    if(!input?.trim())return;lg('Thinking…');
    if(!gKey){fallback(input);return}
    setAP('chk');
    const il=Object.entries(INS).map(([k,v])=>k+'('+v.n+')').join(', ');
    const al=Object.entries(E.inst).filter(([k,v])=>v.on).map(([k])=>k).join(',');
    const prompt=`You control a live music engine. Return ONLY valid JSON, no markdown, no explanation.
Instruments: ${il}
Keys: C,D,E,F,G,A,B. Modes: minor, major.
Format: {"tempo":40-200,"energy":0-1,"key":"letter","mode":"minor|major","filterCutoff":100-8000,"instruments":{"name":bool,...}}
Only changed fields. Be bold and creative.
State: tempo=${E.tempo}, energy=${E.energy}, key=${E.key} ${E.mode}, filter=${E.fc}, active=[${al}]
Command: "${input}"`;
    const r=await gCall(prompt,2);
    if(r.ok){try{applyAI(JSON.parse(r.text.replace(/```json|```/g,'').trim()));setAP('ok')}catch(e){lg('AI: bad format');setAP('ok');fallback(input)}}
    else{lg('AI error');setAP('ok');fallback(input)}
}
function applyAI(j){if(j.tempo)E.tempo=Math.max(40,Math.min(200,j.tempo));if(j.energy!==undefined)E.energy=Math.max(0,Math.min(1,j.energy));if(j.filterCutoff)E.fc=Math.max(100,Math.min(8000,j.filterCutoff));if(j.key&&KEYS[j.key])E.key=j.key;if(j.mode==='major'||j.mode==='minor')E.mode=j.mode;if(j.instruments)Object.entries(j.instruments).forEach(([k,v])=>{if(E.inst[k])E.inst[k].on=!!v});if(KEYS[E.key]?.[E.mode])E.chords=KEYS[E.key][E.mode];if(booted){Tone.Transport.bpm.rampTo(E.tempo,2);fx.filt.frequency.rampTo(E.fc,1)}buildStage();upUI();renderPC();lg('AI → '+E.tempo+'bpm '+E.key+(E.mode==='minor'?'m':''))}
function fallback(cmd){const t=(typeof cmd==='string'?cmd:'').toLowerCase();if(t.match(/chill|calm|slow|soft/)){E.tempo=78;E.energy=0.25}else if(t.match(/hype|dance|party|fast|drop/)){E.tempo=130;E.energy=0.9;E.inst.clap.on=true;E.inst.arp.on=true}else if(t.match(/dark|heavy|intense/)){E.tempo=95;E.energy=0.75;E.mode='minor';E.inst.subbass.on=true}else if(t.match(/cinematic|epic|film/)){E.tempo=85;E.energy=0.6;E.inst.strings.on=true;E.inst.pad.on=true;E.inst.subbass.on=true}else if(t.match(/ambient|space|dream/)){E.tempo=70;E.energy=0.3;E.inst.pad.on=true;E.inst.texture.on=true;E.inst.bell.on=true}if(KEYS[E.key]?.[E.mode])E.chords=KEYS[E.key][E.mode];if(booted)Tone.Transport.bpm.rampTo(E.tempo,2);buildStage();upUI();renderPC();lg('Fallback → '+E.tempo+'bpm')}

document.getElementById('voiceB').addEventListener('click',()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){lg("No speech support");return}
    const rec=new SR();rec.lang='en-US';rec.interimResults=false;rec.continuous=false;
    const btn=document.getElementById('voiceB');let got=false;
    rec.onstart=()=>{btn.classList.add('rec');btn.textContent='● Listen…';lg('Speak now…')};
    rec.onresult=e=>{got=true;interp(e.results[0][0].transcript)};
    rec.onspeechend=()=>rec.stop();
    rec.onerror=e=>{if(e.error==='not-allowed')lg("Mic blocked");else if(e.error==='no-speech')lg("No speech heard");else lg("Voice: "+e.error)};
    rec.onend=()=>{btn.classList.remove('rec');btn.textContent='🎤 Speak'};
    try{rec.start()}catch(e){lg("Mic fail")}
});
document.getElementById('cmdGo').addEventListener('click',()=>{const i=document.getElementById('cmdIn');if(i.value.trim()){interp(i.value.trim());i.value=''}});
document.getElementById('cmdIn').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('cmdGo').click()});

// ═══ VIZ ═══
const vc=document.getElementById('viz'),vx=vc.getContext('2d');const pts=[];
class P{constructor(x,y,c){this.x=x;this.y=y;this.c=c||'0,229,255';this.vx=(Math.random()-0.5)*2.5;this.vy=(Math.random()-0.5)*2.5;this.life=1;this.d=0.01+Math.random()*0.012;this.sz=1+Math.random()*2}u(){this.x+=this.vx;this.y+=this.vy;this.vy-=0.008;this.life-=this.d}}
function renderViz(){const W=vc.width=window.innerWidth,H=vc.height=window.innerHeight,t=performance.now()*0.001,e=E.energy,now=performance.now();vx.clearRect(0,0,W,H);const g=vx.createRadialGradient(W/2,H*0.2,0,W/2,H*0.2,W*0.35);g.addColorStop(0,'rgba(0,'+(20+e*35|0)+','+(35+e*50|0)+','+(0.02+e*0.025)+')');g.addColorStop(1,'transparent');vx.fillStyle=g;vx.fillRect(0,0,W,H);const cx=W/2,cy=H*0.2,bR=25+e*45;vx.beginPath();for(let a=0;a<Math.PI*2;a+=0.05){const n=Math.sin(a*6+t*3)*7*e+Math.sin(a*3-t*2)*3.5*e;a===0?vx.moveTo(cx+Math.cos(a)*(bR+n),cy+Math.sin(a)*(bR+n)):vx.lineTo(cx+Math.cos(a)*(bR+n),cy+Math.sin(a)*(bR+n))}vx.closePath();vx.strokeStyle='rgba(0,229,255,'+(0.03+e*0.1)+')';vx.lineWidth=1.5;vx.shadowBlur=10*e;vx.shadowColor='#00e5ff';vx.stroke();vx.shadowBlur=0;if(trail.length>1){vx.beginPath();let st=false;trail.forEach(p=>{if((now-p.t)/2500>1)return;if(!st){vx.moveTo(p.x,p.y);st=true}else vx.lineTo(p.x,p.y)});vx.strokeStyle='rgba(0,229,255,0.25)';vx.lineWidth=2;vx.stroke();const last=trail[trail.length-1];if(now-last.t<300){vx.beginPath();vx.arc(last.x,last.y,5,0,Math.PI*2);vx.fillStyle='rgba(0,229,255,0.06)';vx.fill()}}while(trail.length&&now-trail[0].t>2500)trail.shift();if(Math.random()<e*0.12){const a=Math.random()*Math.PI*2;pts.push(new P(cx+Math.cos(a)*bR,cy+Math.sin(a)*bR))}if(cond&&trail.length){const lp=trail[trail.length-1];pts.push(new P(lp.x,lp.y,'57,255,20'))}for(let i=pts.length-1;i>=0;i--){const p=pts[i];p.u();if(p.life<=0){pts.splice(i,1);continue}vx.beginPath();vx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);vx.fillStyle='rgba('+p.c+','+p.life*0.2+')';vx.fill()}if(pts.length>100)pts.splice(0,pts.length-100);requestAnimationFrame(renderViz)}
function upUI(){document.getElementById('vB').textContent=Math.round(E.tempo);document.getElementById('vE').textContent=Math.round(E.energy*100);document.getElementById('vK').textContent=E.key+(E.mode==='minor'?'m':'');document.getElementById('vE').style.color=E.energy>0.75?'var(--g)':E.energy<0.25?'var(--a)':'var(--c)'}
function lg(m){document.getElementById('log').textContent='> '+m}
buildStage();
