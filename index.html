<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conductive v2 — Integrated Engine</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body { margin:0; background:#050505; color:#0ff; font-family:'Courier New', monospace; overflow: hidden; }
        video, canvas { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity: 0.4; }
        #ui { position:fixed; bottom:20px; left:20px; z-index: 10; background: rgba(0,0,0,0.7); padding: 15px; border: 1px solid #0ff; }
        button { background: transparent; color: #0ff; border: 1px solid #0ff; padding: 10px 20px; cursor: pointer; margin-right: 5px; transition: 0.3s; }
        button:hover { background: #0ff; color: #000; }
        #status { margin-top: 10px; font-size: 13px; line-height: 1.4; white-space: pre-line; color: #0f0; }
        .label { color: #555; font-size: 10px; text-transform: uppercase; margin-bottom: 5px; }
    </style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="ui">
    <div class="label">System Controls</div>
    <button onclick="initSystem()">Initialize Orchestra</button>
    <button onclick="startVoice()">Voice Control</button>
    <button onclick="startPitch()">Humming Mode</button>
    <div id="status">System Offline - Awaiting Initialization...</div>
</div>

<script>
// ---------------- 1. GLOBAL STATE ----------------
let orchestratorState = {
    global: { tempo: 90, intensity: 0.5, volume: 0.6 },
    sections: {
        drums:   { active: true,  density: 0.8, character: "punchy" },
        bass:    { active: false, density: 0.6, character: "smooth" },
        flute:   { active: true,  density: 0.5, character: "airy" },
        strings: { active: false, density: 0.4, character: "soft" }
    }
};

const scale = ["C", "D", "E", "G", "A"]; // C Major Pentatonic
let step = 0;

// ---------------- 2. AUDIO ENGINE ----------------
let flute, kick, snare, bass, strings, globalReverb, globalFilter;

async function initSystem() {
    await Tone.start();
    
    // Effects
    globalReverb = new Tone.Reverb({ decay: 4, wet: 0.3 }).toDestination();
    globalFilter = new Tone.Filter({ type: "lowpass", frequency: 5000 }).toDestination();

    // Instruments
    flute = new Tone.Synth({ oscillator: { type: "sine" } }).connect(globalReverb);
    kick = new Tone.MembraneSynth().toDestination();
    snare = new Tone.NoiseSynth({ envelope: { attack: 0.001, decay: 0.2, sustain: 0 } }).toDestination();
    bass = new Tone.MonoSynth({ oscillator: { type: "square" }, envelope: { attack: 0.1 } }).connect(globalFilter);
    strings = new Tone.PolySynth(Tone.Synth).connect(globalReverb);

    // Transport Loop
    const kickPattern =  [1, 0, 0, 1, 0, 0, 1, 0];
    const snarePattern = [0, 0, 1, 0, 0, 0, 1, 0];
    const bassPattern =  [1, 0, 1, 0, 1, 1, 0, 0];

    new Tone.Loop(time => {
        const intensity = orchestratorState.global.intensity;

        if (orchestratorState.sections.drums.active) {
            if (kickPattern[step] && Math.random() < orchestratorState.sections.drums.density) 
                kick.triggerAttackRelease("C1", "8n", time, intensity);
            if (snarePattern[step] && Math.random() < orchestratorState.sections.drums.density) 
                snare.triggerAttackRelease("16n", time, intensity * 0.7);
        }

        if (orchestratorState.sections.bass.active && bassPattern[step]) {
            bass.triggerAttackRelease(scale[0] + "1", "16n", time, intensity * 0.6);
        }

        if (orchestratorState.sections.flute.active && step % 2 === 0 && Math.random() < orchestratorState.sections.flute.density) {
            flute.triggerAttackRelease(scale[Math.floor(Math.random()*5)] + "4", "16n", time, intensity * 0.5);
        }

        if (orchestratorState.sections.strings.active && step === 0) {
            strings.triggerAttackRelease([scale[0]+"3", scale[2]+"3", scale[4]+"3"], "1m", time, intensity * 0.3);
        }

        step = (step + 1) % 8;
    }, "16n").start(0);

    Tone.Transport.bpm.value = orchestratorState.global.tempo;
    Tone.Transport.start();
    updateStatus("Orchestra Live");
}

// ---------------- 3. DISPATCHER (THE BRIDGE) ----------------
function dispatchCommand(data) {
    if (data.tempo_change) {
        orchestratorState.global.tempo += data.tempo_change;
        Tone.Transport.bpm.rampTo(orchestratorState.global.tempo, 1);
    }
    if (data.intensity !== undefined) orchestratorState.global.intensity = data.intensity;

    if (data.sections) {
        data.sections.forEach(sec => {
            let target = orchestratorState.sections[sec.name];
            if (!target) return;
            if (sec.action === "add") target.active = true;
            if (sec.action === "remove") target.active = false;
            if (sec.density_change) target.density = Math.max(0, Math.min(1, target.density + sec.density_change));
            if (sec.character) applyCharacter(sec.name, sec.character);
        });
    }
    updateStatus(`Engine Updated: ${orchestratorState.global.tempo}BPM`);
}

function applyCharacter(section, style) {
    if (section === 'bass') {
        globalFilter.frequency.rampTo(style === 'smooth' ? 400 : 4000, 1);
    }
    if (section === 'strings') {
        globalReverb.wet.rampTo(style === 'airy' ? 0.8 : 0.2, 1);
    }
}

// ---------------- 4. INPUTS (GESTURE / VOICE / PITCH) ----------------

// Hand Tracking
const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });
hands.onResults(results => {
    if (results.multiHandLandmarks.length > 0) {
        const y = results.multiHandLandmarks[0][8].y; // Index finger tip
        orchestratorState.global.intensity = 1 - y; 
        // Visual feedback
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#0ff";
        ctx.beginPath(); ctx.arc(results.multiHandLandmarks[0][8].x * canvas.width, y * canvas.height, 10, 0, Math.PI*2); ctx.fill();
    }
});
const cam = new Camera(document.getElementById('video'), { onFrame: async () => { await hands.send({image: video}); } });
cam.start();

// Voice (Speech Recognition)
async function interpret(text) {
    updateStatus("User: " + text);
    // MOCK LOGIC for testing without API
    if(text.includes("bass")) dispatchCommand({"sections": [{"name": "bass", "action": "add", "character": "smooth"}]});
    if(text.includes("faster")) dispatchCommand({"tempo_change": 20});
    if(text.includes("stop")) dispatchCommand({"sections": [{"name": "drums", "action": "remove"}]});
}

function startVoice() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return alert("Speech Recognition not supported");
    const rec = new SpeechRecognition();
    rec.onresult = (e) => interpret(e.results[e.results.length-1][0].transcript);
    rec.start();
    updateStatus("Listening...");
}

// Pitch Detection (Humming)
let audioCtx, analyser, dataArray;
async function startPitch() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    source.connect(analyser);
    dataArray = new Float32Array(analyser.fftSize);
    updateStatus("Pitch Detection Active");
    drawPitch();
}

function drawPitch() {
    analyser.getFloatTimeDomainData(dataArray);
    // Simple autocorrelation placeholder for pitch
    requestAnimationFrame(drawPitch);
}

function updateStatus(t) { document.getElementById("status").innerText = t; }

</script>
</body>
</html>
