<head>

<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--c:#00e5ff;--g:#39ff14;--m:#ff2daa;--a:#ffb300;--bg:#020409;--p:rgba(4,8,20,0.92);--b:rgba(0,229,255,0.15)}
body{background:var(--bg);color:#c0dce6;font-family:'Outfit',sans-serif;overflow:hidden;height:100dvh;width:100vw;touch-action:none}
canvas#viz{position:fixed;inset:0;width:100%;height:100%;z-index:1}
.ui{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;pointer-events:none;overflow:hidden}
.ui>*{pointer-events:auto}
.m{font-family:'JetBrains Mono',monospace}

/* === TOP BAR === */
.top{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;flex-shrink:0;background:rgba(2,4,9,0.5);backdrop-filter:blur(5px)}
.brand{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(0,229,255,0.4)}.brand b{color:var(--c);font-weight:900}
.tmid{display:flex;gap:6px;align-items:center}
.tb{display:inline-flex;align-items:center;justify-content:center;background:rgba(0,229,255,0.05);border:1px solid var(--b);color:var(--c);padding:8px 12px;border-radius:6px;font-size:10px;cursor:pointer;transition:0.2s;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;font-weight:700}
.tb:hover{border-color:var(--c);background:rgba(0,229,255,0.1)}.tb.on{border-color:var(--g);color:var(--g);background:rgba(57,255,20,0.1)}.tb.pau{border-color:var(--a);color:var(--a)}.tb.rec{border-color:var(--m);color:var(--m)}

.stats{display:flex;gap:16px;text-align:right}
.stat .l{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,229,255,0.3)}.stat .v{font-weight:900;font-size:20px;color:var(--c);line-height:1}

/* === CONDUCT ZONE === */
.cz{flex:1;min-height:80px;cursor:crosshair;background:radial-gradient(circle at center, rgba(0,229,255,0.04) 0%, transparent 70%);border-top:1px dashed rgba(0,229,255,0.15);border-bottom:1px dashed rgba(0,229,255,0.15);position:relative;display:flex;align-items:center;justify-content:center}
.conduct-hint{font-size:12px;font-family:'JetBrains Mono',monospace;color:rgba(0,229,255,0.15);letter-spacing:4px;text-transform:uppercase;pointer-events:none}

/* === COMMAND BAR === */
.cmdb{display:flex;gap:6px;padding:6px 16px;align-items:center;flex-shrink:0}
.cmdb input{flex:1;background:rgba(0,0,0,0.5);border:1px solid var(--b);color:var(--c);padding:10px 12px;border-radius:8px;font-size:12px;outline:none}
.cmdb .tb{width:36px;height:36px;padding:0;font-size:14px}

/* === STAGE === */
.stw{padding:0 8px;flex-shrink:0}
.stage{position:relative;height:min(300px,36vh);overflow:visible}
canvas#sbg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.ic{position:absolute;width:52px;height:52px;transform:translate(-50%,-50%);cursor:grab;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;border:1px solid rgba(0,229,255,0.15);background:rgba(4,8,20,0.85);backdrop-filter:blur(4px);z-index:2;box-shadow: 0 4px 10px rgba(0,0,0,0.3)}
.ic.off{opacity:0.25;border-style:dashed}
.ic.sel{border-color:var(--c);box-shadow:0 0 15px rgba(0,229,255,0.25);z-index:3;transform:translate(-50%,-50%) scale(1.1)}
.ic .s{font-size:16px;line-height:1;margin-bottom:2px}.ic .l{font-size:6px;letter-spacing:1px;text-transform:uppercase;color:rgba(0,229,255,0.4);max-width:48px;overflow:hidden;text-overflow:ellipsis}
.ic .rn{position:absolute;inset:-4px;border-radius:50%;border:2px solid transparent;transition:border-color 0.05s}
.ic.fire .rn{border-color:var(--g);box-shadow:0 0 8px rgba(57,255,20,0.3)}

/* === CHORD PROGRESSION === */
.pb{padding:4px 8px;flex-shrink:0}
.pbox{background:var(--p);border:1px solid var(--b);border-radius:8px;padding:6px 12px;display:flex;align-items:center;gap:10px}
.pcs{display:flex;gap:6px;flex:1}
.pc{flex:1;text-align:center;padding:8px 4px;border-radius:6px;border:1px solid rgba(0,229,255,0.1);font-size:14px;font-weight:700;color:rgba(0,229,255,0.3);cursor:pointer;background:rgba(0,0,0,0.3)}
.pc.act{border-color:rgba(0,229,255,0.4);color:var(--c);background:rgba(0,229,255,0.05)}

/* === PATTERN EDITOR === */
.pw{padding:0 8px;max-height:0;transition:max-height 0.3s,opacity 0.3s;opacity:0;overflow:hidden;flex-shrink:0}
.pw.open{max-height:400px;opacity:1}
.ppx{background:var(--p);border:1px solid var(--b);border-radius:8px;padding:10px 12px;margin-top:4px}
.phdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:12px;flex-wrap:wrap}
.ptit{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--c);font-weight:bold;min-width:60px}

/* CHORD TOGGLES */
.c-togs{display:flex;gap:4px;align-items:center;background:rgba(0,229,255,0.05);padding:4px 8px;border-radius:6px;border:1px solid rgba(0,229,255,0.1)}
.ctog{width:24px;height:24px;border:1px solid var(--b);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;color:rgba(0,229,255,0.2);cursor:pointer}
.ctog.on{border-color:var(--c);color:var(--c);background:rgba(0,229,255,0.1)}
.ctog.cur{box-shadow: 0 0 8px var(--c); transform: scale(1.1);}

.pact{display:flex;gap:6px}
.pact button{background:rgba(0,229,255,0.02);border:1px solid var(--b);color:rgba(0,229,255,0.4);padding:6px 10px;border-radius:5px;font-size:9px;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.pact button:hover{color:var(--c);border-color:var(--c)}

.sg{display:flex;gap:2px;user-select:none}
.sc{flex:1;min-width:0;border-radius:4px;border:1px solid rgba(0,229,255,0.03);background:rgba(0,229,255,0.01);position:relative}
.sc.ph::after{content:'';position:absolute;inset:-1px;border:2px solid var(--g);border-radius:4px;pointer-events:none}
.sg.rh .sc{height:36px;cursor:pointer}.sg.rh .sc.on{background:rgba(0,229,255,0.2);border-color:rgba(0,229,255,0.3)}
.sg.mel .sc{display:flex;flex-direction:column;gap:1px;padding:1px}
.nr{height:16px;border-radius:2px;background:rgba(0,229,255,0.01);cursor:pointer;position:relative}
.nr.on{background:rgba(0,229,255,0.25)}
.nrl{position:absolute;left:2px;top:50%;transform:translateY(-50%);font-size:6px;color:rgba(0,229,255,0.1);pointer-events:none}
.nr.on .nrl{color:rgba(0,229,255,0.6)}
.fire-cell { background: rgba(57,255,20,0.4) !important; border-color: var(--g) !important; }
</style>
</head>
<body>
<canvas id="viz"></canvas>
<div class="ui">
  <div class="top">
    <div class="brand m"><b>Conductive</b> v17</div>
    <div class="tmid">
      <button class="tb m" id="startB">▶ Start</button>
      <button class="tb m" id="pauseB" style="display:none">⏸</button>
      <button class="tb m" onclick="saveSong()">💾 Save</button>
      <button class="tb m" onclick="document.getElementById('loadFile').click()">📂 Load</button>
      <input type="file" id="loadFile" accept=".json" style="display:none" onchange="loadSong(this)">
    </div>
    <div class="stats m"><div class="stat"><div class="l">BPM</div><div class="v" id="vB">110</div></div><div class="stat"><div class="l">Key</div><div class="v" id="vK">Cm</div></div></div>
  </div>

  <div class="cz" id="cz"><div class="conduct-hint m">Conducting Interface</div></div>

  <div class="cmdb"><input type="text" id="cmdIn" class="m" placeholder="AI commands disabled in v17…"><button class="tb m">→</button></div>

  <div class="stw"><div class="stage" id="stage"><canvas id="sbg"></canvas></div></div>

  <div class="pb"><div class="pbox"><div class="pcs m" id="pcs"></div><div class="tb m" onclick="randProg()" style="padding:4px 8px">🎲</div></div></div>

  <div class="pw" id="pw"><div class="ppx">
    <div class="phdr">
      <div class="ptit m" id="ptit">—</div>
      <div class="c-togs m">
        <div class="ctog" onclick="toggleInstChord(0)" id="ctog-0">1</div>
        <div class="ctog" onclick="toggleInstChord(1)" id="ctog-1">2</div>
        <div class="ctog" onclick="toggleInstChord(2)" id="ctog-2">3</div>
        <div class="ctog" onclick="toggleInstChord(3)" id="ctog-3">4</div>
      </div>
      <div class="pact m">
        <button onclick="clearPat()">Clear</button>
        <button onclick="randPat(selInst, true)">Regen</button>
        <button onclick="randPat(selInst, false)">Random</button>
        <button onclick="cloneInst()">Clone</button>
        <button onclick="deselect()">✕</button>
      </div>
    </div>
    <div class="sg" id="sg"></div>
  </div></div>
</div>

<script>
const ST = 16, TIERS = 4, TV = [1, 0.8, 0.65, 0.5];

const DEFS = {
  kick:    {cat:'rhythm',  name:'Kick',    sym:'◉', tier:0, type:'note',  bus:'comp', defOn:true,  angle:-80},
  snare:   {cat:'rhythm',  name:'Snare',   sym:'◎', tier:0, type:'noise', bus:'comp', defOn:true,  angle:-40},
  hihat:   {cat:'rhythm',  name:'HiHat',   sym:'✧', tier:0, type:'note',  bus:'comp', defOn:true,  angle:0},
  synbass: {cat:'bass',    name:'Bass',    sym:'≈', tier:1, type:'note',  bus:'comp', defOn:true,  angle:-20},
  lead:    {cat:'melodic', name:'Lead',    sym:'♪', tier:2, type:'note',  bus:'del',  defOn:true,  angle:10},
  keys:    {cat:'melodic', name:'Keys',    sym:'🎹', tier:2, type:'poly',  bus:'cho',  defOn:false, angle:40},
  strings: {cat:'atmo',    name:'Strings', sym:'∿', tier:3, type:'poly',  bus:'cho',  defOn:false, angle:0},
};

const FACTORY = {
  kick:    () => new Tone.MembraneSynth({envelope:{attack:0.001,decay:0.3,sustain:0}}),
  snare:   () => new Tone.NoiseSynth({volume:-6,envelope:{attack:0.001,decay:0.15,sustain:0}}),
  hihat:   () => new Tone.MetalSynth({volume:-16,envelope:{attack:0.001,decay:0.05}}),
  synbass: () => new Tone.MonoSynth({oscillator:{type:"sawtooth"},volume:-6,envelope:{attack:0.01,decay:0.2,sustain:0.4}}),
  lead:    () => new Tone.MonoSynth({oscillator:{type:"triangle"},volume:-4,envelope:{attack:0.05,decay:0.3,sustain:0.4}}),
  keys:    () => new Tone.PolySynth(Tone.Synth,{volume:-4,envelope:{attack:0.01,decay:0.3,sustain:0.5}}),
  strings: () => new Tone.PolySynth(Tone.Synth,{oscillator:{type:"fatsawtooth"},volume:-8,envelope:{attack:1.5,decay:0.5,sustain:0.9,release:2}}),
};

const E = {
  tempo:110, energy:0.5, ci:0, key:'C', mode:'minor',
  chords:[["C3","Eb3","G3"],["Ab2","C3","Eb3"],["Bb2","D3","F3"],["G2","B2","D3"]],
  inst:{}
};

// Initialize State immediately
Object.entries(DEFS).forEach(([id,d]) => {
  E.inst[id] = createInstState(id, d);
});

function createInstState(id, d) {
  return {
    on: d.defOn, angle: d.angle || 0, tier: d.tier,
    pan: Math.sin((d.angle||0) * Math.PI/180),
    vol: TV[d.tier], uVol: 1.0, sus: 0.5,
    pat: Array.from({length:ST}, ()=>[]), patRoot: undefined,
    chordAllowed: [true, true, true, true]
  };
}

let synths={}, panners={}, gains={}, fx={}, booted=false, cStep=0, selInst=null, cloneCount=0;

const KEYS_DATA = {
  'C':{minor:[["C3","Eb3","G3"],["Ab2","C3","Eb3"],["Bb2","D3","F3"],["G2","B2","D3"]],major:[["C3","E3","G3"],["F2","A2","C3"],["G2","B2","D3"],["A2","C3","E3"]]},
  'G':{minor:[["G3","Bb3","D4"],["Eb3","G3","Bb3"],["F3","A3","C4"],["D3","F#3","A3"]],major:[["G3","B3","D4"],["C3","E3","G3"],["D3","F#3","A3"],["E3","G3","B3"]]},
};

function getScale(k,m){
  const s=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const iv = m==='minor' ? [0,2,3,5,7,8,10] : [0,2,4,5,7,9,11], ri = s.indexOf(k);
  return iv.map(i => s[(ri+i)%12]);
}

function patNotes(id){
  const sc=getScale(E.key,E.mode), d=DEFS[id.split('_')[0]];
  let lo=d.cat==='bass'?2:4;
  return [sc[0]+(lo+1), sc[6]+lo, sc[5]+lo, sc[4]+lo, sc[3]+lo, sc[2]+lo, sc[1]+lo, sc[0]+lo];
}

const stageEl=document.getElementById('stage'), sbg=document.getElementById('sbg'), sbgCtx=sbg.getContext('2d');
function sGeo(){const r=stageEl.getBoundingClientRect();return{W:r.width,H:r.height,cx:r.width/2,cy:r.height+20,mr:50,ts:(r.height-5-50)/(TIERS-1)}}
function tierR(t){const g=sGeo();return g.mr+t*g.ts}
function ang2xy(a,t){const g=sGeo(),r=tierR(t),rd=a*Math.PI/180;return{x:g.cx+Math.sin(rd)*r,y:g.cy-Math.cos(rd)*r}}
function xy2ang(x,y){const g=sGeo(),dx=x-g.cx,dy=g.cy-y;return{a:Math.max(-85,Math.min(85,Math.atan2(dx,dy)*180/Math.PI)),t:Math.round(Math.max(0,Math.min(TIERS-1,(Math.sqrt(dx*dx+dy*dy)-g.mr)/g.ts)))}}

function buildStage(){
  stageEl.querySelectorAll('.ic').forEach(e=>e.remove());
  const g=sGeo(); sbg.width=g.W; sbg.height=g.H;
  sbgCtx.clearRect(0,0,g.W,g.H);
  for(let t=0;t<TIERS;t++){
    sbgCtx.beginPath(); sbgCtx.arc(g.cx,g.cy,tierR(t),Math.PI+0.12,-0.12);
    sbgCtx.strokeStyle='rgba(0,229,255,0.05)'; sbgCtx.stroke();
  }
  Object.entries(E.inst).forEach(([id,st]) => {
    const base = id.split('_')[0], d=DEFS[base];
    const p=ang2xy(st.angle,st.tier), el=document.createElement('div');
    el.className='ic'+(st.on?' on':' off')+(selInst===id?' sel':''); el.id='i-'+id; el.style.left=p.x+'px'; el.style.top=p.y+'px';
    el.innerHTML=`<div class="rn"></div><div class="s">${d.sym}</div><div class="l">${d.name}${id.includes('_')?id.split('_')[1]:''}</div>`;
    el.addEventListener('pointerdown',e=>{
      let drag=false, sx=e.clientX, sy=e.clientY;
      const mm=ev=>{
        if(Math.abs(ev.clientX-sx)>5||Math.abs(ev.clientY-sy)>5) drag=true;
        if(drag){
          const rect=stageEl.getBoundingClientRect(), at=xy2ang(ev.clientX-rect.left,ev.clientY-rect.top);
          st.angle=at.a; st.tier=at.t; st.pan=Math.sin(at.a*Math.PI/180); st.vol=TV[at.t];
          if(panners[id]) panners[id].pan.value=st.pan;
          if(gains[id]) gains[id].gain.rampTo(st.vol*st.uVol,0.1);
          const np=ang2xy(st.angle,st.tier); el.style.left=np.x+'px'; el.style.top=np.y+'px';
        }
      }, mu=()=>{if(!drag)tapInst(id);window.removeEventListener('pointermove',mm);window.removeEventListener('pointerup',mu)};
      window.addEventListener('pointermove',mm);window.addEventListener('pointerup',mu);
    });
    stageEl.appendChild(el);
  });
}

function tapInst(id){
  if(selInst===id){E.inst[id].on=!E.inst[id].on;upStage();return}
  selInst=id; upStage(); openPat(id);
}
function deselect(){selInst=null;document.getElementById('pw').classList.remove('open');upStage()}
function upStage(){Object.keys(E.inst).forEach(id=>{const el=document.getElementById('i-'+id);if(el)el.className='ic'+(E.inst[id].on?' on':' off')+(selInst===id?' sel':'')})}

function openPat(id){
  const base=id.split('_')[0], d=DEFS[base], st=E.inst[id]; if(!d||!st) return;
  document.getElementById('ptit').textContent=d.name + (id.includes('_')?' '+id.split('_')[1]:'');
  document.getElementById('pw').classList.add('open');
  upChordTogs();
  const g=document.getElementById('sg'), isR=d.cat==='rhythm', notes=isR ? [] : patNotes(id);
  g.innerHTML=''; g.className='sg '+(isR?'rh':'mel');
  for(let s=0; s<ST; s++){
    const cell=document.createElement('div'); cell.className='sc';
    if(isR){
      if(st.pat[s].length) cell.classList.add('on');
      cell.addEventListener('pointerdown', e=>{ e.preventDefault(); st.pat[s]=st.pat[s].length?[]:['hit']; cell.classList.toggle('on',st.pat[s].length>0); });
    } else {
      notes.forEach(ns=>{
        const row=document.createElement('div'); row.className='nr'+(st.pat[s].includes(ns)?' on':'');
        row.innerHTML='<span class="nrl">'+ns+'</span>';
        row.addEventListener('pointerdown', e=>{ e.preventDefault(); const idx=st.pat[s].indexOf(ns); if(idx>=0) st.pat[s].splice(idx,1); else st.pat[s].push(ns); row.classList.toggle('on',st.pat[s].includes(ns)); });
        cell.appendChild(row);
      });
    }
    g.appendChild(cell);
  }
}

function randPat(id, logic=true){
  if(!id) return; const base=id.split('_')[0], d=DEFS[base], st=E.inst[id], notes=patNotes(id);
  st.pat = Array.from({length:ST}, ()=>[]);
  for(let s=0; s<ST; s++) {
    if(!logic) { if(Math.random()<0.25) st.pat[s]=d.cat==='rhythm'?['hit']:[notes[Math.floor(Math.random()*notes.length)]]; continue; }
    let hit=false, nArr=[];
    if(base==='kick' && s%8===0) hit=true;
    else if(base==='snare' && s%8===4) hit=true;
    else if(base==='hihat' && s%2===0) hit=true;
    else if(d.cat==='bass' && s%8===0) nArr=[notes[notes.length-1]];
    else if(d.cat==='melodic' && s%4===0 && Math.random()<E.energy) nArr=[notes[Math.floor(Math.random()*4)]];
    if(d.cat==='rhythm'&&hit) st.pat[s]=['hit']; else if(nArr.length) st.pat[s]=nArr;
  }
  if(selInst === id) openPat(id);
}

function cloneInst(){
  if(!selInst) return;
  const base=selInst.split('_')[0], d=DEFS[base], st=E.inst[selInst];
  cloneCount++; const newId = `${base}_${cloneCount}`;
  E.inst[newId] = JSON.parse(JSON.stringify(st));
  E.inst[newId].angle += 10;
  if(booted) createSynth(newId, base);
  buildStage();
  tapInst(newId);
}

function createSynth(id, base){
  const st=E.inst[id], s=FACTORY[base](), g=new Tone.Gain(st.vol*st.uVol), p=new Tone.Panner(st.pan);
  s.connect(g); g.connect(p); p.connect(fx[DEFS[base].bus]||fx.comp);
  synths[id]=s; gains[id]=g; panners[id]=p;
}

function clearPat(){if(selInst){E.inst[selInst].pat=Array.from({length:ST},()=>[]);openPat(selInst)}}
function toggleInstChord(i){ if(selInst){ E.inst[selInst].chordAllowed[i]=!E.inst[selInst].chordAllowed[i]; upChordTogs(); }}
function upChordTogs(){ if(!selInst)return; const st=E.inst[selInst]; for(let i=0;i<4;i++){ const el=document.getElementById('ctog-'+i); el.className='ctog'+(st.chordAllowed[i]?' on':'')+(i===E.ci?' cur':''); }}

async function boot(){
  if(booted) return; await Tone.start(); booted=true;
  document.getElementById('startB').textContent='● Live'; document.getElementById('startB').classList.add('on'); document.getElementById('pauseB').style.display='';
  fx.rev = new Tone.Reverb(3).toDestination(); await fx.rev.ready;
  fx.comp = new Tone.Compressor(-10,3).connect(fx.rev);
  fx.del = new Tone.FeedbackDelay("8n",0.3).connect(fx.rev);
  fx.cho = new Tone.Chorus(4,2.5,0.5).connect(fx.rev).start();
  Object.keys(E.inst).forEach(id => createSynth(id, id.split('_')[0]));
  new Tone.Loop(time => {
    if(cStep%ST===0) E.ci=(E.ci+1)%4; const ch=E.chords[E.ci];
    Object.entries(E.inst).forEach(([id,st]) => {
      if(!st.on || !st.chordAllowed[E.ci]) return;
      const base=id.split('_')[0], d=DEFS[base], vals=st.pat[cStep%ST];
      if(!vals.length) return;
      if(d.cat==='rhythm') synths[id].triggerAttackRelease(d.type==='noise'?'8n':vals[0], '8n', time);
      else synths[id].triggerAttackRelease(d.type==='poly'?ch:ch[0], '8n', time);
      Tone.Draw.schedule(()=>{document.getElementById('i-'+id)?.classList.add('fire');setTimeout(()=>document.getElementById('i-'+id)?.classList.remove('fire'),50)},time);
    });
    cStep++; Tone.Draw.schedule(()=>{const cells=document.getElementById('sg')?.children; if(cells&&cells[cStep%ST-1||15])cells[cStep%ST-1||15].classList.remove('ph'); if(cells&&cells[cStep%ST])cells[cStep%ST].classList.add('ph'); renderChords();},time);
  },"16n").start(0);
  Tone.Transport.bpm.value=E.tempo; Tone.Transport.start();
}
